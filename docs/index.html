<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>生肖天机</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;touch-action:manipulation;}
html,body{height:100%;height:100dvh;}
body{background:#07071a;display:flex;align-items:flex-start;justify-content:center;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#fff;padding:0;margin:0;min-height:100dvh;touch-action:manipulation;-webkit-text-size-adjust:100%;}

.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#1a1060 0%,transparent 70%),radial-gradient(ellipse 60% 40% at 80% 100%,#0d2050 0%,transparent 60%);}
.stars{position:absolute;inset:0;}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;opacity:.6;animation:twinkle 3s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:1}}

.wrap{position:relative;z-index:1;width:min(500px,96vw);max-width:96vw;padding:0 0 calc(16px + env(safe-area-inset-bottom)) 0;margin:0 auto;overflow-x:hidden;}

/* ===== 标题区：书法印章风格 ===== */
.logo{text-align:center;margin-bottom:8px;position:relative;}

.logo-badge{
  display:inline-block;
  font-size:12px;letter-spacing:6px;color:#c8a020;
  padding:4px 18px;border-radius:20px;
  background:rgba(255,215,0,.07);
  border:1px solid rgba(255,215,0,.25);
  animation:shimmer 4s ease-in-out infinite;
  margin-bottom:10px;
}
@keyframes shimmer{0%,100%{border-color:rgba(255,215,0,.25);color:#c8a020}50%{border-color:rgba(255,215,0,.5);color:#ffd700}}

.logo-title-wrap{position:relative;display:inline-block;}
.logo-title{
  font-size:clamp(32px,10vw,46px);
  font-weight:900;letter-spacing:12px;
  color:#ffd700;
  text-shadow:0 0 20px rgba(255,215,0,.5),0 0 40px rgba(255,200,0,.2);
  display:block;text-align:center;margin-bottom:8px;
}
.logo-sub{
  font-size:11px;color:#444;letter-spacing:6px;text-transform:uppercase;
}
/* 属相/命格标签 */
.login-label{
  font-size:11px;letter-spacing:4px;color:#666;text-align:center;
  margin-bottom:10px;text-transform:uppercase;
}

/* 12属相淡化装饰 */

/* 分割线 */
.divider{display:none;}

/* 选区 */
.section{display:none;}

/* 属相网格 4x3 */
.zodiac-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:0 auto 14px;max-width:400px;padding:0 12px;box-sizing:border-box;}
.zodiac-card{background:#0f0f2a;border:1.5px solid rgba(255,255,255,.07);border-radius:12px;padding:10px 4px 8px;cursor:pointer;transition:all .2s;text-align:center;user-select:none;}
.zodiac-card:hover{background:#1a1a40;border-color:rgba(255,255,255,.2);}
.zodiac-card:active{transform:scale(.94);transition:transform .05s;}
.zodiac-card.on{background:linear-gradient(135deg,#2a2000,#1a1000);border-color:#ffd700;box-shadow:0 0 14px rgba(255,215,0,.3);}
.zodiac-card .z-emoji{font-size:clamp(26px,8vw,36px);line-height:1;margin-bottom:4px;}
.zodiac-card .z-name{font-size:11px;color:#666;overflow:hidden;white-space:nowrap;}
.zodiac-card.on .z-name{color:#ffd700;font-weight:700;}

/* 命格：grid 与属相宽度一致，5列居中 */
.fate-row{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin:0 auto 12px;max-width:400px;padding:0 12px;box-sizing:border-box;}
.fate-card{background:#0f0f2a;border:1.5px solid rgba(255,255,255,.07);border-radius:12px;padding:10px 4px 8px;cursor:pointer;transition:all .2s;text-align:center;}
.fate-card:hover{background:#1a1a40;border-color:rgba(255,255,255,.2);}
.fate-card:active{transform:scale(.94);transition:transform .05s;}
.fate-card.on{background:linear-gradient(135deg,#1a1a3a,#2a2050);border-color:#ffd700;box-shadow:0 0 16px rgba(255,215,0,.3);}
.fate-card .f-emoji{font-size:clamp(20px,6vw,28px);display:block;margin-bottom:4px;}
.fate-card .f-name{font-size:11px;font-weight:700;display:block;}
.fate-card.fate-0 .f-name{color:#4CAF50}
.fate-card.fate-1 .f-name{color:#FF5722}
.fate-card.fate-2 .f-name{color:#a0785a}
.fate-card.fate-3 .f-name{color:#FFC107}
.fate-card.fate-4 .f-name{color:#42a5f5}
/* 加成描述 */
.bonus{min-height:18px;margin:0 0 12px 0;text-align:center;font-size:11px;color:#555;letter-spacing:.5px;}
.bonus .bonus-name{font-weight:700;margin-right:4px;}
.bonus .bonus-desc{color:#888;}

/* 加成展示 */

/* 开始按钮 */
.start-btn{margin-top:4px;width:100%;padding:12px;font-size:15px;background:linear-gradient(135deg,#2a2000,#1a1000);border:1.5px solid #5a4000;border-radius:30px;color:#777;cursor:not-allowed;letter-spacing:4px;font-weight:600;transition:all .3s;}
.start-btn.ready{background:linear-gradient(135deg,#c8a020,#8b6010);border-color:#ffd700;color:#fff;cursor:pointer;letter-spacing:4px;box-shadow:0 4px 18px rgba(200,160,32,.3);}
.start-btn.ready:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(200,160,32,.4);}
.start-btn:active{transform:scale(.97);}
/* 底部功能栏 */
#gameBottomBar{padding-bottom:max(20px,env(safe-area-inset-bottom));}

/* 弹窗 */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);}
.modal.show{display:flex;}
.modal-box{background:linear-gradient(160deg,#0d0d2a,#1a1a3a);border:1px solid #ffd700;border-radius:28px;padding:40px 36px;width:min(380px,90vw);text-align:center;animation:popIn .35s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.modal-badge{display:inline-block;background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a0a00;font-size:11px;font-weight:800;padding:4px 14px;border-radius:20px;letter-spacing:3px;margin-bottom:20px;}
.modal-chars{display:flex;justify-content:center;align-items:center;gap:20px;margin:16px 0 24px;}
.modal-chars .mc-zodiac,.modal-chars .mc-fate{font-size:64px;line-height:1;}
.modal-chars .mc-vs{font-size:20px;color:#444;}
.modal-info{font-size:13px;color:#888;line-height:1.8;}
.modal-info b{color:#ffd700;}
.modal-btn{margin-top:8px;width:100%;padding:13px;border-radius:30px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:2px;transition:all .2s;}
.modal-btn-start{background:#ffd700;border:none;color:#1a0a00;}
.modal-btn-start:hover{transform:scale(1.02);box-shadow:0 8px 24px rgba(255,215,0,.3);}
.modal-btn-cancel{background:transparent;border:1px solid rgba(255,255,255,.2);color:#888;margin-top:10px;}
.modal-btn-cancel:hover{border-color:rgba(255,255,255,.5);color:#ccc;}

/* ===== 游戏主界面 ===== */
#gamePage{width:100%;height:100dvh;overflow:hidden;touch-action:none;flex-direction:column;padding-bottom:0;display:none;}
.rank-panel{position:fixed;top:0;right:0;width:min(380px,92vw);height:100%;height:100dvh;background:#0a0a1a;z-index:303;display:none;overflow-y:auto;transform:translateX(100%);transition:transform .3s ease;}
.rank-panel.open{display:block;transform:translateX(0);}.rank-panel::-webkit-scrollbar{width:0;}.handbook-panel{position:fixed;top:0;left:0;width:100%;height:100%;height:100dvh;background:#07071a;z-index:301;display:none;overflow-y:auto;}
.handbook-panel.open{display:block;}.handbook-panel::-webkit-scrollbar{width:0;}.cult-panel,.ach-panel{position:fixed;top:0;right:0;width:min(400px,92vw);height:100%;height:100dvh;background:#0a0a1a;z-index:302;display:none;overflow-y:auto;transform:translateX(100%);transition:transform .3s ease;}
.cult-panel.open,.ach-panel.open{display:block;transform:translateX(0);}
.cult-panel::-webkit-scrollbar,.ach-panel::-webkit-scrollbar{width:0;}
@keyframes achSlideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes achFadeOut{from{opacity:1}to{opacity:0}}
@keyframes achToast{0%{transform:translateX(120%);opacity:0}15%{transform:translateX(0);opacity:1}85%{transform:translateX(0);opacity:1}100%{transform:translateX(120%);opacity:0}}

#topHud{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,#0a0a2a,rgba(10,10,42,.92));backdrop-filter:blur(8px);padding:10px 14px 8px;border-bottom:1px solid rgba(255,215,0,.15);margin:-20px -16px 12px;border-radius:0 0 16px 16px;}
.hud-top{display:flex;align-items:center;justify-content:space-between;}
.hud-left,.hud-right{display:flex;align-items:center;gap:4px;font-size:18px;}
.hud-center{text-align:center;}
.coin-row{display:flex;align-items:center;gap:4px;}
#hudCoins{font-size:clamp(16px,4.5vw,22px);font-weight:700;color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,.4);}
.cps-row{font-size:10px;color:#888;}
#hudCps{color:#aaa;}
#hudQi{font-size:16px;font-weight:600;color:#7eb8ff;}
.hud-bottom{display:flex;justify-content:space-between;font-size:11px;color:#555;margin-top:4px;}
#dragonGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:4px;}
.d-cell{aspect-ratio:1;background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.06);border-radius:10px;display:flex;align-items:center;justify-content:center;position:relative;transition:border-color .15s;}
.d-cell:hover{border-color:rgba(255,255,255,.15);}
.d-cell.mergeable{border-color:#ffd700;box-shadow:0 0 10px rgba(255,215,0,.3);}
.d-card{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:grab;user-select:none;border-radius:8px;transition:transform .15s;}
.d-card:active{cursor:grabbing;}
.d-icon{font-size:clamp(22px,6vw,34px);line-height:1;}
.d-lv{position:absolute;bottom:2px;right:4px;font-size:9px;color:rgba(255,255,255,.5);}
.d-gold{position:absolute;top:2px;left:4px;font-size:9px;color:#ffd700;}
.dragging{position:fixed!important;z-index:999;pointer-events:none;transform:scale(1.2);box-shadow:0 8px 32px rgba(0,0,0,.6);opacity:.85;}
#summonBar{display:flex;gap:10px;padding:10px 16px 16px;}
.sbtn{flex:1;min-width:0;padding:10px 4px 8px;border-radius:14px;border:1.5px solid;cursor:pointer;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:1px;background:rgba(10,10,30,.9);backdrop-filter:blur(4px);transition:all .2s;color:#fff;}
.sbtn small{font-size:10px;opacity:.7;}
.sbtn-coin{border-color:#ffd700;color:#ffd700;}
.sbtn-coin:hover{background:rgba(255,215,0,.15);}
.sbtn-qi{border-color:#7eb8ff;color:#7eb8ff;}
.sbtn-qi:hover{background:rgba(126,184,255,.15);}
.sbtn:disabled{opacity:.35;cursor:not-allowed;}
.sbtn-free{border-color:#4CAF50;color:#4CAF50;}
@keyframes mergeFlash{0%{transform:scale(.8);opacity:0}50%{transform:scale(1.3);opacity:1}100%{transform:scale(1);opacity:0}}
#mergeFlash.show{display:flex!important;animation:mergeFlash .5s ease-out forwards;}


/* ===== 召唤翻牌动画 ===== */
#summonOverlay{
  display:none;position:fixed;inset:0;
  background:rgba(5,5,20,.95);z-index:500;
  align-items:center;justify-content:center;flex-direction:column;
}
#summonOverlay.show{display:flex!important;}
/* 翻牌区域 */
.scard-wrap{
  perspective:800px;width:160px;height:200px;margin:30px 0;
}
.scard{
  width:100%;height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 1.2s cubic-bezier(.4,0,.2,1);
  cursor:pointer;
}
.scard.flipped{transform:rotateY(180deg);}
.scard-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:48px;
  border:2px solid rgba(255,215,0,.4);
}
.scard-back{
  background:linear-gradient(160deg,#1a1a3a,#2a1a4a);
  box-shadow:0 0 40px rgba(255,215,0,.2);
}
.scard-back::before{
  content:'？';font-size:64px;color:rgba(255,215,0,.3);
}
/* 金边框高级感 */
.scard-front{
  background:linear-gradient(160deg,#2a1a3a,#1a1a4a);
  transform:rotateY(180deg);
  border-color:#ffd700;
  box-shadow:0 0 30px rgba(255,215,0,.3);
  flex-direction:column;gap:8px;
}
.scard-front .sf-emoji{font-size:72px;line-height:1;}
.scard-front .sf-name{font-size:18px;color:#ffd700;font-weight:700;}
.scard-front .sf-cps{font-size:11px;color:#888;}
/* 抽卡提示文字 */
.summon-tip{color:rgba(255,255,255,.4);font-size:14px;letter-spacing:4px;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.7}}
/* 结果揭晓区 */
.summon-result-anim{
  display:none;text-align:center;
  animation:fadeInUp .6s ease-out;
}
.summon-result-anim.show{display:block;}
@keyframes fadeInUp{
  from{transform:translateY(30px);opacity:0}
  to{transform:translateY(0);opacity:1}
}
.sra-emoji{font-size:90px;margin:10px 0;}
.sra-name{font-size:26px;color:#ffd700;font-weight:900;}
.sra-desc{font-size:14px;color:#888;margin-top:8px;}
.sra-tag{font-size:12px;color:#aaa;margin-top:4px;letter-spacing:3px;}
/* 光芒效果 */
@keyframes shine{0%{background-position:-200% 0}100%{background-position:200% 0}}
.shine-text{
  background:linear-gradient(90deg,#ffd700,#fff,#ffd700);
  background-size:200% auto;
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 2s linear infinite;
}
/* 弹窗里的召唤结果 */
#summonModal .modal-box{max-width:340px;}
.smodal-rarity{font-size:12px;letter-spacing:4px;margin-bottom:10px;}
.smodal-rarity.r1{color:#aaa;}
.smodal-rarity.r2{color:#7eb8ff;}
.smodal-rarity.r3{color:#b57edc;}
.smodal-rarity.r4{color:#ffd700;}
/* 拖拽时目标格高亮 */
.d-cell.drop-target{border-color:#ffd700!important;box-shadow:0 0 16px rgba(255,215,0,.5)!important;background:rgba(255,215,0,.1)!important;}


/* 设置面板 */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(4px);}
.panel-overlay.open{display:flex;}
.panel-box{background:linear-gradient(160deg,#0d0d2a,#1a1a3a);border:1px solid #ffd700;border-radius:24px;width:min(380px,90vw);animation:popIn .3s ease;}
.panel-header{background:linear-gradient(135deg,#1a1a3a,#0d0d2a);border-bottom:1px solid rgba(255,215,0,.2);padding:16px 20px;font-size:17px;font-weight:700;color:#ffd700;border-radius:24px 24px 0 0;}

/* 英雄展示台动画 */
@keyframes blink{0%,100%{opacity:.3}50%{opacity:.7}}
/* 灵兽缩略图 */
.ht{transition:transform .15s;cursor:pointer;}
.ht:hover{transform:scale(1.2);}

/* 底部图标按钮统一圆形 */
.icon-btn{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;position:relative;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);transition:all .2s;flex-shrink:0;}
.icon-btn:active{transform:scale(.9);}
.icon-task{color:#c8a020;border-color:rgba(200,160,32,.3);background:rgba(200,160,32,.08);}
.icon-book{color:#42a5f5;border-color:rgba(66,165,245,.3);background:rgba(66,165,245,.08);}
.icon-active{color:#ff6b35;border-color:rgba(255,107,53,.3);background:rgba(255,107,53,.08);}
.icon-coin{color:#ffd700;border-color:rgba(255,215,0,.4);background:rgba(255,215,0,.1);}
.icon-qi{color:#a0d8ef;border-color:rgba(160,216,239,.4);background:rgba(160,216,239,.08);}
.icon-free{color:#4caf50;border-color:rgba(76,175,80,.4);background:rgba(76,175,80,.08);}
.icon-rank{color:#e040fb;border-color:rgba(224,64,251,.3);background:rgba(224,64,251,.06);}
.icon-ach{color:#ff9800;border-color:rgba(255,152,0,.3);background:rgba(255,152,0,.06);}
.icon-set{color:rgba(255,255,255,.5);border-color:rgba(255,255,255,.1);background:rgba(255,255,255,.04);}
/* 灵兽环绕属性 */
.attr-ring{position:absolute;display:flex;align-items:center;}
.attr-pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;letter-spacing:.5px;border:1px solid rgba(255,215,0,.3);background:rgba(255,215,0,.08);color:#ffd700;}
.ring-1{left:0;top:50%;transform:translateY(-50%) translateX(-4px);animation:orbit-ring 8s ease-in-out infinite;}
.ring-2{left:0;bottom:6px;animation:orbit-ring 10s ease-in-out infinite reverse;}
.ring-3{right:0;top:50%;transform:translateY(-50%) translateX(4px);animation:orbit-ring-r 9s ease-in-out infinite;}
.ring-4{right:0;bottom:6px;animation:orbit-ring-r 11s ease-in-out infinite reverse;}
@keyframes orbit-ring{0%,100%{opacity:.5}50%{opacity:1;transform:translateX(-4px) translateY(-6px)}}
@keyframes orbit-ring-r{0%,100%{opacity:.5}50%{opacity:1;transform:translateX(4px) translateY(-6px)}}
/* 灵兽呼吸+光环 */
#heroIcon{animation:hero-breathe 3s ease-in-out infinite;}
@keyframes hero-breathe{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.07)}}
.hero-glow{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(200px,52vw);height:min(200px,52vw);border-radius:50%;background:radial-gradient(circle,rgba(255,215,0,.14) 0%,transparent 70%);animation:hero-glow-pulse 2.5s ease-in-out infinite;z-index:1;pointer-events:none;}
@keyframes hero-glow-pulse{0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:.9;transform:translate(-50%,-50%) scale(1.15)}}


/* 侧边栏按钮 */
.side-btn{
  width:40px;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;border:none;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  transition:all .2s;color:rgba(255,255,255,.6);
}
.side-btn:active{transform:scale(.88);}
.side-btn:hover{background:rgba(255,215,0,.12);border-color:rgba(255,215,0,.3);color:#ffd700;}

/* 召唤按钮 */
.summon-btn{
  display:flex;align-items:center;justify-content:center;
  border-radius:24px;padding:8px 18px;cursor:pointer;border:none;
  font-size:13px;font-weight:700;gap:4px;min-width:70px;
  transition:all .2s;
}
.summon-btn:active{transform:scale(.94);}
.summon-coin{background:rgba(255,215,0,.15);border:1.5px solid rgba(255,215,0,.4);color:#ffd700;}
.summon-coin:hover{background:rgba(255,215,0,.25);}
.summon-qi{background:rgba(160,216,239,.12);border:1.5px solid rgba(160,216,239,.35);color:#a0d8ef;}
.summon-qi:hover{background:rgba(160,216,239,.2);}
.summon-free{background:rgba(76,175,80,.15);border:1.5px solid rgba(76,175,80,.4);color:#4caf50;padding:8px 14px;min-width:0;}
.summon-free:hover{background:rgba(76,175,80,.25);}
</style>
</head>
<body>
<script>// Disable bfcache to ensure fresh JS execution
window.addEventListener('pageshow', e => { if(e.persisted) location.reload(); });
window.addEventListener('pagehide', e => { if(e.persisted) location.reload(); });
</script>
<div class="bg"><div class="stars" id="stars"></div></div>

<div class="wrap" id="loginWrap">
  <div class="logo">
    <div class="logo-badge">✦ 天 机 降 临 ✦</div>
    <div class="logo-title">生肖天机</div>
    <div class="logo-sub">放置合成 · 命运由我</div>
  </div>

  <div class="login-label">选择属相</div>
  <div class="zodiac-grid" id="zGrid"></div>

  <div class="login-label" style="margin-top:14px">选择命格</div>
  <div class="fate-row" id="fGrid"></div>
  <div class="bonus" id="bonus"></div>

  <button class="start-btn" id="sBtn" onclick="doStart()">请先选择属相与命格</button>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-badge">命运已定</div>

<script>
const ZDATA=[
  {e:"🐀",n:"鼠"},{e:"🐂",n:"牛"},{e:"🐅",n:"虎"},{e:"🐇",n:"兔"},
  {e:"🐉",n:"龙"},{e:"🐍",n:"蛇"},{e:"🐎",n:"马"},{e:"🐏",n:"羊"},
  {e:"🐒",n:"猴"},{e:"🐓",n:"鸡"},{e:"🐕",n:"狗"},{e:"🐖",n:"猪"}
];
const FDATA=[
  {e:"🌿",n:"木",d:"经验+50% · 顿悟+20%",c:1,q:1,exp:1.5},
  {e:"🔥",n:"火",d:"金币产出+50%",c:1.5,q:1,exp:1},
  {e:"🟤",n:"土",d:"每日3次免费召唤",c:1,q:1,exp:1},
  {e:"⚪",n:"金",d:"高级召唤概率+30%",c:1,q:1,exp:1},
  {e:"💧",n:"水",d:"龙气+50% · 离线收益+50%",c:1,q:1.5,exp:1}
];
let sz=-1, sf=-1;

const stars=document.getElementById('stars');
for(let i=0;i<60;i++){
  const s=document.createElement('div');
  s.className='star';
  s.style.left=Math.random()*100+'%';
  s.style.top=Math.random()*100+'%';
  s.style.animationDelay=Math.random()*3+'s';
  s.style.width=s.style.height=(1+Math.random()*2)+'px';
  stars.appendChild(s);
}

const zg=document.getElementById('zGrid');
ZDATA.forEach((z,i)=>{
  const c=document.createElement('div');
  c.className='zodiac-card';
  c.innerHTML=`<div class="z-emoji">${z.e}</div><div class="z-name">${z.n}</div>`;
  c.onclick=()=>{
    document.querySelectorAll('.zodiac-card').forEach(x=>x.classList.remove('on'));
    c.classList.add('on');
    sz=i; upd();
  };
  zg.appendChild(c);
});

const fg=document.getElementById('fGrid');
FDATA.forEach((f,i)=>{
  const c=document.createElement('div');
  c.className='fate-card fate-'+i;
  c.innerHTML=`<div class="f-emoji">${f.e}</div><div class="f-name">${f.n}命</div>`;
  c.onclick=()=>{
    document.querySelectorAll('.fate-card').forEach(x=>x.classList.remove('on'));
    c.classList.add('on');
    sf=i;
    var bd=document.getElementById('bonus');bd.innerHTML='<span class="bonus-name" style="color:#ffd700;font-weight:700">'+f.e+' '+f.n+'命</span><span class="bonus-desc"> · 产金×'+f.c+' · 龙气×'+f.q+' · 经验×'+f.exp+'</span>';
    upd();
  };
  fg.appendChild(c);
});


function upd(){
  const btn=document.getElementById('sBtn');
  if(sz>=0&&sf>=0){
    btn.className='start-btn ready';
    btn.textContent='天机降临 · 开始';
  } else {
    btn.className='start-btn';
    btn.textContent='请先选择属相与命格';
  }
}

function doStart(){
  if(sz<0||sf<0) return;
  const z=ZDATA[sz],f=FDATA[sf];
  document.getElementById('mZ').textContent=z.e;
  document.getElementById('mF').textContent=f.e;
  document.getElementById('mZn').textContent=z.n;
  document.getElementById('mFn').textContent=f.n;
  document.getElementById('mDesc').textContent=f.d;
  document.getElementById('modal').classList.add('show');
}

</script>

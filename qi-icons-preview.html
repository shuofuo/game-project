<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>龙气图标预览</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#07071a;gap:24px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;padding:20px;}
.item{display:flex;flex-direction:column;align-items:center;gap:10px;}
.label{color:#888;font-size:12px;letter-spacing:2px;}
.icons{display:flex;gap:24px;align-items:center;padding:20px;background:rgba(255,255,255,.03);border-radius:16px;border:1px solid rgba(255,255,255,.08);}
</style>
</head>
<body>
<div class="item">
  <div class="label">① 龙纹图标 SVG</div>
  <div class="icons">
    <svg width="48" height="48" viewBox="0 0 48 48"><defs><radialGradient id="qg1" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#fff8dc"/><stop offset="60%" stop-color="#ffd700"/><stop offset="100%" stop-color="#b8860b"/></radialGradient><filter id="gf1"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><circle cx="24" cy="24" r="20" fill="url(#qg1)" filter="url(#gf1)"/><text x="24" y="30" text-anchor="middle" font-size="18" font-weight="900" fill="#4a3000" font-family="serif">龙</text></svg>
  </div>
</div>
<div class="item">
  <div class="label">② 光球图标</div>
  <div class="icons">
    <div style="width:48px;height:48px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#e0f7fa,#a0d8ef 40%,#4fc3f7 70%,#0277bd);box-shadow:0 0 16px #4fc3f7,0 0 32px rgba(79,195,247,.4);display:inline-block;"></div>
  </div>
</div>
<div class="item">
  <div class="label">③ 龙字图标</div>
  <div class="icons">
    <div style="width:44px;height:56px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#ffd700,#b8860b);border-radius:6px;border:2px solid #daa520;box-shadow:0 0 12px rgba(255,215,0,.4);font-size:22px;font-weight:900;color:#3a2000;font-family:'KaiTi','STKaiti',serif;text-shadow:0 0 6px rgba(255,215,0,.6);">龙</div>
  </div>
</div>
<div class="item">
  <div class="label">④ 六角星光效</div>
  <div class="icons">
    <div style="width:48px;height:48px;position:relative;display:inline-block;">
      <div style="position:absolute;inset:4px;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);background:linear-gradient(135deg,#ffd700,#ff8c00);box-shadow:0 0 16px #ffd700,0 0 32px rgba(255,215,0,.3);"></div>
    </div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手机模拟器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: sans-serif;
  }
  /* 手机外框 */
  .phone-frame {
    width: 390px;
    height: 844px;
    background: #111;
    border-radius: 47px;
    padding: 12px;
    box-shadow:
      0 0 0 3px #333,
      0 0 0 5px #111,
      0 20px 60px rgba(0,0,0,.6);
    position: relative;
    flex-shrink: 0;
  }
  /* 边框圆角效果 */
  .phone-frame::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 47px;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,.08);
    pointer-events: none;
    z-index: 10;
  }
  /* 屏幕 */
  .phone-screen {
    width: 100%;
    height: 100%;
    border-radius: 38px;
    overflow: hidden;
    background: #07071a;
    position: relative;
  }
  /* 刘海 */
  .phone-screen::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 34px;
    background: #111;
    border-radius: 0 0 22px 22px;
    z-index: 20;
  }
  /* 灵动岛 */
  .phone-screen::after {
    content: '';
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 94px;
    height: 34px;
    background: #000;
    border-radius: 20px;
    z-index: 21;
  }
  /* home indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: rgba(255,255,255,.35);
    border-radius: 3px;
    z-index: 20;
  }
  /* 游戏 iframe */
  .phone-screen iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
  /* 侧边按键 */
  .side-btn {
    position: absolute;
    background: #333;
    border-radius: 2px;
  }
  .side-btn-power {
    width: 3px;
    height: 90px;
    right: -5px;
    top: 200px;
  }
  .side-btn-volume-up {
    width: 3px;
    height: 50px;
    left: -5px;
    top: 160px;
  }
  .side-btn-volume-down {
    width: 3px;
    height: 50px;
    left: -5px;
    top: 225px;
  }
  /* 底部手机名称 */
  .phone-label {
    text-align: center;
    color: #555;
    font-size: 13px;
    margin-top: 16px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="side-btn side-btn-power"></div>
  <div class="side-btn side-btn-volume-up"></div>
  <div class="side-btn side-btn-volume-down"></div>
  <div class="phone-screen">
    <iframe id="gameFrame" src="./?sim=1"></iframe>
    <div class="home-indicator"></div>
  </div>
</div>
<div class="phone-label">iPhone 15 Pro · 390×844</div>

<script>
  // 调试：显示当前 URL 并自动刷新
  const frame = document.getElementById('gameFrame');
  frame.addEventListener('load', () => {
    console.log('游戏已加载到模拟器中');
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>布局L3：紧凑单列</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100dvh;background:#0d0d14;display:flex;align-items:center;justify-content:center;font-family:system-ui}
.page{max-width:500px;width:100%;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* 顶栏：紧凑双行 */
.top{flex-shrink:0;background:#0a0a10;border-bottom:1px solid rgba(255,255,255,.06)}
.top-row1{height:40px;display:flex;align-items:center;justify-content:space-between;padding:0 12px}
.top-row1 .l{display:flex;align-items:center;gap:6px;font-size:16px}
.top-row1 .r{display:flex;gap:10px}
.top-row1 .stat{display:flex;align-items:center;gap:4px;font-size:13px;color:#ffd700;font-weight:700}
.top-row1 .stat em{font-style:normal;font-size:11px;color:#a0d8ef;font-weight:400}
.top-row2{height:30px;display:flex;align-items:center;justify-content:center;gap:4px;padding:0 10px;
  border-top:1px solid rgba(255,255,255,.04);overflow:hidden}
.sk-item{min-width:56px;padding:2px 6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:8px;display:flex;align-items:center;gap:5px;cursor:pointer;flex-shrink:0}
.sk-item .n{font-size:10px;color:#c8c8d8;font-weight:600}
.sk-item .d{font-size:10px;color:rgba(255,255,255,.25)}

/* 中段 */
.mid{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}

/* 标签切换区 */
.tabs{flex-shrink:0;display:flex;align-items:center;gap:0;padding:0 10px;height:36px;
  border-bottom:1px solid rgba(255,255,255,.04)}
.tab{flex:1;padding:4px 0;text-align:center;font-size:12px;color:rgba(255,255,255,.3);
  cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.on{color:#ffd700;border-bottom-color:#ffd700}

/* 灵兽网格——紧凑 */
.grid-hd{flex-shrink:0;padding:6px 10px 4px;display:flex;justify-content:space-between;align-items:center}
.grid-hd span{font-size:12px;color:#c8c8d8}
.grid-hd small{font-size:11px;color:rgba(255,255,255,.2)}
.dg-wrap{flex:1;padding:4px 8px 8px;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;align-content:start;overflow:hidden}
.dg{aspect-ratio:1;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);
  border-radius:7px;display:flex;align-items:center;justify-content:center;
  position:relative;font-size:clamp(18px,4.2vw,28px);cursor:pointer}
.dg .lv{position:absolute;top:1px;left:3px;font-size:9px;color:rgba(255,255,255,.35)}
.dg.hi{border-color:rgba(255,215,0,.3);background:rgba(255,215,0,.05)}
.dg.emp{opacity:.15}

/* 底部悬浮主角条 */
.hero-bar{
  flex-shrink:0;height:70px;
  background:linear-gradient(0deg,rgba(10,10,16,.98) 0%,rgba(10,10,16,.85) 100%);
  border-top:1px solid rgba(255,215,0,.12);
  display:flex;align-items:center;padding:0 12px;gap:10px;
  backdrop-filter:blur(16px)
}
.hero-portrait{width:50px;height:50px;flex-shrink:0;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,215,0,.2);border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:30px}
.hero-info{flex:1;display:flex;flex-direction:column;gap:2px}
.hero-name{font-size:13px;color:#ffd700;font-weight:700}
.hero-meta{display:flex;gap:8px;font-size:11px;color:rgba(255,255,255,.3)}
.hero-meta span{color:rgba(255,215,0,.4)}
.hero-lv{font-size:11px;color:#c8c8d8;font-weight:600}
.hero-btns{display:flex;gap:5px}
.hero-btn{padding:6px 12px;border-radius:9px;border:none;cursor:pointer;font-size:12px;font-weight:600;
  transition:transform .15s}
.hero-btn:hover{transform:scale(1.04)}
.hero-btn.pk{background:rgba(255,215,0,.12);color:#ffd700;border:1px solid rgba(255,215,0,.3)}
.hero-btn.n{background:rgba(255,255,255,.05);color:#999;border:1px solid rgba(255,255,255,.08)}

/* 召唤按钮区 */
.bot{flex-shrink:0;height:56px;background:#0a0a10;border-top:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;gap:8px;padding:0 14px}
.s-btn{padding:10px 14px;border-radius:12px;border:none;cursor:pointer;font-size:13px;font-weight:600;
  transition:transform .15s;display:flex;align-items:center;gap:5px}
.s-btn:hover{transform:scale(1.04)}
.s-btn.c{background:#1a1a22;color:#ffd700;border:1px solid rgba(255,215,0,.25)}
.s-btn.c em{font-style:normal;font-size:11px;opacity:.6}
.s-btn.q{background:#121820;color:#7ab8f0;border:1px solid rgba(122,184,240,.25)}
.s-btn.f{background:#111a11;color:#70c070;border:1px solid rgba(112,192,112,.25)}

  .qi-icon{display:inline-block;border-radius:50%;background:radial-gradient(circle at 35% 35%,#e0f7fa,#a0d8ef 40%,#4fc3f7 70%,#0277bd);box-shadow:0 0 6px #4fc3f7,0 0 12px rgba(79,195,247,.35);vertical-align:middle;}.qi-icon-sm{width:12px;height:12px;}.qi-icon-md{width:16px;height:16px;}.qi-icon-lg{width:20px;height:20px;}
</style>
</head>
<body>
<div class="page">
  <div class="top">
    <div class="top-row1">
      <div class="l"><span>🐉</span><span style="font-size:13px;color:#c8c8d8">木命·大吉</span></div>
      <div class="r">
        <div class="stat">💰<span>12,847</span><em>+86/s</em></div>
        <div class="stat"><span class="qi-icon qi-icon-sm"></span><span style="color:#c8a0ef">520</span></div>
      </div>
    </div>
    <div class="top-row2">
      <div class="sk-item"><span>📋</span><span class="n">任务</span><span class="d">3/5</span></div>
      <div class="sk-item"><span>🎁</span><span class="n">签到</span><span class="d">未签</span></div>
      <div class="sk-item"><span>🏆</span><span class="n">挑战</span><span class="d">4天</span></div>
      <div class="sk-item"><span>⚡</span><span class="n">活动</span><span class="d">进行中</span></div>
    </div>
  </div>
  <div class="mid">
    <div class="tabs">
      <div class="tab on">🐾 灵兽</div>
      <div class="tab">🌿 图鉴</div>
      <div class="tab">📜 任务</div>
      <div class="tab">💬 排行</div>
    </div>
    <div class="grid-hd"><span>12只灵兽</span><small>+86/s</small></div>
    <div class="dg-wrap">
      <div class="dg hi"><span class="lv">5</span>🐉</div>
      <div class="dg"><span class="lv">3</span>🐍</div><div class="dg"><span class="lv">2</span>🐴</div>
      <div class="dg"><span class="lv">1</span>🐏</div><div class="dg"><span class="lv">4</span>🐅</div>
      <div class="dg"><span class="lv">3</span>🐂</div><div class="dg"><span class="lv">2</span>🐇</div>
      <div class="dg"><span class="lv">1</span>🐀</div><div class="dg"><span class="lv">3</span>🐎</div>
      <div class="dg"><span class="lv">2</span>🐒</div><div class="dg"><span class="lv">6</span>🐓</div>
      <div class="dg"><span class="lv">1</span>🐕</div><div class="dg"><span class="lv">2</span>🐖</div>
      <div class="dg emp"></div><div class="dg emp"></div><div class="dg emp"></div>
      <div class="dg emp"></div><div class="dg emp"></div><div class="dg emp"></div>
      <div class="dg emp"></div><div class="dg emp"></div><div class="dg emp"></div>
      <div class="dg emp"></div><div class="dg emp"></div><div class="dg emp"></div>
    </div>
    <div class="hero-bar">
      <div class="hero-portrait">🐉</div>
      <div class="hero-info">
        <div class="hero-name">主角</div>
        <div class="hero-meta"><span>木命</span><span>大吉</span><span>🐣→🐥→🐦</span></div>
        <div class="hero-lv">Lv.5 <span style="color:#ffd700">+55/s</span></div>
      </div>
      <div class="hero-btns">
        <button class="hero-btn pk">升星</button>
        <button class="hero-btn n">详情</button>
      </div>
    </div>
  </div>
  <div class="bot">
    <button class="s-btn c">💰 <em>100</em></button>
    <button class="s-btn q"><span class="qi-icon qi-icon-sm"></span> 500</button>
    <button class="s-btn f">🌿 免费×3</button>
  </div>
</div>
</body></html>

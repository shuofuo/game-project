<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>布局L4：右侧窄卡</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100dvh;background:#0d0d14;display:flex;align-items:center;justify-content:center;font-family:system-ui}
.page{max-width:500px;width:100%;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* 顶栏 */
.hud{flex-shrink:0;height:44px;background:#0a0a10;border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:space-between;padding:0 14px}
.hud-icon{font-size:18px}
.hud-res{display:flex;gap:12px}
.hud-stat{display:flex;align-items:center;gap:4px;font-size:14px}
.hud-stat .v{color:#ffd700;font-weight:700}
.hud-stat .q{color:#a0d8ef}

/* 技能条 */
.sk{flex-shrink:0;height:34px;background:#0a0a10;border-bottom:1px solid rgba(255,255,255,.04);
  display:flex;align-items:center;justify-content:center;gap:5px;padding:0 12px}
.sk-item{min-width:46px;padding:3px 8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:8px;display:flex;flex-direction:column;align-items:center;gap:0;cursor:pointer}
.sk-item .n{font-size:9px;color:#c8c8d8;font-weight:600}
.sk-item .d{font-size:8px;color:rgba(255,255,255,.3)}

/* 主区域 */
.main{flex:1;display:flex;min-height:0;overflow:hidden}

/* 左侧边图标栏 */
.side{width:38px;flex-shrink:0;background:#0a0a10;
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:16px 0}
.sb{width:28px;height:28px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
  border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer}

/* 灵兽网格 */
.grid{flex:1;display:flex;flex-direction:column;min-width:0}
.grid-hd{flex-shrink:0;padding:7px 10px 5px;border-bottom:1px solid rgba(255,255,255,.04);
  display:flex;justify-content:space-between;align-items:center}
.grid-hd span{font-size:12px;color:#c8c8d8}
.grid-hd small{font-size:10px;color:rgba(255,255,255,.2)}
.dg-wrap{flex:1;padding:7px;display:grid;grid-template-columns:repeat(4,1fr);gap:5px;align-content:start;overflow:hidden}
.dg{aspect-ratio:1;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  position:relative;font-size:clamp(18px,4vw,26px);cursor:pointer}
.dg .lv{position:absolute;top:2px;left:3px;font-size:9px;color:rgba(255,255,255,.35)}
.dg.hi{border-color:rgba(255,215,0,.3);background:rgba(255,215,0,.05)}
.dg.emp{opacity:.15}

/* 右侧主角卡——窄卡片 */
.hero-card{
  width:86px;flex-shrink:0;background:#0a0a10;
  border-left:1px solid rgba(255,215,0,.1);
  display:flex;flex-direction:column;align-items:center;padding:10px 6px;gap:3px;
  overflow:hidden
}
.hero-band{
  width:100%;font-size:9px;text-align:center;padding:2px 0;
  background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.1);
  border-radius:6px;color:rgba(255,215,0,.5);letter-spacing:1px;margin-bottom:2px
}
.hero-portrait{width:56px;height:56px;flex-shrink:0;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,215,0,.2);border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:32px}
.hero-evo{font-size:11px;opacity:.2}
.hero-name{font-size:10px;color:rgba(255,255,255,.4);text-align:center}
.hero-lv{font-size:12px;font-weight:700;color:#c8c8d8;text-align:center}
.hero-cps{font-size:10px;color:#ffd700;text-align:center}
.hero-divider{width:60%;height:1px;background:rgba(255,255,255,.06);margin:2px 0}
.hero-btns{display:flex;flex-direction:column;gap:3px;width:100%}
.hero-btn{font-size:10px;padding:4px 0;border-radius:7px;border:none;cursor:pointer;
  text-align:center;font-weight:600;transition:transform .15s}
.hero-btn:hover{transform:scale(1.02)}
.hero-btn.pk{background:rgba(255,215,0,.1);color:#ffd700;border:1px solid rgba(255,215,0,.2)}
.hero-btn.n{background:rgba(255,255,255,.04);color:#888;border:1px solid rgba(255,255,255,.07)}

/* 底栏 */
.bot{flex-shrink:0;height:50px;background:#0a0a10;border-top:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;gap:8px;padding:0 14px}
.s-btn{padding:9px 14px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;
  transition:transform .15s}
.s-btn:hover{transform:scale(1.04)}
.s-btn.c{background:#1a1a22;color:#ffd700;border:1px solid rgba(255,215,0,.25)}
.s-btn.q{background:#121820;color:#7ab8f0;border:1px solid rgba(122,184,240,.25)}
.s-btn.f{background:#111a11;color:#70c070;border:1px solid rgba(112,192,112,.25)}
</style>
</head>
<body>
<div class="page">
  <div class="hud"><span class="hud-icon">🐉</span>
    <div class="hud-res">
      <div class="hud-stat"><span>💰</span><span class="v">12,847</span><span class="q" style="font-size:11px">+86/s</span></div>
      <div class="hud-stat"><span>✨</span><span class="q">520</span></div>
    </div>
    <span style="font-size:10px;color:rgba(255,215,0,.2)">⭐⭐</span>
  </div>
  <div class="sk">
    <div class="sk-item"><span class="n">签到</span><span class="d">未签到</span></div>
    <div class="sk-item"><span class="n">任务</span><span class="d">3/5</span></div>
    <div class="sk-item"><span class="n">活动</span><span class="d">进行中</span></div>
    <div class="sk-item"><span class="n">挑战</span><span class="d">4天</span></div>
    <div class="sk-item"><span class="n">排行</span><span class="d">前10%</span></div>
  </div>
  <div class="main">
    <div class="side">
      <div style="display:flex;flex-direction:column;gap:2px">
        <div class="sb">📋</div><div class="sb">📝</div><div class="sb">⚡</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:2px">
        <div class="sb">🏆</div><div class="sb">📊</div><div class="sb">⚙️</div>
      </div>
    </div>
    <div class="grid">
      <div class="grid-hd"><span>🐾 灵兽</span><small>12只 · +86/s</small></div>
      <div class="dg-wrap">
        <div class="dg hi"><span class="lv">5</span>🐉</div>
        <div class="dg"><span class="lv">3</span>🐍</div><div class="dg"><span class="lv">2</span>🐴</div>
        <div class="dg"><span class="lv">1</span>🐏</div><div class="dg"><span class="lv">4</span>🐅</div>
        <div class="dg"><span class="lv">3</span>🐂</div><div class="dg"><span class="lv">2</span>🐇</div>
        <div class="dg"><span class="lv">1</span>🐀</div><div class="dg"><span class="lv">3</span>🐎</div>
        <div class="dg"><span class="lv">2</span>🐒</div><div class="dg"><span class="lv">6</span>🐓</div>
        <div class="dg"><span class="lv">1</span>🐕</div><div class="dg"><span class="lv">2</span>🐖</div>
        <div class="dg emp"></div><div class="dg emp"></div><div class="dg emp"></div>
        <div class="dg emp"></div><div class="dg emp"></div><div class="dg emp"></div>
        <div class="dg emp"></div><div class="dg emp"></div>
      </div>
    </div>
    <div class="hero-card">
      <div class="hero-band">木命·大吉</div>
      <div class="hero-portrait">🐉</div>
      <div class="hero-evo">🐣→🐥→🐦→🐓</div>
      <div class="hero-name">主角</div>
      <div class="hero-lv">Lv.5</div>
      <div class="hero-cps">+55/s</div>
      <div class="hero-divider"></div>
      <div class="hero-btns">
        <button class="hero-btn pk">升星</button>
        <button class="hero-btn n">详情</button>
      </div>
    </div>
  </div>
  <div class="bot">
    <button class="s-btn c">💰 100</button>
    <button class="s-btn q">✨ 500</button>
    <button class="s-btn f">🌿 免费×3</button>
  </div>
</div>
</body></html>

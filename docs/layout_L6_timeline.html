<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>布局L6：横向时间线</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100dvh;background:#0d0d14;display:flex;align-items:center;justify-content:center;font-family:system-ui}
.page{max-width:500px;width:100%;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* 顶栏 */
.hud{flex-shrink:0;height:44px;background:#0a0a10;border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:space-between;padding:0 14px}
.hud-icon{font-size:18px}
.hud-res{display:flex;gap:12px}
.hud-stat{display:flex;align-items:center;gap:4px;font-size:14px}
.hud-stat .v{color:#ffd700;font-weight:700}
.hud-stat .q{color:#a0d8ef}
.hud-star{font-size:10px;color:rgba(255,215,0,.2)}

/* 技能条 */
.sk{flex-shrink:0;height:32px;background:#0a0a10;border-bottom:1px solid rgba(255,255,255,.04);
  display:flex;align-items:center;justify-content:center;gap:4px;padding:0 10px;overflow-x:auto}
.sk-item{min-width:50px;padding:2px 8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:7px;display:flex;align-items:center;gap:4px;cursor:pointer;flex-shrink:0}
.sk-item .n{font-size:9px;color:#c8c8d8;font-weight:600}
.sk-item .d{font-size:9px;color:rgba(255,255,255,.25)}

/* 主角时间线区 */
.hero-timeline{
  flex-shrink:0;height:76px;background:#0a0a10;
  border-bottom:1px solid rgba(255,215,0,.08);
  display:flex;align-items:center;padding:0 10px;gap:0;
  overflow-x:auto;position:relative
}
.ht-line{
  position:absolute;top:50%;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,215,0,.15) 20%,rgba(255,215,0,.25) 50%,rgba(255,215,0,.15) 80%,transparent);
  transform:translateY(-50%);pointer-events:none
}
.ht-node{position:relative;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:1px;padding:0 8px}
.ht-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,215,0,.1);
  border:1px solid rgba(255,215,0,.2)}
.ht-dot.on{background:rgba(255,215,0,.3);border-color:#ffd700;box-shadow:0 0 6px rgba(255,215,0,.3)}
.ht-emoji{font-size:18px;opacity:.6}
.ht-emoji.on{opacity:1}
.ht-lbl{font-size:8px;color:rgba(255,255,255,.25)}
.ht-lbl.on{color:#ffd700}

/* 中段——灵兽横向滚动 */
.scroll-section{
  flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden
}
.scroll-hd{flex-shrink:0;padding:6px 10px 4px;display:flex;justify-content:space-between;align-items:center}
.scroll-hd span{font-size:11px;color:#c8c8d8}
.scroll-hd small{font-size:10px;color:rgba(255,255,255,.2)}

/* 灵兽行——5列一行，多行 */
.dg-scroll{flex:1;overflow-y:auto;padding:4px 8px 8px}
.dg-row{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:5px}
.dg{aspect-ratio:1;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  position:relative;font-size:clamp(20px,4.5vw,30px);cursor:pointer}
.dg .lv{position:absolute;top:2px;left:3px;font-size:9px;color:rgba(255,255,255,.35)}
.dg.hi{border-color:rgba(255,215,0,.3);background:rgba(255,215,0,.05)}
.dg.emp{opacity:.15}

/* 底栏——召唤横向扩展 */
.bot{
  flex-shrink:0;height:54px;background:#0a0a10;
  border-top:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;gap:8px;padding:0 14px
}
.bot-ext{width:100%;display:flex;align-items:center;gap:8px}
.s-btn{flex:1;padding:10px 0;border-radius:12px;border:none;cursor:pointer;
  font-size:13px;font-weight:600;transition:transform .15s;
  display:flex;align-items:center;justify-content:center;gap:5px}
.s-btn:hover{transform:scale(1.03)}
.s-btn.c{background:#1a1a22;color:#ffd700;border:1px solid rgba(255,215,0,.25)}
.s-btn.q{background:#121820;color:#7ab8f0;border:1px solid rgba(122,184,240,.25)}
.s-btn.f{background:#111a11;color:#70c070;border:1px solid rgba(112,192,112,.25)}

  .qi-icon{display:inline-block;border-radius:50%;background:radial-gradient(circle at 35% 35%,#e0f7fa,#a0d8ef 40%,#4fc3f7 70%,#0277bd);box-shadow:0 0 6px #4fc3f7,0 0 12px rgba(79,195,247,.35);vertical-align:middle;}.qi-icon-sm{width:12px;height:12px;}.qi-icon-md{width:16px;height:16px;}.qi-icon-lg{width:20px;height:20px;}
</style>
</head>
<body>
<div class="page">
  <div class="hud"><span class="hud-icon">🐉</span>
    <div class="hud-res">
      <div class="hud-stat"><span>💰</span><span class="v">12,847</span><span class="q" style="font-size:11px">+86/s</span></div>
      <div class="hud-stat"><span><span class="qi-icon qi-icon-sm"></span></span><span class="q">520</span></div>
    </div>
    <span class="hud-star">⭐⭐⭐</span>
  </div>
  <div class="sk">
    <div class="sk-item"><span>📋</span><span class="n">任务</span><span class="d">3/5</span></div>
    <div class="sk-item"><span>🎁</span><span class="n">签到</span><span class="d">未签</span></div>
    <div class="sk-item"><span>⚡</span><span class="n">活动</span><span class="d">进行中</span></div>
    <div class="sk-item"><span>🏆</span><span class="n">挑战</span><span class="d">4天</span></div>
    <div class="sk-item"><span>📊</span><span class="n">排行</span><span class="d">前5%</span></div>
  </div>

  <!-- 主角时间线 -->
  <div class="hero-timeline">
    <div class="ht-line"></div>
    <div class="ht-node">
      <div class="ht-dot"></div>
      <div class="ht-emoji">🐣</div>
      <div class="ht-lbl">Lv.1</div>
    </div>
    <div class="ht-node">
      <div class="ht-dot"></div>
      <div class="ht-emoji">🐥</div>
      <div class="ht-lbl">Lv.2</div>
    </div>
    <div class="ht-node">
      <div class="ht-dot on"></div>
      <div class="ht-emoji on">🐦</div>
      <div class="ht-lbl on">Lv.3</div>
    </div>
    <div class="ht-node">
      <div class="ht-dot"></div>
      <div class="ht-emoji">🐓</div>
      <div class="ht-lbl">Lv.4</div>
    </div>
    <div class="ht-node">
      <div class="ht-dot"></div>
      <div class="ht-emoji" style="opacity:.3">❓</div>
      <div class="ht-lbl">Lv.5?</div>
    </div>
    <div class="ht-node">
      <div class="ht-dot"></div>
      <div class="ht-emoji" style="opacity:.3">❓</div>
      <div class="ht-lbl">Lv.6?</div>
    </div>
  </div>

  <div class="scroll-section">
    <div class="scroll-hd"><span>🐾 灵兽</span><small>12只 · +86/s</small></div>
    <div class="dg-scroll">
      <div class="dg-row">
        <div class="dg hi"><span class="lv">5</span>🐉</div>
        <div class="dg"><span class="lv">3</span>🐍</div>
        <div class="dg"><span class="lv">2</span>🐴</div>
        <div class="dg"><span class="lv">1</span>🐏</div>
        <div class="dg"><span class="lv">4</span>🐅</div>
      </div>
      <div class="dg-row">
        <div class="dg"><span class="lv">3</span>🐂</div>
        <div class="dg"><span class="lv">2</span>🐇</div>
        <div class="dg"><span class="lv">1</span>🐀</div>
        <div class="dg"><span class="lv">3</span>🐎</div>
        <div class="dg"><span class="lv">2</span>🐒</div>
      </div>
      <div class="dg-row">
        <div class="dg"><span class="lv">6</span>🐓</div>
        <div class="dg"><span class="lv">1</span>🐕</div>
        <div class="dg"><span class="lv">2</span>🐖</div>
        <div class="dg emp"></div>
        <div class="dg emp"></div>
      </div>
      <div class="dg-row">
        <div class="dg emp"></div><div class="dg emp"></div>
        <div class="dg emp"></div><div class="dg emp"></div>
        <div class="dg emp"></div>
      </div>
    </div>
  </div>

  <div class="bot">
    <div class="bot-ext">
      <button class="s-btn c">💰 100</button>
      <button class="s-btn q"><span class="qi-icon qi-icon-sm"></span> 500</button>
      <button class="s-btn f">🌿 免费×3</button>
    </div>
  </div>
</div>
</body></html>

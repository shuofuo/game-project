<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>生肖天机 · 风格G：霓虹梦境</title>
<style>
.game{
  display:flex;flex-direction:column;
  height:100dvh;max-width:500px;margin:0 auto;
  background:#0a0618;overflow:hidden;position:relative;
}
/* 柔光光晕 */
.game::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 50% at 30% 100%,rgba(180,80,255,.12) 0%,transparent 60%),
    radial-gradient(ellipse 50% 35% at 70% 90%,rgba(80,160,255,.1) 0%,transparent 60%),
    radial-gradient(ellipse 40% 25% at 50% 95%,rgba(255,100,200,.08) 0%,transparent 55%);
}

/* 顶栏 */
.top-hud{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;height:48px;
  background:rgba(10,6,24,.85);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(180,80,255,.2);
  position:relative;z-index:2;
}
.hud-zodiac{font-size:20px;filter:drop-shadow(0 0 8px rgba(180,80,255,.7));}
.hud-center{display:flex;align-items:center;gap:14px;}
.hud-stat{display:flex;align-items:center;gap:4px;}
.hud-stat .icon{font-size:15px;}
.hud-stat .val{font-size:15px;font-weight:700;color:#e060f0;text-shadow:0 0 12px rgba(224,96,240,.7);}
.hud-stat .cps{font-size:11px;color:rgba(80,160,255,.5);}
.hud-stat .qi{color:#60b0ff;text-shadow:0 0 8px rgba(96,176,255,.7);}
.hud-yunshi{font-size:12px;color:rgba(180,80,255,.35);letter-spacing:2px;}

/* 技能条 */
.skill-row{
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  padding:5px 12px;gap:6px;
  background:rgba(10,6,24,.7);border-bottom:1px solid rgba(180,80,255,.08);position:relative;z-index:2;
}
.skill-item{
  display:flex;flex-direction:column;align-items:center;gap:1px;
  padding:4px 10px;min-width:50px;
  background:rgba(180,80,255,.05);border:1px solid rgba(180,80,255,.15);
  border-radius:10px;cursor:pointer;transition:all .2s;
}
.skill-item:hover{background:rgba(180,80,255,.12);border-color:rgba(180,80,255,.45);}
.skill-item .sname{font-size:11px;font-weight:600;color:#e060f0;}
.skill-item .scd{font-size:10px;color:rgba(180,80,255,.4);}
.skill-dot{position:absolute;top:2px;right:2px;width:5px;height:5px;border-radius:50%;background:#ff50a0;box-shadow:0 0 6px rgba(255,80,160,.8);}

/* 中间 */
.mid-row{flex:1;display:flex;min-height:0;overflow:hidden;position:relative;z-index:2;}

/* 左栏 */
.sidebar{
  width:44px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  padding:28px 0 72px;
  background:linear-gradient(to bottom,rgba(0,0,0,.3) 0%,transparent 25%,transparent 75%,rgba(0,0,0,.25) 100%);
}
.sd-btn{
  width:34px;height:34px;margin:2px 0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(180,80,255,.05);border:1px solid rgba(180,80,255,.12);
  border-radius:10px;cursor:pointer;font-size:15px;
  transition:all .2s;
}
.sd-btn:hover{background:rgba(180,80,255,.15);border-color:rgba(180,80,255,.5);box-shadow:0 0 12px rgba(180,80,255,.3);}

/* 灵兽格子 */
.dragon-sec{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.dragon-hd{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px 7px;
  border-bottom:1px solid rgba(180,80,255,.1);
}
.dragon-hd span{font-size:12px;font-weight:600;color:#e060f0;letter-spacing:1px;}
.dragon-hd small{color:rgba(180,80,255,.3);font-size:11px;}
.dragon-grid{
  flex:1;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;
  padding:10px;align-content:start;overflow:hidden;
}
.dg{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  background:rgba(180,80,255,.05);border:1px solid rgba(180,80,255,.15);
  border-radius:12px;position:relative;font-size:clamp(22px,5vw,33px);
  cursor:pointer;transition:all .2s;
}
.dg:hover{transform:scale(1.08);border-color:rgba(180,80,255,.6);background:rgba(180,80,255,.1);box-shadow:0 0 10px rgba(180,80,255,.25);}
.dg .lv{
  position:absolute;top:2px;left:4px;font-size:9px;font-weight:700;color:#e060f0;text-shadow:0 0 6px rgba(224,96,240,.7);
}
.dg.hi{border-color:rgba(255,200,80,.5);background:rgba(255,200,80,.07);box-shadow:0 0 8px rgba(255,200,80,.2);}
.dg.sp{border-color:rgba(80,160,255,.5);background:rgba(80,160,255,.06);box-shadow:0 0 8px rgba(80,160,255,.2);}
.dg.le{border-color:rgba(180,80,255,.6);background:rgba(180,80,255,.1);box-shadow:0 0 8px rgba(180,80,255,.25);}

/* 主角卡 */
.hero-card{
  width:116px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 7px;gap:3px;
  background:rgba(180,80,255,.02);border-left:1px solid rgba(180,80,255,.08);
}
.hero-fate{font-size:9px;color:rgba(224,96,240,.4);letter-spacing:2px;}
.hero-glow{width:74px;height:74px;position:relative;display:flex;align-items:center;justify-content:center;}
.hero-glow::before{
  content:'';position:absolute;inset:-14px;
  background:radial-gradient(circle,rgba(180,80,255,.25) 0%,transparent 65%);
  border-radius:50%;animation:neon-pulse 2.5s ease-in-out infinite;
}
.hero-glow::after{
  content:'';position:absolute;inset:-8px;
  border:1.5px solid rgba(80,160,255,.25);border-radius:50%;
}
@keyframes neon-pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
.hero-icon{font-size:58px;line-height:1;z-index:2;filter:drop-shadow(0 0 12px rgba(180,80,255,.7));}
.hero-evo{display:flex;gap:2px;font-size:14px;opacity:.3;align-items:center;}
.hero-lv{font-size:11px;font-weight:700;color:#e060f0;text-shadow:0 0 8px rgba(224,96,240,.6);}
.hero-cps{font-size:10px;color:rgba(80,160,255,.4);}
.hero-btns{display:flex;gap:4px;margin-top:3px;}
.hero-btn{
  font-size:11px;padding:4px 9px;border-radius:10px;
  border:1px solid rgba(180,80,255,.2);background:rgba(180,80,255,.05);
  color:#c050d8;cursor:pointer;transition:all .2s;
}
.hero-btn:hover{background:rgba(180,80,255,.15);border-color:rgba(180,80,255,.5);color:#e060f0;}
.hero-btn.pk{background:rgba(180,80,255,.15);border-color:rgba(180,80,255,.5);color:#e060f0;text-shadow:0 0 6px rgba(224,96,240,.5);}

/* 底栏 */
.bot-bar{
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  gap:10px;padding:10px 14px calc(10px + env(safe-area-inset-bottom,6px));
  background:rgba(10,6,24,.88);border-top:1px solid rgba(180,80,255,.12);position:relative;z-index:2;
}
.sm-btn{
  display:flex;align-items:center;gap:5px;
  padding:9px 15px;border-radius:14px;border:none;cursor:pointer;
  font-size:14px;font-weight:700;transition:all .2s;
}
.sm-btn:hover{transform:scale(1.04);}
.sm-btn:active{transform:scale(.97);}
.sm-coin{background:linear-gradient(135deg,rgba(180,80,255,.2),rgba(255,80,160,.2));color:#f080ff;border:1px solid rgba(180,80,255,.45);}
.sm-qi{background:linear-gradient(135deg,rgba(80,160,255,.2),rgba(100,80,255,.2));color:#80c0ff;border:1px solid rgba(80,160,255,.45);}
.sm-free{background:linear-gradient(135deg,rgba(80,200,120,.18),rgba(80,160,255,.18));color:#80e890;border:1px solid rgba(80,200,120,.4);}

@media(max-width:400px){
  .hero-card{width:98px;padding:8px 5px;}
  .hero-glow{width:60px;height:60px;}
  .hero-icon{font-size:48px;}
  .sidebar{width:38px;}
}

  .qi-icon{display:inline-block;border-radius:50%;background:radial-gradient(circle at 35% 35%,#e0f7fa,#a0d8ef 40%,#4fc3f7 70%,#0277bd);box-shadow:0 0 6px #4fc3f7,0 0 12px rgba(79,195,247,.35);vertical-align:middle;}.qi-icon-sm{width:12px;height:12px;}.qi-icon-md{width:16px;height:16px;}.qi-icon-lg{width:20px;height:20px;}
</style>
</head>
<body style="margin:0;padding:0;">

  <div class="top-hud">
    <span class="hud-zodiac">🐉</span>
    <div class="hud-center">

<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>生肖天机 · 布局D</title><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: #1a1a2e;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
}
.phone {
  width: 420px;
  height: 95vh;
  max-height: 820px;
  background: #07071a;
  border-radius: 40px;
  overflow: hidden;
  border: 3px solid #333;
  box-shadow: 0 20px 60px rgba(0,0,0,.6);
  display: flex;
  flex-direction: column;
}
/* 通用组件 */
.status-bar { height: 44px; background: #0d0d1a; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #555; letter-spacing: 2px; flex-shrink: 0; }
.hero-btn, .side-btn, .skill-btn, .summon-btn {
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  cursor: pointer;
  transition: all .2s;
}
.side-btn { padding: 6px 4px; font-size: 11px; gap: 4px; }
.side-btn span { display: block; font-size: 9px; color: rgba(255,255,255,.4); margin-top: 1px; }
.hero-btn { flex-direction: column; font-size: 14px; }
.hero-btn span { font-size: 8px; color: rgba(255,255,255,.5); margin-top: 1px; }
.dragon {
  aspect-ratio: 1;
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  cursor: pointer;
}
.dragon.lit { background: rgba(255,215,0,.08); border-color: rgba(255,215,0,.3); box-shadow: 0 0 8px rgba(255,215,0,.15); }
.hero-emoji { font-size: 56px; filter: drop-shadow(0 0 12px rgba(255,215,0,.4)); }
.hero-name { font-size: 9px; color: rgba(255,215,0,.4); letter-spacing: 1.5px; margin: 6px 0 4px; }
.hero-level { font-size: 11px; color: #ffd700; font-weight: 700; letter-spacing: 1px; }
.hero-evo { display: flex; gap: 5px; margin-top: 6px; }
.evo-dot { width: 18px; height: 18px; background: rgba(255,215,0,.1); border: 1px solid rgba(255,215,0,.25); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; }
.evo-dot.active { background: rgba(255,215,0,.2); border-color: #ffd700; }
.hero-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; width: 100%; }
.safe-area { height: env(safe-area-inset-bottom, 0); background: #07071a; flex-shrink: 0; }

.layout-D .top-btns { display: flex; justify-content: space-around; padding: 5px 12px; background: rgba(255,255,255,.02); border-bottom: 1px solid rgba(255,215,0,.08); flex-shrink: 0; }
.layout-D .btn-group { display: flex; gap: 4px; }
.layout-D .side-btn { padding: 4px 6px; font-size: 12px; }
.layout-D .side-btn span { display: none; }
.layout-D .hero-scroll-wrap { padding: 8px 0 6px; background: rgba(255,215,0,.03); border-bottom: 1px solid rgba(255,215,0,.07); flex-shrink: 0; }
.layout-D .hero-scroll { display: flex; gap: 8px; padding: 0 12px; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
.layout-D .hero-scroll::-webkit-scrollbar { display: none; }
.layout-D .hero-card { min-width: 80px; scroll-snap-align: start; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 12px; padding: 8px 6px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
.layout-D .hero-card .emoji { font-size: 28px; }
.layout-D .hero-card .name { font-size: 8px; color: rgba(255,255,255,.4); margin-top: 2px; }
.layout-D .hero-card .level { font-size: 8px; color: #ffd700; margin-top: 2px; }
.layout-D .hero-card.active { background: rgba(255,215,0,.12); border-color: rgba(255,215,0,.4); box-shadow: 0 0 10px rgba(255,215,0,.2); }
.layout-D .hero-card.active .name { color: rgba(255,215,0,.7); }
.layout-D .hero-tabs { display: flex; padding: 6px 12px; gap: 6px; border-bottom: 1px solid rgba(255,215,0,.07); flex-shrink: 0; }
.layout-D .hero-tab { flex: 1; text-align: center; padding: 4px; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07); border-radius: 8px; font-size: 10px; color: rgba(255,255,255,.4); cursor: pointer; }
.layout-D .hero-tab.active { background: rgba(255,215,0,.1); border-color: rgba(255,215,0,.3); color: #ffd700; }
.layout-D .grid-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.layout-D .grid-header { display: flex; align-items: center; gap: 8px; padding: 6px 14px; border-bottom: 1px solid rgba(255,215,0,.07); flex-shrink: 0; }
.layout-D .grid-title { font-size: 12px; color: #ffd700; letter-spacing: 2px; }
.layout-D .grid-count { font-size: 10px; color: rgba(255,255,255,.2); }
.layout-D .grid-inner { flex: 1; display: grid; grid-template-columns: repeat(4,1fr); gap: 7px; padding: 8px 14px; align-content: start; overflow-y: auto; }
.layout-D .skill-row { display: flex; align-items: center; justify-content: center; padding: 6px 16px; background: rgba(7,7,26,.9); border-top: 1px solid rgba(255,215,0,.08); gap: 8px; flex-shrink: 0; }
.layout-D .skill-btn { width: 48px; height: 40px; flex-direction: column; font-size: 15px; gap: 1px; }
.layout-D .skill-btn span { font-size: 7px; color: rgba(255,255,255,.5); }
.layout-D .summon-row { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 6px 20px; background: rgba(7,7,26,.95); flex-shrink: 0; }
.layout-D .summon-btn { padding: 7px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.layout-D .summon-btn.coin { background: linear-gradient(135deg,#2a2000,#1a1000); border-color: #5a4000; color: #c8a020; }
.layout-D .summon-btn.star { background: linear-gradient(135deg,#1a1030,#100a20); border-color: #3a2060; color: #c090ff; }
.layout-D .summon-btn.free { background: linear-gradient(135deg,#0a2000,#051000); border-color: #1a4000; color: #80e040; }
</style></head><body>
<div class="phone layout-D">
  <div class="status-bar">12:33</div>
  <div class="top-btns">
    <div class="btn-group"><button class="side-btn">💎 📅签到</button><button class="side-btn">💎 📝任务</button><button class="side-btn">💎 ⚡活动</button><button class="side-btn">💎 🔮命格</button></div>
    <div class="btn-group"><button class="side-btn">💎 📋活跃</button><button class="side-btn">💎 🏆排行</button><button class="side-btn">💎 🎯成就</button><button class="side-btn">💎 📊统计</button><button class="side-btn">💎 ⚙️设置</button></div>
  </div>
  
<div class="hero-scroll">
  <div class="hero-card active"><div class="emoji">🐣</div><div class="name">木命</div><div class="level">Lv.1</div></div>
  <div class="hero-card"><div class="emoji">🐉</div><div class="name">火命</div><div class="level">Lv.3</div></div>
  <div class="hero-card"><div class="emoji">🦊</div><div class="name">金命</div><div class="level">Lv.5</div></div>
  <div class="hero-card"><div class="emoji">🐍</div><div class="name">水命</div><div class="level">Lv.2</div></div>
  <div class="hero-card"><div class="emoji">🐴</div><div class="name">土命</div><div class="level">Lv.4</div></div>
  <div class="hero-card"><div class="emoji">🐔</div><div class="name">木命</div><div class="level">Lv.1</div></div>
</div>

  
<div class="hero-tabs">
  <div class="hero-tab active">🏔️试炼塔</div>
  <div class="hero-tab">👑皮肤</div>
  <div class="hero-tab">⚒️炼宝</div>
  <div class="hero-tab">📖图鉴</div>
</div>

  <div class="grid-area">
    <div class="grid-header">
      <span class="grid-title">🐾 灵兽</span>
      <span class="grid-count">共 15 只</span>
    </div>
    <div class="grid-inner">
      <div class="dragon lit">🐣</div><div class="dragon lit">🐉</div><div class="dragon lit">🦊</div><div class="dragon lit">🐍</div><div class="dragon lit">🐴</div><div class="dragon">🐔</div><div class="dragon">🐱</div><div class="dragon">🐶</div><div class="dragon">🐷</div><div class="dragon">🐮</div><div class="dragon">🐏</div><div class="dragon">🐐</div><div class="dragon">🐀</div><div class="dragon">🐰</div><div class="dragon">🐵</div>
    </div>
  </div>
  <div class="skill-row">
<div class="skill-btn">⚔️<span>龙息</span></div>
<div class="skill-btn">🛡️<span>护盾</span></div>
<div class="skill-btn">⚡<span>雷霆</span></div>
<div class="skill-btn">🔥<span>流星火雨</span></div>
<div class="skill-btn">💨<span>疾风</span></div>
<div class="skill-btn">❄️<span>寒冰</span></div>
</div>
  <div class="summon-row">
<div class="summon-btn coin">💰 100</div>
<div class="summon-btn star"><span class="qi-icon qi-icon-sm"></span> 500</div>
<div class="summon-btn free">🌿 免费</div>
</div>
  <div class="safe-area"></div>
</div>
</body></html>

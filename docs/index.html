<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resize-content">
<title>生肖天机</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;touch-action:manipulation;}
html,body{height:100%;height:100dvh;overflow:hidden;}
body{background:#07071a;display:flex;align-items:stretch;justify-content:center;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#fff;padding:0;margin:0;min-height:100dvh;touch-action:manipulation;-webkit-text-size-adjust:100%;}

.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#1a1060 0%,transparent 70%),radial-gradient(ellipse 60% 40% at 80% 100%,#0d2050 0%,transparent 60%);}
.stars{position:absolute;inset:0;}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;opacity:.6;animation:twinkle 3s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:1}}

.wrap{position:fixed;z-index:100;width:min(500px,96vw);max-width:96vw;padding:0 0 calc(16px + env(safe-area-inset-bottom)) 0;margin:0 auto;overflow-x:hidden;top:0;left:0;right:0;bottom:0;overflow-y:auto;background:rgba(5,5,16,.98);}

/* ===== 标题区：书法印章风格 ===== */
.logo{text-align:center;margin-bottom:8px;position:relative;}

.logo-badge{
  display:inline-block;
  font-size:12px;letter-spacing:6px;color:#c8a020;
  padding:4px 18px;border-radius:20px;
  background:rgba(255,215,0,.07);
  border:1px solid rgba(255,215,0,.25);
  animation:shimmer 4s ease-in-out infinite;
  margin-bottom:10px;
}
@keyframes shimmer{0%,100%{border-color:rgba(255,215,0,.25);color:#c8a020}50%{border-color:rgba(255,215,0,.5);color:#ffd700}}

.logo-title-wrap{position:relative;display:inline-block;}
.logo-title{
  font-size:clamp(32px,10vw,46px);
  font-weight:900;letter-spacing:12px;
  color:#ffd700;
  text-shadow:0 0 20px rgba(255,215,0,.5),0 0 40px rgba(255,200,0,.2);
  display:block;text-align:center;margin-bottom:8px;
}
.logo-sub{
  font-size:11px;color:#444;letter-spacing:6px;text-transform:uppercase;
}
/* 属相/命格标签 */
.login-label{
  font-size:11px;letter-spacing:4px;color:#666;text-align:center;
  margin-bottom:10px;text-transform:uppercase;
}

/* 12属相淡化装饰 */

/* 分割线 */
.divider{display:none;}

/* 选区 */
.section{display:none;}

/* 属相网格 4x3 */
.zodiac-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:0 auto 14px;max-width:400px;padding:0 12px;box-sizing:border-box;}
.zodiac-card{background:#0f0f2a;border:1.5px solid rgba(255,255,255,.07);border-radius:12px;padding:10px 4px 8px;cursor:pointer;transition:all .2s;text-align:center;user-select:none;}
.zodiac-card:hover{background:#1a1a40;border-color:rgba(255,255,255,.2);}
.zodiac-card:active{transform:scale(.94);transition:transform .05s;}
.zodiac-card.on{background:linear-gradient(135deg,#2a2000,#1a1000);border-color:#ffd700;box-shadow:0 0 14px rgba(255,215,0,.3);}
.zodiac-card .z-emoji{font-size:clamp(26px,8vw,36px);line-height:1;margin-bottom:4px;}
.zodiac-card .z-name{font-size:11px;color:#666;overflow:hidden;white-space:nowrap;}
.zodiac-card.on .z-name{color:#ffd700;font-weight:700;}

/* 命格：grid 与属相宽度一致，5列居中 */
.fate-row{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin:0 auto 12px;max-width:400px;padding:0 12px;box-sizing:border-box;}
.fate-card{background:#0f0f2a;border:1.5px solid rgba(255,255,255,.07);border-radius:12px;padding:10px 4px 8px;cursor:pointer;transition:all .2s;text-align:center;}
.fate-card:hover{background:#1a1a40;border-color:rgba(255,255,255,.2);}
.fate-card:active{transform:scale(.94);transition:transform .05s;}
.fate-card.on{background:linear-gradient(135deg,#1a1a3a,#2a2050);border-color:#ffd700;box-shadow:0 0 16px rgba(255,215,0,.3);}
.fate-card .f-emoji{font-size:clamp(20px,6vw,28px);display:block;margin-bottom:4px;}
.fate-card .f-name{font-size:11px;font-weight:700;display:block;}
.fate-card.fate-0 .f-name{color:#4CAF50}
.fate-card.fate-1 .f-name{color:#FF5722}
.fate-card.fate-2 .f-name{color:#a0785a}
.fate-card.fate-3 .f-name{color:#FFC107}
.fate-card.fate-4 .f-name{color:#42a5f5}
/* 加成描述 */
.bonus{min-height:18px;margin:0 0 12px 0;text-align:center;font-size:11px;color:#555;letter-spacing:.5px;}
.bonus .bonus-name{font-weight:700;margin-right:4px;}
.bonus .bonus-desc{color:#888;}

/* 加成展示 */

/* 开始按钮 */
.start-btn{margin-top:4px;width:100%;padding:12px;font-size:15px;background:linear-gradient(135deg,#2a2000,#1a1000);border:1.5px solid #5a4000;border-radius:30px;color:#777;cursor:not-allowed;letter-spacing:4px;font-weight:600;transition:all .3s;}
.start-btn.ready{background:linear-gradient(135deg,#c8a020,#8b6010);border-color:#ffd700;color:#fff;cursor:pointer;letter-spacing:4px;box-shadow:0 4px 18px rgba(200,160,32,.3);}
.start-btn.ready:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(200,160,32,.4);}
.start-btn:active{transform:scale(.97);}
/* 底部功能栏 */
#gameBottomBar{padding-bottom:max(20px,env(safe-area-inset-bottom));}

/* 弹窗 */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);}
.modal.show{display:flex;}
.modal-box{background:linear-gradient(160deg,#0d0d2a,#1a1a3a);border:1px solid #ffd700;border-radius:28px;padding:40px 36px;width:min(380px,90vw);text-align:center;animation:popIn .35s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.modal-badge{display:inline-block;background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a0a00;font-size:11px;font-weight:800;padding:4px 14px;border-radius:20px;letter-spacing:3px;margin-bottom:20px;}
.modal-chars{display:flex;justify-content:center;align-items:center;gap:20px;margin:16px 0 24px;}
.modal-chars .mc-zodiac,.modal-chars .mc-fate{font-size:64px;line-height:1;}
.modal-chars .mc-vs{font-size:20px;color:#444;}
.modal-info{font-size:13px;color:#888;line-height:1.8;}
.modal-info b{color:#ffd700;}
.modal-btn{margin-top:8px;width:100%;padding:13px;border-radius:30px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:2px;transition:all .2s;}
.modal-btn-start{background:#ffd700;border:none;color:#1a0a00;}
.modal-btn-start:hover{transform:scale(1.02);box-shadow:0 8px 24px rgba(255,215,0,.3);}
.modal-btn-cancel{background:transparent;border:1px solid rgba(255,255,255,.2);color:#888;margin-top:10px;}
.modal-btn-cancel:hover{border-color:rgba(255,255,255,.5);color:#ccc;}

/* ===== 游戏主界面 ===== */
#gamePage{width:100%;height:100dvh;overflow:hidden;touch-action:none;flex-direction:column;padding-bottom:0;display:flex;visibility:hidden;opacity:0;}
.rank-panel{position:fixed;top:0;right:0;width:min(380px,92vw);height:100%;height:100dvh;background:#0a0a1a;z-index:303;display:none;overflow-y:auto;transform:translateX(100%);transition:transform .3s ease;}
.rank-panel.open{display:block;transform:translateX(0);}.rank-panel::-webkit-scrollbar{width:0;}.handbook-panel{position:fixed;top:0;left:0;width:100%;height:100%;height:100dvh;background:#07071a;z-index:301;display:none;overflow-y:auto;}
.handbook-panel.open{display:block;}.handbook-panel::-webkit-scrollbar{width:0;}.cult-panel,.ach-panel{position:fixed;top:0;right:0;width:min(400px,92vw);height:100%;height:100dvh;background:#0a0a1a;z-index:302;display:none;overflow-y:auto;transform:translateX(100%);transition:transform .3s ease;}
.cult-panel.open,.ach-panel.open{display:block;transform:translateX(0);}
.cult-panel::-webkit-scrollbar,.ach-panel::-webkit-scrollbar{width:0;}
@keyframes achSlideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.sign-panel{position:fixed;top:0;left:0;width:100%;height:100%;height:100dvh;background:#07071a;z-index:302;display:none;overflow-y:auto;}
.sign-panel.open{display:block;}
.sign-panel::-webkit-scrollbar{width:0;}
.task-panel{position:fixed;top:0;left:0;width:100%;height:100%;height:100dvh;background:#07071a;z-index:303;display:none;overflow-y:auto;}
.task-panel.open{display:block;}
.task-panel::-webkit-scrollbar{width:0;}
.activity-panel{position:fixed;top:0;right:0;width:min(400px,92vw);height:100%;height:100dvh;background:#0a0a1a;z-index:303;display:none;overflow-y:auto;transform:translateX(100%);transition:transform .3s ease;}
.activity-panel.open{display:block;transform:translateX(0);}
.activity-panel::-webkit-scrollbar{width:0;}
@keyframes achFadeOut{from{opacity:1}to{opacity:0}}
@keyframes achToast{0%{transform:translateX(120%);opacity:0}15%{transform:translateX(0);opacity:1}85%{transform:translateX(0);opacity:1}100%{transform:translateX(120%);opacity:0}}
@keyframes achPopIn{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.08);opacity:1}100%{transform:scale(1);opacity:1}}

#topHud{position:static;background:rgba(7,7,26,.9);padding:10px 14px 8px;border-bottom:1px solid rgba(255,215,0,.15);}
.hud-top{display:flex;align-items:center;justify-content:space-between;}
.hud-left,.hud-right{display:flex;align-items:center;gap:4px;font-size:18px;}
.hud-center{text-align:center;}
.coin-row{display:flex;align-items:center;gap:4px;}
#hudCoins{font-size:clamp(16px,4.5vw,22px);font-weight:700;color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,.4);}
.cps-row{font-size:10px;color:#888;}
#hudCps{color:#aaa;}
#hudQi{font-size:16px;font-weight:600;color:#7eb8ff;}
.hud-bottom{display:flex;justify-content:space-between;font-size:11px;color:#555;margin-top:4px;}
#dragonGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:4px;}
.d-cell{aspect-ratio:1;background:rgba(255,255,255,.025);border:1.5px solid rgba(255,255,255,.05);border-radius:12px;display:flex;align-items:center;justify-content:center;position:relative;transition:all .2s;overflow:hidden;}
.d-cell:hover:not(:has(.d-card)){border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.04);}
.d-cell.mergeable{border-color:rgba(255,215,0,.6)!important;box-shadow:0 0 16px rgba(255,215,0,.35),inset 0 0 20px rgba(255,215,0,.05)!important;}
.d-cell.drop-target{border-color:#ffd700!important;box-shadow:0 0 20px rgba(255,215,0,.5),inset 0 0 24px rgba(255,215,0,.08)!important;background:rgba(255,215,0,.06)!important;}
.d-card{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:grab;user-select:none;border-radius:10px;transition:transform .15s;}
.d-card:active{cursor:grabbing;}
.d-icon{font-size:clamp(20px,5vw,32px);line-height:1;}
.d-lv{position:absolute;bottom:2px;right:4px;font-size:9px;color:rgba(255,255,255,.5);}
.d-gold{position:absolute;top:2px;left:4px;font-size:9px;color:#ffd700;}
.dragging{position:fixed!important;z-index:999;pointer-events:none;transform:translate(-50%,-50%);box-shadow:0 16px 48px rgba(255,215,0,.5),0 0 0 3px rgba(255,215,0,.4);opacity:.95;background:rgba(30,20,70,.97);border-radius:50%;padding:0;width:64px!important;height:64px!important;display:flex!important;align-items:center;justify-content:center;border:2px solid rgba(255,215,0,.3);}
#summonBar{display:flex;gap:10px;padding:10px 16px 16px;}
.sbtn{flex:1;min-width:0;padding:10px 4px 8px;border-radius:14px;border:1.5px solid;cursor:pointer;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:1px;background:rgba(10,10,30,.9);backdrop-filter:blur(4px);transition:all .2s;color:#fff;}
.sbtn small{font-size:10px;opacity:.7;}
.sbtn-coin{border-color:#ffd700;color:#ffd700;}
.sbtn-coin:hover{background:rgba(255,215,0,.15);}
.sbtn-qi{border-color:#7eb8ff;color:#7eb8ff;}
.sbtn-qi:hover{background:rgba(126,184,255,.15);}
.sbtn:disabled{opacity:.35;cursor:not-allowed;}
.sbtn-free{border-color:#4CAF50;color:#4CAF50;}
@keyframes mergeFlash{0%{transform:scale(.8);opacity:0}50%{transform:scale(1.3);opacity:1}100%{transform:scale(1);opacity:0}}
#mergeFlash.show{display:flex!important;animation:mergeFlash .5s ease-out forwards;}


/* ===== 召唤翻牌动画 ===== */
#summonOverlay{
  display:none;position:fixed;inset:0;
  background:rgba(5,5,20,.95);z-index:500;
  align-items:center;justify-content:center;flex-direction:column;
}
#summonOverlay.show{display:flex!important;}
/* 翻牌区域 */
.scard-wrap{
  perspective:800px;width:160px;height:200px;margin:30px 0;
}
.scard{
  width:100%;height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 1.2s cubic-bezier(.4,0,.2,1);
  cursor:pointer;
}
.scard.flipped{transform:rotateY(180deg);}
.scard-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:48px;
  border:2px solid rgba(255,215,0,.4);
}
.scard-back{
  background:linear-gradient(160deg,#1a1a3a,#2a1a4a);
  box-shadow:0 0 40px rgba(255,215,0,.2);
}
.scard-back::before{
  content:'？';font-size:64px;color:rgba(255,215,0,.3);
}
/* 金边框高级感 */
.scard-front{
  background:linear-gradient(160deg,#2a1a3a,#1a1a4a);
  transform:rotateY(180deg);
  border-color:#ffd700;
  box-shadow:0 0 30px rgba(255,215,0,.3);
  flex-direction:column;gap:8px;
}
.scard-front .sf-emoji{font-size:72px;line-height:1;}
.scard-front .sf-name{font-size:18px;color:#ffd700;font-weight:700;}
.scard-front .sf-cps{font-size:11px;color:#888;}
/* 抽卡提示文字 */
.summon-tip{color:rgba(255,255,255,.4);font-size:14px;letter-spacing:4px;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.7}}
/* 结果揭晓区 */
.summon-result-anim{
  display:none;position:relative;text-align:center;
  padding:12px 20px 8px;border-radius:20px;
  animation:sraIn .5s cubic-bezier(.34,1.56,.64,1) forwards;
}
.summon-result-anim.show{display:block;}
@keyframes sraIn{
  from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}
}
/* 稀有度光效 */
.sra-r0{background:rgba(80,80,80,.12);border:1.5px solid rgba(180,180,180,.25);}
.sra-r1{background:rgba(20,70,150,.15);border:1.5px solid rgba(126,184,255,.4);box-shadow:0 0 28px rgba(126,184,255,.12);}
.sra-r2{background:rgba(70,20,120,.2);border:1.5px solid rgba(181,126,220,.5);box-shadow:0 0 38px rgba(181,126,220,.22);}
.sra-r3{background:rgba(100,70,0,.22);border:1.5px solid rgba(255,215,0,.5);box-shadow:0 0 50px rgba(255,200,0,.28);}
.sra-r4{background:rgba(140,30,0,.25);border:1.5px solid rgba(255,107,53,.6);box-shadow:0 0 60px rgba(255,80,20,.38);animation:sraMyth 1.8s ease-in-out infinite;}
@keyframes sraMyth{0%,100%{box-shadow:0 0 60px rgba(255,80,20,.38)}50%{box-shadow:0 0 100px rgba(255,140,40,.55)}}
/* 粒子 */
.sra-pw{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:20px;}
.sra-p{position:absolute;border-radius:50%;animation:sraP 1.2s ease-out forwards;}
@keyframes sraP{0%{transform:translate(0,0) scale(1);opacity:.9}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
.sra-emoji{font-size:88px;margin:6px 0 2px;filter:drop-shadow(0 0 16px rgba(255,215,0,.35));transition:filter .4s;}
.sra-name{font-size:22px;color:#ffd700;font-weight:900;letter-spacing:4px;}
.sra-desc{font-size:13px;color:#888;margin-top:6px;}
.sra-tag{font-size:11px;margin-top:4px;letter-spacing:3px;font-weight:700;opacity:.85;}
.sra-new{font-size:11px;color:#ff9800;letter-spacing:2px;margin-top:4px;animation:sraNew 1.2s ease-in-out infinite;}
@keyframes sraNew{0%,100%{opacity:1}50%{opacity:.45}}
.sra-bar{width:120px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin:8px auto 0;overflow:hidden;}
.sra-fill{height:100%;border-radius:2px;width:0;transition:width 1s ease .2s;}
.sra-cps{font-size:12px;color:#ffd700;opacity:.6;letter-spacing:1px;margin-top:2px;}
.sra-divider{width:50px;height:1px;background:rgba(255,255,255,.1);margin:8px auto;}
/* 光芒效果 */
@keyframes shine{0%{background-position:-200% 0}100%{background-position:200% 0}}
.shine-text{
  background:linear-gradient(90deg,#ffd700,#fff,#ffd700);
  background-size:200% auto;
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 2s linear infinite;
}
/* 弹窗里的召唤结果 */
#summonModal .modal-box{max-width:340px;}
.smodal-rarity{font-size:12px;letter-spacing:4px;margin-bottom:10px;}
.smodal-rarity.r1{color:#aaa;}
.smodal-rarity.r2{color:#7eb8ff;}
.smodal-rarity.r3{color:#b57edc;}
.smodal-rarity.r4{color:#ffd700;}
/* 拖拽时目标格高亮 */
.d-cell.drop-target{border-color:#ffd700!important;box-shadow:0 0 16px rgba(255,215,0,.5)!important;background:rgba(255,215,0,.1)!important;}


/* 设置面板 */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(4px);}
.panel-overlay.open{display:flex;}
.panel-box{background:linear-gradient(160deg,#0d0d2a,#1a1a3a);border:1px solid #ffd700;border-radius:24px;width:min(380px,90vw);animation:popIn .3s ease;}
.panel-header{background:linear-gradient(135deg,#1a1a3a,#0d0d2a);border-bottom:1px solid rgba(255,215,0,.2);padding:16px 20px;font-size:17px;font-weight:700;color:#ffd700;border-radius:24px 24px 0 0;}

/* 英雄展示台动画 */
@keyframes blink{0%,100%{opacity:.3}50%{opacity:.7}}
/* 灵兽缩略图 */
.ht{transition:transform .15s;cursor:pointer;}
.ht:hover{transform:scale(1.2);}

/* 底部图标按钮统一圆形 */
.icon-btn{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;position:relative;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);transition:all .2s;flex-shrink:0;}
.icon-btn:active{transform:scale(.9);}
.icon-task{color:#c8a020;border-color:rgba(200,160,32,.3);background:rgba(200,160,32,.08);}
.icon-book{color:#42a5f5;border-color:rgba(66,165,245,.3);background:rgba(66,165,245,.08);}
.icon-active{color:#ff6b35;border-color:rgba(255,107,53,.3);background:rgba(255,107,53,.08);}
.icon-coin{color:#ffd700;border-color:rgba(255,215,0,.4);background:rgba(255,215,0,.1);}
.icon-qi{color:#a0d8ef;border-color:rgba(160,216,239,.4);background:rgba(160,216,239,.08);}
.icon-free{color:#4caf50;border-color:rgba(76,175,80,.4);background:rgba(76,175,80,.08);}
.icon-rank{color:#e040fb;border-color:rgba(224,64,251,.3);background:rgba(224,64,251,.06);}
.icon-ach{color:#ff9800;border-color:rgba(255,152,0,.3);background:rgba(255,152,0,.06);}
.icon-set{color:rgba(255,255,255,.5);border-color:rgba(255,255,255,.1);background:rgba(255,255,255,.04);}
/* 灵兽环绕属性 */
.attr-ring{position:absolute;display:flex;align-items:center;}
.attr-pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;letter-spacing:.5px;border:1px solid rgba(255,215,0,.3);background:rgba(255,215,0,.08);color:#ffd700;}
.ring-1{left:0;top:50%;transform:translateY(-50%) translateX(-4px);animation:orbit-ring 8s ease-in-out infinite;}
.ring-2{left:0;bottom:6px;animation:orbit-ring 20s ease-in-out infinite reverse;}
.ring-3{right:0;top:50%;transform:translateY(-50%) translateX(4px);animation:orbit-ring-r 18s ease-in-out infinite;}
.ring-4{right:0;bottom:6px;animation:orbit-ring-r 22s ease-in-out infinite reverse;}
@keyframes orbit-ring{0%,100%{opacity:.4}50%{opacity:.75;transform:translateX(-3px) translateY(-5px)}}
@keyframes orbit-ring-r{0%,100%{opacity:.4}50%{opacity:.75;transform:translateX(3px) translateY(-5px)}}
/* 灵兽呼吸+光环 */
#heroIcon{transition:all .3s;}
/* ══════════════════════════════════════════
   主页灵兽 · 15级专属动作
   切换：updateHeroSection 根据 best.level 选 class="anim-L{n}"
   ══════════════════════════════════════════ */

/* ─── Lv1-3 雏生类：啾啾雀跃 ─── */
/* 微微蹦跳+左右歪头，有雏鸟啄食的呆萌感 */
.anim-L1,.anim-L2,.anim-L3{
  animation: baby-bounce 2.2s ease-in-out infinite;
}
@keyframes baby-bounce{
  0%   { transform: translate(-50%,-50%) rotate(-3deg) translateY(0);    filter: drop-shadow(0 0 18px rgba(255,220,80,.55)); }
  15%  { transform: translate(-50%,-50%) rotate(2deg)  translateY(-6px);  filter: drop-shadow(0 0 28px rgba(255,220,80,.75)); }
  30%  { transform: translate(-50%,-50%) rotate(-1deg) translateY(1px);   filter: drop-shadow(0 0 20px rgba(255,220,80,.6)); }
  50%  { transform: translate(-50%,-50%) rotate(4deg)  translateY(-9px);  filter: drop-shadow(0 0 30px rgba(255,200,60,.85)); }
  70%  { transform: translate(-50%,-50%) rotate(-2deg) translateY(0);    filter: drop-shadow(0 0 22px rgba(255,220,80,.65)); }
  85%  { transform: translate(-50%,-50%) rotate(1deg)  translateY(-4px);  filter: drop-shadow(0 0 26px rgba(255,220,80,.7)); }
  100% { transform: translate(-50%,-50%) rotate(-3deg) translateY(0);    filter: drop-shadow(0 0 18px rgba(255,220,80,.55)); }
}

/* ─── Lv4-6 飞禽类：振翅欲飞 ─── */
/* rotateX±12° 扇翅感+translateY起伏，3D俯仰感 */
.anim-L4,.anim-L5,.anim-L6{
  animation: bird-soar 2.8s ease-in-out infinite;
}
@keyframes bird-soar{
  0%   { transform: translate(-50%,-50%) translateY(0)     rotateX(0deg)  rotateZ(-4deg);  filter: drop-shadow(0 0 22px rgba(100,180,255,.6)); }
  20%  { transform: translate(-50%,-50%) translateY(-10px)  rotateX(12deg) rotateZ(2deg);  filter: drop-shadow(0 0 32px rgba(100,180,255,.8)); }
  40%  { transform: translate(-50%,-50%) translateY(-4px)   rotateX(-8deg) rotateZ(-2deg); filter: drop-shadow(0 0 26px rgba(100,180,255,.7)); }
  60%  { transform: translate(-50%,-50%) translateY(-14px)  rotateX(10deg) rotateZ(4deg);  filter: drop-shadow(0 0 36px rgba(120,200,255,.9)); }
  80%  { transform: translate(-50%,-50%) translateY(-6px)   rotateX(-5deg) rotateZ(0deg);  filter: drop-shadow(0 0 28px rgba(100,180,255,.75)); }
  100% { transform: translate(-50%,-50%) translateY(0)      rotateX(0deg)  rotateZ(-4deg);  filter: drop-shadow(0 0 22px rgba(100,180,255,.6)); }
}

/* ─── Lv7 灵蝶类：翩翩起舞 ─── */
/* 8字舞步（XY正弦叠加）+rotateZ摇摆，翅膀扇动 */
.anim-L7{
  animation: butterfly-dance 3.2s ease-in-out infinite;
}
@keyframes butterfly-dance{
  0%   { transform: translate(-50%,-50%) translateX(0)    translateY(0)     rotateZ(-8deg);  filter: drop-shadow(0 0 24px rgba(180,120,255,.65)); }
  25%  { transform: translate(-50%,-50%) translateX(12px) translateY(-16px) rotateZ(5deg);  filter: drop-shadow(0 0 34px rgba(180,120,255,.85)); }
  50%  { transform: translate(-50%,-50%) translateX(0)    translateY(-20px) rotateZ(-5deg); filter: drop-shadow(0 0 28px rgba(200,160,255,.9)); }
  75%  { transform: translate(-50%,-50%) translateX(-12px) translateY(-12px) rotateZ(8deg); filter: drop-shadow(0 0 32px rgba(180,120,255,.8)); }
  100% { transform: translate(-50%,-50%) translateX(0)    translateY(0)     rotateZ(-8deg);  filter: drop-shadow(0 0 24px rgba(180,120,255,.65)); }
}

/* ─── Lv8-10 幼龙类：盘龙腾云 ─── */
/* S形摆动+仰头缩放+龙气光晕，庄重有力 */
.anim-L8,.anim-L9,.anim-L10{
  animation: dragon-coil 3.5s ease-in-out infinite;
}
@keyframes dragon-coil{
  0%   { transform: translate(-50%,-50%) rotate(-6deg)  scale(1);    filter: drop-shadow(0 0 28px rgba(80,180,255,.7)); }
  20%  { transform: translate(-50%,-50%) rotate(4deg)   scale(1.04); filter: drop-shadow(0 0 38px rgba(80,200,255,.9)); }
  40%  { transform: translate(-50%,-50%) rotate(-3deg) scale(1.06); filter: drop-shadow(0 0 42px rgba(100,160,255,.85)); }
  60%  { transform: translate(-50%,-50%) rotate(6deg)   scale(1.03); filter: drop-shadow(0 0 36px rgba(80,180,255,.8)); }
  80%  { transform: translate(-50%,-50%) rotate(-4deg) scale(1.05); filter: drop-shadow(0 0 40px rgba(90,190,255,.9)); }
  100% { transform: translate(-50%,-50%) rotate(-6deg) scale(1);    filter: drop-shadow(0 0 28px rgba(80,180,255,.7)); }
}

/* ─── Lv11-12 灵蛇/灵马类 ─── */
/* 波状游走+马蹄轻颠，Y轴微震感 */
.anim-L11,.anim-L12{
  animation: spirit-pulse 2.4s ease-in-out infinite;
}
@keyframes spirit-pulse{
  0%   { transform: translate(-50%,-50%) translateY(0)     rotate(0deg)   scale(1);    filter: drop-shadow(0 0 30px rgba(80,220,140,.7)); }
  15%  { transform: translate(-50%,-50%) translateY(-8px)  rotate(-2deg)  scale(1.03); filter: drop-shadow(0 0 38px rgba(80,220,140,.85)); }
  30%  { transform: translate(-50%,-50%) translateY(2px)   rotate(1deg)   scale(1);    filter: drop-shadow(0 0 32px rgba(80,220,140,.75)); }
  50%  { transform: translate(-50%,-50%) translateY(-12px) rotate(3deg)   scale(1.05); filter: drop-shadow(0 0 40px rgba(100,240,160,.95)); }
  70%  { transform: translate(-50%,-50%) translateY(-4px)  rotate(-1deg)  scale(1.02); filter: drop-shadow(0 0 35px rgba(80,220,140,.8)); }
  100% { transform: translate(-50%,-50%) translateY(0)     rotate(0deg)   scale(1);    filter: drop-shadow(0 0 30px rgba(80,220,140,.7)); }
}

/* ─── Lv13-14 神龙/祖龙类 ─── */
/* 帝王气象：慢旋+亮度呼吸+金色龙气 */
.anim-L13,.anim-L14{
  animation: divine-dragon 4.5s ease-in-out infinite;
}
@keyframes divine-dragon{
  0%   { transform: translate(-50%,-50%) rotate(0deg)   scale(1);    filter: drop-shadow(0 0 32px rgba(255,200,50,.8)) brightness(1); }
  25%  { transform: translate(-50%,-50%) rotate(90deg)  scale(1.06); filter: drop-shadow(0 0 48px rgba(255,140,20,.95)) brightness(1.2); }
  50%  { transform: translate(-50%,-50%) rotate(180deg) scale(1.1);   filter: drop-shadow(0 0 56px rgba(255,215,0,1)) brightness(1.35); }
  75%  { transform: translate(-50%,-50%) rotate(270deg) scale(1.06); filter: drop-shadow(0 0 48px rgba(255,140,20,.95)) brightness(1.2); }
  100% { transform: translate(-50%,-50%) rotate(360deg) scale(1);    filter: drop-shadow(0 0 32px rgba(255,200,50,.8)) brightness(1); }
}

/* ─── Lv15 终焉祖龙：天命永恒 ─── */
/* 最强灵兽：三色粒子+超慢旋+帝王光柱 */
.anim-L15{
  animation: progenitor-eternal 5s ease-in-out infinite;
}
@keyframes progenitor-eternal{
  0%   { transform: translate(-50%,-50%) rotate(0deg)   scale(1)    translateY(0);    filter: drop-shadow(0 0 36px rgba(255,215,0,.9)) brightness(1); }
  20%  { transform: translate(-50%,-50%) rotate(72deg)  scale(1.08) translateY(-8px);  filter: drop-shadow(0 0 55px rgba(255,80,20,.95)) brightness(1.25); }
  40%  { transform: translate(-50%,-50%) rotate(144deg) scale(1.12) translateY(-14px); filter: drop-shadow(0 0 65px rgba(255,215,0,1)) brightness(1.4); }
  60%  { transform: translate(-50%,-50%) rotate(216deg) scale(1.1)  translateY(-10px); filter: drop-shadow(0 0 58px rgba(255,120,180,.9)) brightness(1.3); }
  80%  { transform: translate(-50%,-50%) rotate(288deg) scale(1.07) translateY(-5px);  filter: drop-shadow(0 0 50px rgba(100,255,200,.85)) brightness(1.2); }
  100% { transform: translate(-50%,-50%) rotate(360deg) scale(1)    translateY(0);    filter: drop-shadow(0 0 36px rgba(255,215,0,.9)) brightness(1); }
}
/* Lv15 专属伪元素光束层 */
.anim-L15::before{
  content:'';
  position:absolute;
  left:50%; top:50%;
  width:180px; height:180px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:conic-gradient(from 0deg,transparent,rgba(255,215,0,.3),transparent,rgba(255,100,50,.3),transparent,rgba(100,255,200,.3),transparent);
  animation: L15-conic-spin 3s linear infinite;
  pointer-events:none;
  filter:blur(4px);
  opacity:.6;
}
@keyframes L15-conic-spin{
  from { transform:translate(-50%,-50%) rotate(0deg); }
  to   { transform:translate(-50%,-50%) rotate(360deg); }
}

/* ─── 灵兽切换时的平滑过渡 ─── */
#heroIcon{
  transition: transform .5s cubic-bezier(.4,0,.2,1), filter .6s cubic-bezier(.4,0,.2,1);
}
.hero-glow{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(240px,60vw);height:min(240px,60vw);border-radius:50%;background:radial-gradient(circle,rgba(255,215,0,.12) 0%,transparent 72%);animation:hero-glow-pulse 4s ease-in-out infinite;z-index:1;pointer-events:none;}
@keyframes hero-glow-pulse{0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:.9;transform:translate(-50%,-50%) scale(1.15)}}


/* 侧边栏按钮 */
.side-btn{
  width:36px;height:36px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:none;
  background:rgba(20,20,50,.6);border:1px solid rgba(255,255,255,.08);
  transition:all .2s;padding:0;
  /* 用 CSS shape 画图标，不用 emoji */
}
.side-btn svg{width:18px;height:18px;fill:currentColor;}
/* 任务-卷轴 */
.side-btn[data-fn="task"]{color:rgba(200,180,100,.7);}
.side-btn[data-fn="task"]:hover{background:rgba(200,180,100,.12);border-color:rgba(200,180,100,.4);color:#ffd700;box-shadow:0 0 12px rgba(200,180,100,.2);}
/* 活动-闪电 */
.side-btn[data-fn="activity"]{color:rgba(100,200,255,.6);}
.side-btn[data-fn="activity"]:hover{background:rgba(100,200,255,.1);border-color:rgba(100,200,255,.35);color:#7ef;box-shadow:0 0 12px rgba(100,200,255,.2);}
/* 图鉴-书 */
.side-btn[data-fn="handbook"]{color:rgba(180,100,255,.6);}
.side-btn[data-fn="handbook"]:hover{background:rgba(180,100,255,.1);border-color:rgba(180,100,255,.35);color:#c7a0ff;box-shadow:0 0 12px rgba(180,100,255,.2);}
/* 排行-奖杯 */
.side-btn[data-fn="rank"]{color:rgba(255,200,80,.65);}
.side-btn[data-fn="rank"]:hover{background:rgba(255,200,80,.1);border-color:rgba(255,200,80,.35);color:#ffd700;box-shadow:0 0 12px rgba(255,200,80,.2);}
/* 成就-徽章 */
.side-btn[data-fn="guide"]{background:linear-gradient(135deg,#4a2d80,#2a1a50);border-color:rgba(180,130,255,.25);}
.side-btn[data-fn="guide"]:hover{background:linear-gradient(135deg,#6a3da0,#4a2a70);border-color:rgba(180,130,255,.5);}
.side-btn[data-fn="ach"]{color:rgba(80,220,120,.6);}
.side-btn[data-fn="ach"]:hover{background:rgba(80,220,120,.1);border-color:rgba(80,220,120,.35);color:#5fdc78;box-shadow:0 0 12px rgba(80,220,120,.2);}
/* 签到 */
.side-btn[data-fn="sign"]{color:rgba(255,215,0,.6);}
.side-btn[data-fn="sign"]:hover{background:rgba(255,215,0,.1);border-color:rgba(255,215,0,.35);color:#ffd700;box-shadow:0 0 12px rgba(255,215,0,.2);}
/* 设置-齿轮 */
.side-btn[data-fn="settings"]{color:rgba(150,150,180,.55);}
.side-btn[data-fn="settings"]:hover{background:rgba(150,150,180,.1);border-color:rgba(150,150,180,.3);color:#ccc;box-shadow:0 0 12px rgba(150,150,180,.15);}
.side-btn:active{transform:scale(.82)!important;transition:transform .05s!important;}

/* 召唤按钮 */
.summon-btn{
  display:flex;align-items:center;justify-content:center;
  border-radius:24px;padding:8px 18px;cursor:pointer;border:none;
  font-size:13px;font-weight:700;gap:4px;min-width:70px;
  transition:all .2s;
}
.summon-btn:active{transform:scale(.94);}
.summon-coin{background:rgba(255,215,0,.15);border:1.5px solid rgba(255,215,0,.4);color:#ffd700;}
.summon-coin:hover{background:rgba(255,215,0,.25);}
.summon-qi{background:rgba(160,216,239,.12);border:1.5px solid rgba(160,216,239,.35);color:#a0d8ef;}
.summon-qi:hover{background:rgba(160,216,239,.2);}
.summon-free{background:rgba(76,175,80,.15);border:1.5px solid rgba(76,175,80,.4);color:#4caf50;padding:8px 14px;min-width:0;}
.summon-free:hover{background:rgba(76,175,80,.25);}
/* 命格修炼节点脉冲动画 */
.cult-pulse{animation:cultPulse .7s ease-out forwards;}
@keyframes cultPulse{
  0%{transform:scale(1);box-shadow:0 0 0 0 rgba(255,215,0,.6);}
  40%{transform:scale(1.06);box-shadow:0 0 0 10px rgba(255,215,0,.2);}
  70%{transform:scale(.97);}
  100%{transform:scale(1);box-shadow:0 0 0 0 rgba(255,215,0,0);}
}
/* 金币飘字 */
@keyframes coinFloat{
  0%{opacity:1;transform:translateY(0) scale(1);}
  60%{opacity:1;transform:translateY(-40px) scale(1.1);}
  100%{opacity:0;transform:translateY(-80px) scale(.8);}
}
.coin-float{
  position:fixed;
  pointer-events:none;
  font-size:14px;
  font-weight:700;
  color:#ffd700;
  text-shadow:0 0 8px rgba(255,215,0,.8),0 1px 2px rgba(0,0,0,.8);
  z-index:900;
  animation:coinFloat 1.2s ease-out forwards;
  white-space:nowrap;
}

  const c=document.createElement('div');
  c.className='zodiac-card';
  c.innerHTML=`<div class="z-emoji">${z.e}</div><div class="z-name">${z.n}</div>`;
  c.onclick=()=>{
    document.querySelectorAll('.zodiac-card').forEach(x=>x.classList.remove('on'));
    c.classList.add('on');
    sz=i; upd();
  };
  zg.appendChild(c);
});

const fg=document.getElementById('fGrid');
FDATA.forEach((f,i)=>{
  const c=document.createElement('div');
  c.className='fate-card fate-'+i;
  c.innerHTML=`<div class="f-emoji">${f.e}</div><div class="f-name">${f.n}命</div>`;
  c.onclick=()=>{
    document.querySelectorAll('.fate-card').forEach(x=>x.classList.remove('on'));
    c.classList.add('on');
    sf=i;
    var bd=document.getElementById('bonus');bd.innerHTML='<span class="bonus-name" style="color:#ffd700;font-weight:700">'+f.e+' '+f.n+'命</span><span class="bonus-desc"> · 产金×'+f.c+' · 龙气×'+f.q+' · 经验×'+f.exp+'</span>';
    upd();
  };
  fg.appendChild(c);
});


function upd(){
  const btn=document.getElementById('sBtn');
  if(sz>=0&&sf>=0){
    btn.className='start-btn ready';
    btn.textContent='天机降临 · 开始';
  } else {
    btn.className='start-btn';
    btn.textContent='请先选择属相与命格';
  }
}

function doStart(){
  if(sz<0||sf<0) return;
  const z=ZDATA[sz],f=FDATA[sf];
  document.getElementById('mZ').textContent=z.e;
  document.getElementById('mF').textContent=f.e;
  document.getElementById('mZn').textContent=z.n;
  document.getElementById('mFn').textContent=f.n;
  document.getElementById('mDesc').textContent=f.d;
  document.getElementById('modal').classList.add('show');
}

</script>

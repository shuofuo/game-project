<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>生肖天机 · 风格A：古韵星象</title>
</head>
<body style="margin:0;padding:0;background:#03030f;font-family:system-ui,sans-serif;color:#fff;min-height:100dvh;display:flex;align-items:center;justify-content:center;">
<p style="padding:20px;">Step 1 完成：HTML骨架</p>
</body></html>
<style>
.game{
  display:flex;flex-direction:column;
  height:100dvh;max-width:500px;margin:0 auto;
  background:radial-gradient(ellipse 90% 70% at 50% 30%,#1a0840 0%,#0d0820 40%,#03030f 100%);
  overflow:hidden;position:relative;
}
/* 星空背景 */
.game::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 20% 15%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 60% 25%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 80% 10%,rgba(255,215,0,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 35% 40%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 10% 60%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 70% 55%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 50% 5%,rgba(255,215,0,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 90% 45%,rgba(255,255,255,.3) 0%,transparent 100%);
  animation:twinkle 4s ease-in-out infinite alternate;
}
@keyframes twinkle{0%{opacity:.6}100%{opacity:1}}

/* 顶栏 */
.top-hud{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:50px;
  background:rgba(3,3,15,.8);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,215,0,.1);position:relative;z-index:1;
}
.hud-zodiac{font-size:22px;}
.hud-center{display:flex;align-items:center;gap:16px;}
.hud-stat{display:flex;align-items:center;gap:5px;}
.hud-stat .icon{font-size:16px;}
.hud-stat .val{font-size:16px;font-weight:700;color:#ffd700;}
.hud-stat .cps{font-size:11px;color:rgba(255,255,255,.35);}
.hud-stat .qi{color:#a0d8ef;}
.hud-yunshi{font-size:12px;color:rgba(255,215,0,.4);letter-spacing:1px;}

/* 技能条 */
.skill-row{
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  padding:6px 16px;gap:8px;
  background:rgba(3,3,15,.6);border-bottom:1px solid rgba(255,215,0,.05);position:relative;z-index:1;
}
.skill-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:5px 10px;min-width:52px;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,215,0,.12);
  border-radius:10px;cursor:pointer;position:relative;transition:all .2s;
}
.skill-item:hover{background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.4);}
.skill-item .sname{font-size:11px;font-weight:600;color:#ffd700;}
.skill-item .scd{font-size:10px;color:rgba(255,255,255,.4);}
.skill-dot{position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%;background:#ff4455;}

/* 中间区域 */
.mid-row{
  flex:1;display:flex;min-height:0;overflow:hidden;position:relative;z-index:1;
}

/* 左侧边栏 */
.sidebar{
  width:46px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  padding:36px 0 80px;
  background:linear-gradient(to bottom,rgba(0,0,0,.3) 0%,transparent 25%,transparent 75%,rgba(0,0,0,.25) 100%);
}
.sd-btn{
  width:36px;height:36px;margin:2px 0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:10px;cursor:pointer;font-size:16px;
  transition:all .2s;
}
.sd-btn:hover{background:rgba(255,215,0,.1);border-color:rgba(255,215,0,.4);}

/* 灵兽格子 */
.dragon-sec{
  flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;
}
.dragon-hd{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 8px;
  border-bottom:1px solid rgba(255,215,0,.07);
}
.dragon-hd span{font-size:13px;color:#ffd700;letter-spacing:1px;}
.dragon-hd small{color:rgba(255,255,255,.25);font-size:11px;}
.dragon-grid{
  flex:1;display:grid;grid-template-columns:repeat(5,1fr);gap:7px;
  padding:12px;align-content:start;overflow:hidden;
}
.dg{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  border-radius:50%;position:relative;font-size:clamp(24px,5.5vw,36px);
  cursor:pointer;transition:all .2s;
}
.dg:hover{transform:scale(1.08);border-color:rgba(255,215,0,.5);background:rgba(255,215,0,.06);}
.dg .lv{
  position:absolute;top:2px;left:5px;font-size:9px;font-weight:700;color:#ffd700;
}
.dg.hi{border-color:rgba(255,215,0,.5);background:rgba(255,215,0,.06);}
.dg.sp{border-color:rgba(0,200,255,.5);background:rgba(0,200,255,.06);border-radius:12px;}
.dg.le{border-color:rgba(180,80,255,.6);background:rgba(180,80,255,.08);border-radius:12px;}

/* 主角卡 */
.hero-card{
  width:120px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 8px;gap:3px;
  background:rgba(255,255,255,.015);border-left:1px solid rgba(255,215,0,.06);
}
.hero-fate{font-size:9px;color:rgba(255,215,0,.35);letter-spacing:2px;text-transform:uppercase;}
.hero-glow{
  width:80px;height:80px;position:relative;display:flex;align-items:center;justify-content:center;
}
.hero-glow::before{
  content:'';position:absolute;inset:-18px;
  background:radial-gradient(circle,rgba(139,92,246,.25) 0%,transparent 70%);
  border-radius:50%;animation:star-pulse 3s ease-in-out infinite;
}
.hero-glow::after{
  content:'';position:absolute;inset:-8px;
  border:1px solid rgba(255,215,0,.15);border-radius:50%;
}
@keyframes star-pulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
.hero-icon{font-size:62px;line-height:1;filter:drop-shadow(0 0 12px rgba(255,215,0,.5));z-index:2;}
.hero-evo{display:flex;gap:3px;font-size:16px;opacity:.3;align-items:center;}
.hero-lv{font-size:11px;font-weight:700;color:#ffd700;letter-spacing:1px;}
.hero-cps{font-size:10px;color:rgba(255,255,255,.4);}
.hero-btns{display:flex;gap:5px;margin-top:4px;}
.hero-btn{
  font-size:11px;padding:4px 9px;border-radius:8px;
  border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);
  color:#aaa;cursor:pointer;transition:all .2s;
}
.hero-btn:hover{background:rgba(255,215,0,.12);border-color:rgba(255,215,0,.4);color:#ffd700;}
.hero-btn.pk{background:rgba(255,215,0,.12);border-color:rgba(255,215,0,.4);color:#ffd700;}

/* 底部召唤 */
.bot-bar{
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  gap:10px;padding:10px 16px calc(10px + env(safe-area-inset-bottom,6px));
  background:rgba(3,3,15,.85);border-top:1px solid rgba(255,215,0,.08);position:relative;z-index:1;
}
.sm-btn{
  display:flex;align-items:center;gap:6px;
  padding:10px 16px;border-radius:14px;border:none;cursor:pointer;
  font-size:14px;font-weight:700;transition:all .2s;
}
.sm-btn:hover{transform:scale(1.04);}
.sm-btn:active{transform:scale(.97);}
.sm-coin{background:linear-gradient(135deg,#3d2800,#6b4a00);color:#ffd700;border:1px solid rgba(255,215,0,.4);}
.sm-qi{background:linear-gradient(135deg,#0a1f2e,#15404f);color:#a0d8ef;border:1px solid rgba(160,216,239,.4);}
.sm-free{background:linear-gradient(135deg,#0d2010,#1a3a1a);color:#76c776;border:1px solid rgba(76,175,76,.4);}

@media(max-width:400px){
  .hero-card{width:100px;padding:8px 6px;}
  .hero-glow{width:64px;height:64px;}
  .hero-icon{font-size:50px;}
  .sidebar{width:40px;}
}

  .qi-icon{display:inline-block;border-radius:50%;background:radial-gradient(circle at 35% 35%,#e0f7fa,#a0d8ef 40%,#4fc3f7 70%,#0277bd);box-shadow:0 0 6px #4fc3f7,0 0 12px rgba(79,195,247,.35);vertical-align:middle;}.qi-icon-sm{width:12px;height:12px;}.qi-icon-md{width:16px;height:16px;}.qi-icon-lg{width:20px;height:20px;}
</style>

  <!-- 顶栏 -->
  <div class="top-hud">
    <span class="hud-zodiac">🐉</span>

      <div class="hud-stat"><span class="icon">💰</span><span class="val">12,847</span><span class="cps">+86/s</span></div>

    <!-- 主角卡 -->
    <div class="hero-card">
      <div class="hero-fate">木命 · 大吉</div>
      <div class="hero-evo">🐣→🐥→🐦→🐓</div>

  <!-- 底栏 -->

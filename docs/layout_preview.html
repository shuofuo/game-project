<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>生肖天机 · 布局预览 v2</title>
<style>
body{margin:0;padding:0;background:#07071a;font-family:system-ui,-apple-system,sans-serif;color:#fff;min-height:100vh}
</style>
</head>
<body>
<p style="padding:20px;color:#aaa;">布局预览第一部分已创建。</p>
</body></html>
<style>
/* === 布局结构 === */
.game-page{
  display:flex;
  flex-direction:column;
  height:100dvh;
  max-width:520px;
  margin:0 auto;
  background:radial-gradient(ellipse 80% 70% at 50% 38%,rgba(80,30,150,.28) 0%,rgba(20,8,80,.2) 45%,#07071a 100%);
  overflow:hidden;
}

/* === 1. 顶部HUD === */
.top-hud{
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  height:52px;
  background:rgba(7,7,26,.85);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,215,0,.08);
  font-size:14px;
}
.hud-zodiac{color:#ffd700;opacity:.7;font-size:13px;}
.hud-center{display:flex;align-items:center;gap:12px;}
.hud-stat{display:flex;align-items:center;gap:4px;}
.hud-stat .icon{font-size:16px;}
.hud-stat .val{font-size:17px;font-weight:700;}
.hud-stat .cps{font-size:11px;color:rgba(255,255,255,.4);margin-left:2px;}
.hud-yunshi{font-size:11px;color:rgba(255,255,255,.35);min-width:40px;text-align:right;}

/* === 2. 技能条 === */
.skill-bar-row{
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:6px 16px;
  background:rgba(7,7,26,.7);
  border-bottom:1px solid rgba(255,215,0,.05);
  gap:8px;
}
.skill-btn{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
  padding:6px 10px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);
  border-radius:10px;
  cursor:pointer;
  font-size:12px;
  color:#ccc;
  min-width:56px;
  transition:all .2s;
}
.skill-btn:hover{background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.3);color:#ffd700;}
.skill-btn .sname{font-size:11px;font-weight:600;}
.skill-btn .scd{font-size:10px;opacity:.5;}

/* === 3. 主内容区 === */
.middle-row{
  flex:1;
  display:flex;
  min-height:0;
  overflow:hidden;
  gap:0;
}

/* === 4. 左侧边栏 === */
.sidebar{
  width:52px;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-between;
  padding:40px 0 90px;
  background:linear-gradient(to bottom,
    rgba(0,0,0,.25) 0%,
    transparent 25%,
    transparent 75%,
    rgba(0,0,0,.2) 100%);
  z-index:10;
}
.side-btn{
  width:40px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  cursor:pointer;
  color:#aaa;
  font-size:18px;
  transition:all .2s;
  margin:2px 0;
}
.side-btn:hover{background:rgba(255,215,0,.12);border-color:rgba(255,215,0,.4);color:#ffd700;}
.side-btn .dot{
  position:absolute;
  top:2px;
  right:2px;
  width:8px;
  height:8px;
  border-radius:50%;
  background:#ff4444;
}

/* === 5. 灵兽格子区 === */
.dragon-section{
  flex:1;
  display:flex;
  flex-direction:column;
  min-width:0;
  overflow:hidden;
}
.dragon-header{
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 14px 8px;
  font-size:13px;
  color:#ffd700;
  border-bottom:1px solid rgba(255,215,0,.07);
}
.dragon-header span{opacity:.7;}
.dragon-count{color:rgba(255,255,255,.3);font-size:11px;}

.dragon-grid{
  flex:1;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  padding:12px;
  align-content:start;
  overflow:hidden;
}
.dg-cell{
  aspect-ratio:1;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  border-radius:12px;
  font-size:clamp(26px,6vw,38px);
  cursor:pointer;
  position:relative;
  transition:all .2s;
}
.dg-cell:hover{background:rgba(255,215,0,.06);border-color:rgba(255,215,0,.3);transform:scale(1.05);}
.dg-cell .lvl{
  position:absolute;
  top:3px;
  left:5px;
  font-size:9px;
  color:#ffd700;
  font-weight:700;
  opacity:.8;
}
.dg-cell.lv-high{border-color:rgba(255,215,0,.5);background:rgba(255,215,0,.05);}
.dg-cell.lv-super{border-color:rgba(0,200,255,.5);background:rgba(0,200,255,.05);}
.dg-cell.lv-legend{border-color:rgba(200,100,255,.6);background:rgba(200,100,255,.08);}

/* === 6. 主角卡 === */
.hero-card{
  width:130px;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:10px 8px;
  background:rgba(255,255,255,.015);
  border-left:1px solid rgba(255,215,0,.06);
  gap:4px;
  overflow:hidden;
}
.hero-fate{font-size:9px;color:rgba(255,215,0,.4);letter-spacing:2px;text-transform:uppercase;}
.hero-glow{
  width:90px;height:90px;
  position:relative;
  display:flex;align-items:center;justify-content:center;
}
.hero-glow::before{
  content:'';
  position:absolute;
  inset:-15px;
  background:radial-gradient(circle,rgba(100,60,200,.2) 0%,transparent 70%);
  border-radius:50%;
  animation:pulse 3s ease-in-out infinite;
}
.hero-icon{font-size:72px;line-height:1;filter:drop-shadow(0 0 14px rgba(255,215,0,.5));z-index:2;cursor:pointer;}
.hero-evo{
  display:flex;gap:3px;font-size:18px;opacity:.35;align-items:center;
  overflow:hidden;max-width:110px;flex-wrap:wrap;justify-content:center;
}
.hero-stats{display:flex;align-items:center;gap:5px;}
.hero-lv{font-size:11px;font-weight:700;color:#ffd700;letter-spacing:1px;}
.hero-dot{color:rgba(255,215,0,.2);font-size:9px;}
.hero-cps{font-size:10px;color:#aaa;}
.hero-actions{display:flex;gap:6px;margin-top:4px;}
.hero-act-btn{
  font-size:11px;
  padding:4px 10px;
  border-radius:8px;
  cursor:pointer;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.05);
  color:#aaa;
  transition:all .2s;
}
.hero-act-btn:hover{background:rgba(255,215,0,.12);border-color:rgba(255,215,0,.4);color:#ffd700;}
.hero-act-btn.primary{background:rgba(255,215,0,.12);border-color:rgba(255,215,0,.4);color:#ffd700;}

/* === 7. 底部召唤栏 === */
.bottom-bar{
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  padding:10px 20px calc(10px + env(safe-area-inset-bottom,6px));
  background:rgba(7,7,26,.85);
  border-top:1px solid rgba(255,215,0,.08);
}
.summon-btn{
  display:flex;
  align-items:center;
  gap:6px;
  padding:10px 18px;
  border-radius:14px;
  border:none;
  cursor:pointer;
  font-size:14px;
  font-weight:700;
  transition:all .2s;
}
.summon-btn:hover{transform:scale(1.04);}
.summon-btn:active{transform:scale(.97);}
.summon-coin{background:linear-gradient(135deg,#5c4200,#8a6500);color:#ffd700;border:1px solid rgba(255,215,0,.4);}
.summon-qi{background:linear-gradient(135deg,#0e2a3a,#1a4a60);color:#a0d8ef;border:1px solid rgba(160,216,239,.4);}
.summon-free{background:linear-gradient(135deg,#1a2e1a,#2a4a2a);color:#76c776;border:1px solid rgba(76,175,76,.4);}

/* === 动画 === */
@keyframes pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}

/* === 响应式 === */
@media(max-width:420px){
  .hero-card{width:110px;}
  .hero-glow{width:72px;height:72px;}
  .hero-icon{font-size:58px;}
  .sidebar{width:44px;}
  .dg-cell{font-size:clamp(22px,5.5vw,32px);}
}
@media(max-width:360px){
  .hero-card{width:96px;padding:8px 6px;}
  .hero-glow{width:60px;height:60px;}
  .hero-icon{font-size:48px;}
  .dg-cell{font-size:clamp(18px,5vw,28px);border-radius:8px;}
}
</style>

<!-- ===== HTML 结构 ===== -->

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resize-content">
<title>生肖天机</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;touch-action:manipulation;}
/* 游戏面板默认全部隐藏，靠JS classList.add('open')/display=block打开 */
#signPanel,#taskPanel,#weeklyPanel,#handbookPanel,#rankPanel,#achPanel,#statsPanel,#settingsPanel,#cultPanel,#activityPanel,#achPopContainer,.panel-overlay{display:none!important;}
html,body{height:100%;height:100dvh;overflow:hidden;}
body{background:#e8dcc8;display:flex;align-items:stretch;justify-content:center;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#3a2a1a;padding:0;margin:0;min-height:100dvh;touch-action:manipulation;-webkit-text-size-adjust:100%;}

.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 90% 55% at 15% 92%,rgba(90,65,40,.07) 0%,transparent 60%),radial-gradient(ellipse 65% 40% at 85% 85%,rgba(70,55,30,.05) 0%,transparent 60%),radial-gradient(ellipse 35% 22% at 50% 65%,rgba(85,60,35,.04) 0%,transparent 60%),radial-gradient(ellipse 50% 30% at 70% 10%,rgba(100,80,50,.03) 0%,transparent 50%);}
.stars{position:absolute;inset:0;}
.star{position:absolute;width:2px;height:2px;background:rgba(90,65,40,.35);border-radius:50%;opacity:.5;animation:twinkle 4s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:1}}

.wrap{position:fixed;z-index:100;width:min(500px,96vw);max-width:96vw;padding:0 0 calc(16px + env(safe-area-inset-bottom)) 0;margin:0 auto;overflow-x:hidden;top:0;left:0;right:0;bottom:0;overflow-y:auto;background:#f4ede0;}

/* ===== 标题区：书法印章风格 ===== */
.logo{text-align:center;margin-bottom:8px;position:relative;}

.logo-badge{
  display:inline-block;
  font-size:12px;letter-spacing:6px;color:#7a5a3a;
  padding:4px 18px;border-radius:20px;
  background:rgba(90,65,40,.07);
  border:1px solid rgba(90,65,40,.25);
  animation:shimmer 4s ease-in-out infinite;
  margin-bottom:10px;
}
@keyframes shimmer{0%,100%{border-color:rgba(90,65,40,.25);color:#7a5a3a}50%{border-color:rgba(90,65,40,.5);color:#3a2a1a}

.logo-title-wrap{position:relative;display:inline-block;}
.logo-title{
  font-size:clamp(32px,10vw,46px);
  font-weight:900;letter-spacing:12px;
  color:#3a2a1a;
  text-shadow:0 0 20px rgba(90,65,40,.25),0 0 40px rgba(90,65,40,.1);
  display:block;text-align:center;margin-bottom:8px;
}
.logo-sub{
  font-size:11px;color:#8a7a6a;letter-spacing:6px;text-transform:uppercase;
}
/* 属相/命格标签 */
.login-label{
  font-size:11px;letter-spacing:4px;color:#7a5a3a;text-align:center;
  margin-bottom:10px;text-transform:uppercase;
}

/* 12属相淡化装饰 */

/* 分割线 */
.divider{display:none;}

/* 选区 */
.section{display:none;}

/* 属相网格 4x3 */
.zx-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:0 auto 14px;max-width:400px;padding:0 12px;box-sizing:border-box;}
.zodiac-card{background:rgba(90,65,40,.06);border:1.5px solid rgba(90,65,40,.12);border-radius:12px;padding:10px 4px 8px;cursor:pointer;transition:all .2s;text-align:center;user-select:none;}
.zodiac-card:hover{background:rgba(90,65,40,.1);border-color:rgba(90,65,40,.25);}
.zodiac-card:active{transform:scale(.94);transition:transform .05s;}
.zodiac-card.on{background:rgba(139,90,43,.12);border-color:rgba(139,90,43,.45);box-shadow:0 0 14px rgba(139,90,43,.2);}
.zodiac-card .z-emoji{font-size:clamp(26px,8vw,36px);line-height:1;margin-bottom:4px;}
.zodiac-card .z-name{font-size:11px;color:#7a5a3a;overflow:hidden;white-space:nowrap;}
.zodiac-card.on .z-name{color:#3a2a1a;font-weight:700;}

/* 命格：grid 与属相宽度一致，5列居中 */
.fate-row{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin:0 auto 12px;max-width:400px;padding:0 12px;box-sizing:border-box;}
.fate-card{background:rgba(90,65,40,.06);border:1.5px solid rgba(90,65,40,.12);border-radius:12px;padding:10px 4px 8px;cursor:pointer;transition:all .2s;text-align:center;}
.fate-card:hover{background:rgba(90,65,40,.1);border-color:rgba(90,65,40,.25);}
.fate-card:active{transform:scale(.94);transition:transform .05s;}
.fate-card.on{background:rgba(139,90,43,.1);border-color:rgba(139,90,43,.45);box-shadow:0 0 16px rgba(139,90,43,.2);}
.fate-card .f-emoji{font-size:clamp(20px,6vw,28px);display:block;margin-bottom:4px;}
.fate-card .f-name{font-size:11px;font-weight:700;display:block;}
.fate-card.fate-0 .f-name{color:#4CAF50}
.fate-card.fate-1 .f-name{color:#FF5722}
.fate-card.fate-2 .f-name{color:#a0785a}
.fate-card.fate-3 .f-name{color:#FFC107}
.fate-card.fate-4 .f-name{color:#42a5f5}
/* 加成描述 */
.bonus{min-height:18px;margin:0 0 12px 0;text-align:center;font-size:11px;color:#8a7a6a;letter-spacing:.5px;}
.bonus .bonus-name{font-weight:700;margin-right:4px;}
.bonus .bonus-desc{color:#888;}

/* 加成展示 */

/* 开始按钮 */
.start-btn{margin-top:4px;width:100%;padding:12px;font-size:15px;background:rgba(90,65,40,.08);border:1.5px solid rgba(90,65,40,.2);border-radius:30px;color:#b0a090;cursor:not-allowed;letter-spacing:4px;font-weight:600;transition:all .3s;}
.start-btn.ready{background:linear-gradient(135deg,#8b6914,#6b4a28);border-color:rgba(90,65,40,.5);color:#f4ede0;cursor:pointer;letter-spacing:4px;box-shadow:0 4px 18px rgba(139,105,20,.2);}
.start-btn.ready:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(200,160,32,.4);}
.start-btn:active{transform:scale(.97);}
/* 底部功能栏 */
#gameBottomBar{padding-bottom:max(20px,env(safe-area-inset-bottom));}

/* 弹窗 */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);}
.modal.show{display:flex;}
.modal-box{background:linear-gradient(160deg,#f0e8d8,#e8dcc8);border:1px solid rgba(90,65,40,.35);border-radius:28px;padding:40px 36px;width:min(380px,90vw);text-align:center;animation:popIn .35s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.modal-badge{display:inline-block;background:linear-gradient(135deg,#8b6914,#6b4a28);color:#f4ede0;font-size:11px;font-weight:800;padding:4px 14px;border-radius:20px;letter-spacing:3px;margin-bottom:20px;}
.modal-chars{display:flex;justify-content:center;align-items:center;gap:20px;margin:16px 0 24px;}
.modal-chars .mc-zodiac,.modal-chars .mc-fate{font-size:64px;line-height:1;}
.modal-chars .mc-vs{font-size:20px;color:#444;}
.modal-info{font-size:13px;color:#7a5a3a;line-height:1.8;}
.modal-info b{color:#8b6914;}
.modal-btn{margin-top:8px;width:100%;padding:13px;border-radius:30px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:2px;transition:all .2s;}
.modal-btn-start{background:linear-gradient(135deg,#8b6914,#6b4a28);border:none;color:#f4ede0;
.modal-btn-start:hover{transform:scale(1.02);box-shadow:0 8px 24px rgba(139,105,20,.3);}
.modal-btn-cancel{background:transparent;border:1px solid rgba(255,255,255,.2);color:#888;margin-top:10px;}
.modal-btn-cancel:hover{border-color:rgba(255,255,255,.5);color:#ccc;}

/* ===== 游戏主界面 ===== */
#gamePage{width:100%;height:100dvh;overflow:hidden;touch-action:none;flex-direction:column;padding-bottom:0;display:flex;visibility:hidden;opacity:0;}
.rank-panel{position:fixed;top:0;right:0;width:min(380px,92vw);height:100%;height:100dvh;background:#f0e8d8;z-index:303;display:none;overflow-y:auto;transform:translateX(100%);transition:transform .3s ease;}
.rank-panel.open{display:block;transform:translateX(0);}.rank-panel::-webkit-scrollbar{width:0;}.handbook-panel{position:fixed;top:0;left:0;width:100%;height:100%;height:100dvh;background:#f4ede0;z-index:301;display:none;overflow-y:auto;}
.handbook-panel.open{display:block;}.handbook-panel::-webkit-scrollbar{width:0;}.cult-panel,.ach-panel{position:fixed;top:0;right:0;width:min(400px,92vw);height:100%;height:100dvh;background:#f0e8d8;z-index:302;display:none;overflow-y:auto;transform:translateX(100%);transition:transform .3s ease;}
.cult-panel.open,.ach-panel.open{display:block;transform:translateX(0);}
.cult-panel::-webkit-scrollbar,.ach-panel::-webkit-scrollbar{width:0;}
@keyframes achSlideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.sign-panel{position:fixed;top:0;left:0;width:100%;height:100%;height:100dvh;background:#f4ede0;z-index:302;display:none;overflow-y:auto;}
.sign-panel.open{display:block;}
.sign-panel::-webkit-scrollbar{width:0;}
.task-panel{position:fixed;top:0;left:0;width:100%;height:100%;height:100dvh;background:#f4ede0;z-index:303;display:none;overflow-y:auto;}
.task-panel.open{display:block;}
.task-panel::-webkit-scrollbar{width:0;}
.activity-panel{position:fixed;top:0;right:0;width:min(400px,92vw);height:100%;height:100dvh;background:#f0e8d8;z-index:303;display:none;overflow-y:auto;transform:translateX(100%);transition:transform .3s ease;}
.activity-panel.open{display:block;transform:translateX(0);}
.activity-panel::-webkit-scrollbar{width:0;}
@keyframes achFadeOut{from{opacity:1}to{opacity:0}}
@keyframes achToast{0%{transform:translateX(120%);opacity:0}15%{transform:translateX(0);opacity:1}85%{transform:translateX(0);opacity:1}100%{transform:translateX(120%);opacity:0}}
@keyframes achPopIn{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.08);opacity:1}100%{transform:scale(1);opacity:1}}

#topHud{position:static;background:rgba(244,237,224,.95);padding:10px 14px 8px;border-bottom:1px solid rgba(90,65,40,.14);}
.hud-top{display:flex;align-items:center;justify-content:space-between;}
.hud-left,.hud-right{display:flex;align-items:center;gap:4px;font-size:18px;}
.hud-center{text-align:center;}
.coin-row{display:flex;align-items:center;gap:4px;}
#hudCoins{font-size:clamp(16px,4.5vw,22px);font-weight:700;color:#8b6914;text-shadow:0 0 8px rgba(139,105,20,.3);}
.cps-row{font-size:10px;color:#8a7a6a;}
#hudCps{color:#aaa;}
#hudQi{font-size:16px;font-weight:600;color:#7eb8ff;}
.hud-bottom{display:flex;justify-content:space-between;font-size:11px;color:#8a7a6a;margin-top:4px;}
#dragonGrid{width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;}
.d-cell{aspect-ratio:1;width:100%;height:100%;background:rgba(90,65,40,.04);border:1.5px solid rgba(90,65,40,.1);border-radius:12px;display:flex;align-items:center;justify-content:center;position:relative;transition:all .2s;overflow:hidden;}
.d-cell:hover:not(:has(.d-card)){border-color:rgba(90,65,40,.2);background:rgba(90,65,40,.07);}
.d-cell.mergeable{border-color:rgba(139,90,43,.6)!important;box-shadow:0 0 16px rgba(139,90,43,.25),inset 0 0 20px rgba(139,90,43,.08)!important;}
.d-cell.drop-target{border-color:rgba(139,90,43,.8)!important;box-shadow:0 0 20px rgba(139,90,43,.35),inset 0 0 24px rgba(139,90,43,.1)!important;background:rgba(139,90,43,.07)!important;}
.d-card{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:grab;user-select:none;border-radius:10px;transition:transform .15s;overflow:visible;}
.d-card:active{cursor:grabbing;}
.d-icon{font-size:clamp(20px,5vw,32px);line-height:1;}
.d-lv{position:absolute;bottom:2px;right:4px;font-size:9px;color:rgba(90,65,40,.45);}
.d-gold{position:absolute;top:2px;left:4px;font-size:9px;color:#8b6914;}
.dragging{position:fixed!important;z-index:999;pointer-events:none;transform:translate(-50%,-50%);box-shadow:0 16px 48px rgba(255,215,0,.5),0 0 0 3px rgba(255,215,0,.4);opacity:.95;background:rgba(30,20,70,.97);border-radius:50%;padding:0;width:64px!important;height:64px!important;display:flex!important;align-items:center;justify-content:center;border:2px solid rgba(255,215,0,.3);}
#summonBar{display:flex;gap:10px;padding:10px 16px 16px;}
.sbtn{flex:1;min-width:0;padding:10px 4px 8px;border-radius:14px;border:1.5px solid;cursor:pointer;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:1px;background:rgba(90,65,40,.06);backdrop-filter:blur(4px);transition:all .2s;color:#3a2a1a;}
.sbtn small{font-size:10px;opacity:.65;}
.sbtn-coin{border-color:rgba(139,100,40,.5);color:#8b6914;}
.sbtn-coin:hover{background:rgba(139,100,40,.12);}
.sbtn-qi{border-color:rgba(80,100,140,.5);color:#5a7090;}
.sbtn-qi:hover{background:rgba(80,100,140,.1);}
.sbtn:disabled{opacity:.35;cursor:not-allowed;}
.sbtn-free{border-color:rgba(80,100,60,.5);color:#4a6030;}
@keyframes mergeFlash{0%{transform:scale(.8);opacity:0}50%{transform:scale(1.3);opacity:1}100%{transform:scale(1);opacity:0}}
#mergeFlash.show{display:flex!important;animation:mergeFlash .5s ease-out forwards;}


/* ===== 召唤翻牌动画 ===== */
#summonOverlay{
  display:none;position:fixed;inset:0;
  background:rgba(230,220,200,.97);z-index:500;
  align-items:center;justify-content:center;flex-direction:column;
}
#summonOverlay.show{display:flex!important;}
/* 翻牌区域 */
.scard-wrap{
  perspective:800px;width:160px;height:200px;margin:30px 0;
}
.scard{
  width:100%;height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 1.2s cubic-bezier(.4,0,.2,1);
  cursor:pointer;
}
.scard.flipped{transform:rotateY(180deg);}
.scard-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:48px;
  border:2px solid rgba(255,215,0,.4);
}
.scard-back{
  background:linear-gradient(160deg,#ddd5c5,#ccc4b4);
  box-shadow:0 0 40px rgba(90,65,40,.15);
}
.scard-back::before{
  content:'？';font-size:64px;color:rgba(90,65,40,.2);
}
/* 金边框高级感 */
.scard-front{
  background:linear-gradient(160deg,#f0e8d8,#e8dcc8);
  transform:rotateY(180deg);
  border-color:rgba(139,90,43,.4);
  box-shadow:0 0 30px rgba(139,90,43,.2);
  flex-direction:column;gap:8px;
}
.scard-front .sf-emoji{font-size:72px;line-height:1;}
.scard-front .sf-name{font-size:18px;color:#3a2a1a;font-weight:700;}
.scard-front .sf-cps{font-size:11px;color:#8a7a6a;}
/* 抽卡提示文字 */
.summon-tip{color:rgba(90,65,40,.35);font-size:14px;letter-spacing:4px;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.7}}
/* 结果揭晓区 */
.summon-result-anim{
  display:none;position:relative;text-align:center;
  padding:12px 20px 8px;border-radius:20px;
  animation:sraIn .5s cubic-bezier(.34,1.56,.64,1) forwards;
}
.summon-result-anim.show{display:block;}
@keyframes sraIn{
  from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}
}
/* 稀有度光效 */
.sra-r0{background:rgba(80,80,80,.08);border:1.5px solid rgba(80,80,80,.2);}
.sra-r1{background:rgba(80,100,140,.08);border:1.5px solid rgba(80,100,140,.3);box-shadow:0 0 28px rgba(80,100,140,.08);}
.sra-r2{background:rgba(139,90,43,.08);border:1.5px solid rgba(139,90,43,.35);box-shadow:0 0 38px rgba(139,90,43,.12);}
.sra-r3{background:rgba(139,90,43,.12);border:1.5px solid rgba(139,90,43,.5);box-shadow:0 0 50px rgba(139,90,43,.2);}
.sra-r4{background:rgba(139,90,43,.18);border:1.5px solid rgba(120,80,50,.6);box-shadow:0 0 60px rgba(139,90,43,.28);animation:sraMyth 1.8s ease-in-out infinite;}
@keyframes sraMyth{0%,100%{box-shadow:0 0 60px rgba(255,80,20,.38)}50%{box-shadow:0 0 100px rgba(255,140,40,.55)}}
/* 粒子 */
.sra-pw{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:20px;}
.sra-p{position:absolute;border-radius:50%;animation:sraP 1.2s ease-out forwards;}
@keyframes sraP{0%{transform:translate(0,0) scale(1);opacity:.9}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
.sra-emoji{font-size:88px;margin:6px 0 2px;filter:drop-shadow(0 0 16px rgba(90,65,40,.35));transition:filter .4s;}
.sra-name{font-size:22px;color:#3a2a1a;font-weight:900;letter-spacing:4px;}
.sra-desc{font-size:13px;color:#888;margin-top:6px;}
.sra-tag{font-size:11px;margin-top:4px;letter-spacing:3px;font-weight:700;opacity:.85;}
.sra-new{font-size:11px;color:#ff9800;letter-spacing:2px;margin-top:4px;animation:sraNew 1.2s ease-in-out infinite;}
@keyframes sraNew{0%,100%{opacity:1}50%{opacity:.45}}
.sra-bar{width:120px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin:8px auto 0;overflow:hidden;}
.sra-fill{height:100%;border-radius:2px;width:0;transition:width 1s ease .2s;}
.sra-cps{font-size:12px;color:#8b6914;opacity:.7;letter-spacing:1px;margin-top:2px;}
.sra-divider{width:50px;height:1px;background:rgba(255,255,255,.1);margin:8px auto;}
/* 光芒效果 */
@keyframes shine{0%{background-position:-200% 0}100%{background-position:200% 0}}
.shine-text{
  background:linear-gradient(90deg,#ffd700,#fff,#ffd700);
  background-size:200% auto;
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 2s linear infinite;
}
/* 弹窗里的召唤结果 */
#summonModal .modal-box{max-width:340px;}
.smodal-rarity{font-size:12px;letter-spacing:4px;margin-bottom:10px;}
.smodal-rarity.r1{color:#aaa;}
.smodal-rarity.r2{color:#7eb8ff;}
.smodal-rarity.r3{color:#b57edc;}
.smodal-rarity.r4{color:#8b6914;}
/* 拖拽时目标格高亮 */
.d-cell.drop-target{border-color:rgba(139,90,43,.8)!important;box-shadow:0 0 16px rgba(139,90,43,.4)!important;background:rgba(139,90,43,.08)!important;}


/* 设置面板 */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(4px);}
.panel-overlay.open{display:flex;}
.panel-box{background:linear-gradient(160deg,#f0e8d8,#e8dcc8);border:1px solid rgba(90,65,40,.35);border-radius:24px;width:min(380px,90vw);animation:popIn .3s ease;}
.panel-header{background:linear-gradient(135deg,#e8dcc8,#ddd5c5);border-bottom:1px solid rgba(90,65,40,.2);padding:16px 20px;font-size:17px;font-weight:700;color:#3a2a1a;border-radius:24px 24px 0 0;}

/* 英雄展示台动画 */
@keyframes blink{0%,100%{opacity:.3}50%{opacity:.7}}
/* 灵兽缩略图 */
.ht{transition:transform .15s;cursor:pointer;}
.ht:hover{transform:scale(1.2);}

/* 底部图标按钮统一圆形 */
.icon-btn{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;position:relative;border:1.5px solid rgba(90,65,40,.15);background:rgba(90,65,40,.06);transition:all .2s;flex-shrink:0;}
.icon-btn:active{transform:scale(.9);}
.icon-task{color:#8b6914;border-color:rgba(139,100,40,.4);background:rgba(139,100,40,.08);}
.icon-book{color:#5a7090;border-color:rgba(90,112,144,.4);background:rgba(90,112,144,.08);}
.icon-active{color:#7a5a3a;border-color:rgba(122,90,58,.4);background:rgba(122,90,58,.08);}
.icon-coin{color:#8b6914;border-color:rgba(139,100,40,.4);background:rgba(139,100,40,.1);}
.icon-qi{color:#5a7090;border-color:rgba(90,112,144,.4);background:rgba(90,112,144,.08);}
.icon-free{color:#4a6030;border-color:rgba(74,96,48,.4);background:rgba(74,96,48,.08);}

.ring-1{left:0;top:50%;transform:translateY(-50%) translateX(-4px);animation:orbit-ring 8s ease-in-out infinite;}
.ring-2{left:0;bottom:6px;animation:orbit-ring 20s ease-in-out infinite reverse;}

/* 灵兽呼吸+光环 */
#heroIcon{transition:all .3s;}
/* ══════════════════════════════════════════
   主页灵兽 · 15级专属动作
   切换：updateHeroSection 根据 best.level 选 class="anim-L{n}"
   ══════════════════════════════════════════ */

/* ─── Lv1-3 雏生类：啾啾雀跃 ─── */
/* 微微蹦跳+左右歪头，有雏鸟啄食的呆萌感 */
.anim-L1,.anim-L2,.anim-L3{
  animation: baby-bounce 2.2s ease-in-out infinite;
}
@keyframes baby-bounce{
  0%   { transform: translate(-50%,-50%) rotate(-3deg) translateY(0);    filter: drop-shadow(0 0 18px rgba(255,220,80,.55)); }
  15%  { transform: translate(-50%,-50%) rotate(2deg)  translateY(-6px);  filter: drop-shadow(0 0 28px rgba(255,220,80,.75)); }
  30%  { transform: translate(-50%,-50%) rotate(-1deg) translateY(1px);   filter: drop-shadow(0 0 20px rgba(255,220,80,.6)); }
  50%  { transform: translate(-50%,-50%) rotate(4deg)  translateY(-9px);  filter: drop-shadow(0 0 30px rgba(255,200,60,.85)); }
  70%  { transform: translate(-50%,-50%) rotate(-2deg) translateY(0);    filter: drop-shadow(0 0 22px rgba(255,220,80,.65)); }
  85%  { transform: translate(-50%,-50%) rotate(1deg)  translateY(-4px);  filter: drop-shadow(0 0 26px rgba(255,220,80,.7)); }
  100% { transform: translate(-50%,-50%) rotate(-3deg) translateY(0);    filter: drop-shadow(0 0 18px rgba(255,220,80,.55)); }
}

/* ─── Lv4-6 飞禽类：振翅欲飞 ─── */
/* rotateX±12° 扇翅感+translateY起伏，3D俯仰感 */
.anim-L4,.anim-L5,.anim-L6{
  animation: bird-soar 2.8s ease-in-out infinite;
}
@keyframes bird-soar{
  0%   { transform: translate(-50%,-50%) translateY(0)     rotateX(0deg)  rotateZ(-4deg);  filter: drop-shadow(0 0 22px rgba(100,180,255,.6)); }
  20%  { transform: translate(-50%,-50%) translateY(-10px)  rotateX(12deg) rotateZ(2deg);  filter: drop-shadow(0 0 32px rgba(100,180,255,.8)); }
  40%  { transform: translate(-50%,-50%) translateY(-4px)   rotateX(-8deg) rotateZ(-2deg); filter: drop-shadow(0 0 26px rgba(100,180,255,.7)); }
  60%  { transform: translate(-50%,-50%) translateY(-14px)  rotateX(10deg) rotateZ(4deg);  filter: drop-shadow(0 0 36px rgba(120,200,255,.9)); }
  80%  { transform: translate(-50%,-50%) translateY(-6px)   rotateX(-5deg) rotateZ(0deg);  filter: drop-shadow(0 0 28px rgba(100,180,255,.75)); }
  100% { transform: translate(-50%,-50%) translateY(0)      rotateX(0deg)  rotateZ(-4deg);  filter: drop-shadow(0 0 22px rgba(100,180,255,.6)); }
}

/* ─── Lv7 灵蝶类：翩翩起舞 ─── */
/* 8字舞步（XY正弦叠加）+rotateZ摇摆，翅膀扇动 */
.anim-L7{
  animation: butterfly-dance 3.2s ease-in-out infinite;
}
@keyframes butterfly-dance{
  0%   { transform: translate(-50%,-50%) translateX(0)    translateY(0)     rotateZ(-8deg);  filter: drop-shadow(0 0 24px rgba(180,120,255,.65)); }
  25%  { transform: translate(-50%,-50%) translateX(12px) translateY(-16px) rotateZ(5deg);  filter: drop-shadow(0 0 34px rgba(180,120,255,.85)); }
  50%  { transform: translate(-50%,-50%) translateX(0)    translateY(-20px) rotateZ(-5deg); filter: drop-shadow(0 0 28px rgba(200,160,255,.9)); }
  75%  { transform: translate(-50%,-50%) translateX(-12px) translateY(-12px) rotateZ(8deg); filter: drop-shadow(0 0 32px rgba(180,120,255,.8)); }
  100% { transform: translate(-50%,-50%) translateX(0)    translateY(0)     rotateZ(-8deg);  filter: drop-shadow(0 0 24px rgba(180,120,255,.65)); }
}

/* ─── Lv8-10 幼龙类：盘龙腾云 ─── */
/* S形摆动+仰头缩放+龙气光晕，庄重有力 */
.anim-L8,.anim-L9,.anim-L10{
  animation: dragon-coil 3.5s ease-in-out infinite;
}
@keyframes dragon-coil{
  0%   { transform: translate(-50%,-50%) rotate(-6deg)  scale(1);    filter: drop-shadow(0 0 28px rgba(80,180,255,.7)); }
  20%  { transform: translate(-50%,-50%) rotate(4deg)   scale(1.04); filter: drop-shadow(0 0 38px rgba(80,200,255,.9)); }
  40%  { transform: translate(-50%,-50%) rotate(-3deg) scale(1.06); filter: drop-shadow(0 0 42px rgba(100,160,255,.85)); }
  60%  { transform: translate(-50%,-50%) rotate(6deg)   scale(1.03); filter: drop-shadow(0 0 36px rgba(80,180,255,.8)); }
  80%  { transform: translate(-50%,-50%) rotate(-4deg) scale(1.05); filter: drop-shadow(0 0 40px rgba(90,190,255,.9)); }
  100% { transform: translate(-50%,-50%) rotate(-6deg) scale(1);    filter: drop-shadow(0 0 28px rgba(80,180,255,.7)); }
}

/* ─── Lv11-12 灵蛇/灵马类 ─── */
/* 波状游走+马蹄轻颠，Y轴微震感 */
.anim-L11,.anim-L12{
  animation: spirit-pulse 2.4s ease-in-out infinite;
}
@keyframes spirit-pulse{
  0%   { transform: translate(-50%,-50%) translateY(0)     rotate(0deg)   scale(1);    filter: drop-shadow(0 0 30px rgba(80,220,140,.7)); }
  15%  { transform: translate(-50%,-50%) translateY(-8px)  rotate(-2deg)  scale(1.03); filter: drop-shadow(0 0 38px rgba(80,220,140,.85)); }
  30%  { transform: translate(-50%,-50%) translateY(2px)   rotate(1deg)   scale(1);    filter: drop-shadow(0 0 32px rgba(80,220,140,.75)); }
  50%  { transform: translate(-50%,-50%) translateY(-12px) rotate(3deg)   scale(1.05); filter: drop-shadow(0 0 40px rgba(100,240,160,.95)); }
  70%  { transform: translate(-50%,-50%) translateY(-4px)  rotate(-1deg)  scale(1.02); filter: drop-shadow(0 0 35px rgba(80,220,140,.8)); }
  100% { transform: translate(-50%,-50%) translateY(0)     rotate(0deg)   scale(1);    filter: drop-shadow(0 0 30px rgba(80,220,140,.7)); }
}

/* ─── Lv13-14 神龙/祖龙类 ─── */
/* 帝王气象：慢旋+亮度呼吸+金色龙气 */
.anim-L13,.anim-L14{
  animation: divine-dragon 4.5s ease-in-out infinite;
}
@keyframes divine-dragon{
  0%   { transform: translate(-50%,-50%) rotate(0deg)   scale(1);    filter: drop-shadow(0 0 32px rgba(255,200,50,.8)) brightness(1); }
  25%  { transform: translate(-50%,-50%) rotate(90deg)  scale(1.06); filter: drop-shadow(0 0 48px rgba(255,140,20,.95)) brightness(1.2); }
  50%  { transform: translate(-50%,-50%) rotate(180deg) scale(1.1);   filter: drop-shadow(0 0 56px rgba(255,215,0,1)) brightness(1.35); }
  75%  { transform: translate(-50%,-50%) rotate(270deg) scale(1.06); filter: drop-shadow(0 0 48px rgba(255,140,20,.95)) brightness(1.2); }
  100% { transform: translate(-50%,-50%) rotate(360deg) scale(1);    filter: drop-shadow(0 0 32px rgba(255,200,50,.8)) brightness(1); }
}

/* ─── Lv15 终焉祖龙：天命永恒 ─── */
/* 最强灵兽：三色粒子+超慢旋+帝王光柱 */
.anim-L15{
  animation: progenitor-eternal 5s ease-in-out infinite;
}
@keyframes progenitor-eternal{
  0%   { transform: translate(-50%,-50%) rotate(0deg)   scale(1)    translateY(0);    filter: drop-shadow(0 0 36px rgba(255,215,0,.9)) brightness(1); }
  20%  { transform: translate(-50%,-50%) rotate(72deg)  scale(1.08) translateY(-8px);  filter: drop-shadow(0 0 55px rgba(255,80,20,.95)) brightness(1.25); }
  40%  { transform: translate(-50%,-50%) rotate(144deg) scale(1.12) translateY(-14px); filter: drop-shadow(0 0 65px rgba(255,215,0,1)) brightness(1.4); }
  60%  { transform: translate(-50%,-50%) rotate(216deg) scale(1.1)  translateY(-10px); filter: drop-shadow(0 0 58px rgba(255,120,180,.9)) brightness(1.3); }
  80%  { transform: translate(-50%,-50%) rotate(288deg) scale(1.07) translateY(-5px);  filter: drop-shadow(0 0 50px rgba(100,255,200,.85)) brightness(1.2); }
  100% { transform: translate(-50%,-50%) rotate(360deg) scale(1)    translateY(0);    filter: drop-shadow(0 0 36px rgba(255,215,0,.9)) brightness(1); }
}
/* Lv15 专属伪元素光束层 */
.anim-L15::before{
  content:'';
  position:absolute;
  left:50%; top:50%;
  width:180px; height:180px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:conic-gradient(from 0deg,transparent,rgba(255,215,0,.3),transparent,rgba(255,100,50,.3),transparent,rgba(100,255,200,.3),transparent);
  animation: L15-conic-spin 3s linear infinite;
  pointer-events:none;
  filter:blur(4px);
  opacity:.6;
}
@keyframes L15-conic-spin{
  from { transform:translate(-50%,-50%) rotate(0deg); }
  to   { transform:translate(-50%,-50%) rotate(360deg); }
}

/* ─── 灵兽切换时的平滑过渡 ─── */
#heroIcon{

<script>
const ZDATA=[
  {e:"🐀",n:"鼠"},{e:"🐂",n:"牛"},{e:"🐅",n:"虎"},{e:"🐇",n:"兔"},
  {e:"🐉",n:"龙"},{e:"🐍",n:"蛇"},{e:"🐎",n:"马"},{e:"🐏",n:"羊"},
  {e:"🐒",n:"猴"},{e:"🐓",n:"鸡"},{e:"🐕",n:"狗"},{e:"🐖",n:"猪"}
];
const FDATA=[
  {e:"🌿",n:"木",d:"经验+50% · 顿悟+20%",c:1,q:1,exp:1.5},
  {e:"🔥",n:"火",d:"金币产出+50%",c:1.5,q:1,exp:1},
  {e:"🟤",n:"土",d:"每日3次免费召唤",c:1,q:1,exp:1},
  {e:"⚪",n:"金",d:"高级召唤概率+30%",c:1,q:1,exp:1},
  {e:"💧",n:"水",d:"龙气+50% · 离线收益+50%",c:1,q:1.5,exp:1}
];
let sz=-1, sf=-1;

const stars=document.getElementById('stars');
for(let i=0;i<60;i++){
  const s=document.createElement('div');
  s.className='star';
  s.style.left=Math.random()*100+'%';
  s.style.top=Math.random()*100+'%';
  s.style.animationDelay=Math.random()*3+'s';
  s.style.width=s.style.height=(1+Math.random()*2)+'px';s.style.background='rgba(139,105,20,.2)';
  stars.appendChild(s);
}

const zg=document.getElementById('zGrid');
ZDATA.forEach((z,i)=>{
  const c=document.createElement('div');
  c.className='zodiac-card';
  c.innerHTML=`<div class="z-emoji">${z.e}</div><div class="z-name">${z.n}</div>`;
  c.onclick=()=>{
    document.querySelectorAll('.zodiac-card').forEach(x=>x.classList.remove('on'));
    c.classList.add('on');
    sz=i; upd();
  };
  zg.appendChild(c);
});

const fg=document.getElementById('fGrid');
FDATA.forEach((f,i)=>{
  const c=document.createElement('div');
  c.className='fate-card fate-'+i;
  c.innerHTML=`<div class="f-emoji">${f.e}</div><div class="f-name">${f.n}命</div>`;
  c.onclick=()=>{
    document.querySelectorAll('.fate-card').forEach(x=>x.classList.remove('on'));
    c.classList.add('on');
    sf=i;
    var bd=document.getElementById('bonus');bd.innerHTML='<span class="bonus-name" style="color:#8b6914;font-weight:700">'+f.e+' '+f.n+'命</span><span class="bonus-desc"> · 产金×'+f.c+' · 龙气×'+f.q+' · 经验×'+f.exp+'</span>';
    upd();
  };
  fg.appendChild(c);
});


function upd(){
  const btn=document.getElementById('sBtn');
  if(sz>=0&&sf>=0){
    btn.className='start-btn ready';
    btn.textContent='天机降临 · 开始';
  } else {
    btn.className='start-btn';
    btn.textContent='请先选择属相与命格';
  }
}

function doStart(){
  if(sz<0||sf<0) return;
  const z=ZDATA[sz],f=FDATA[sf];
  document.getElementById('mZ').textContent=z.e;
  document.getElementById('mF').textContent=f.e;
  document.getElementById('mZn').textContent=z.n;
  document.getElementById('mFn').textContent=f.n;
  document.getElementById('mDesc').textContent=f.d;
  document.getElementById('modal').classList.add('show');
}

</script>

    <div style="display:flex;align-items:center;gap:16px;">
      <span style="font-size:16px;">💰</span><span id="hudCoins" style="font-size:18px;font-weight:700;">0</span>
      <span style="font-size:12px;color:rgba(255,255,255,.4);" id="hudCps">+0/s</span><span id="hudRank" style="font-size:14px;display:none;cursor:pointer;margin-left:8px;" onclick="openRankPanel()"></span>
      <span style="font-size:16px;margin-left:8px;">✨</span><span id="hudQi" style="font-size:16px;font-weight:700;color:#a0d8ef;">0</span>
    </div>
    <span id="hudYunshi" style="font-size:12px;color:rgba(255,255,255,.5);min-width:50px;"></span>
  </div>

  <!-- ===== 技能条顶栏（新增）===== -->
  <div id="skillBarRow" style="flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:clamp(6px,1.5vw,12px);padding:clamp(4px,0.8vh,8px) clamp(40px,6vw,60px);background:rgba(7,7,26,.85);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,215,0,.05);">
    <div id="skillBar" style="display:flex;gap:clamp(6px,1.5vw,12px);align-items:center;justify-content:center;flex-wrap:wrap;"></div>
  </div>

  <!-- ===== 第二行：左按钮 | 灵兽 | 右按钮 ===== -->
    <div id="middleRow" style="flex:1;display:grid;grid-template-columns:52px 200px 1fr 52px;align-items:stretch;min-height:0;overflow:hidden;margin:0;">

<!-- 左侧功能按钮（竖排） -->
    <div style="grid-area:1;width:52px;flex-shrink:0;display:flex;flex-direction:column;justify-content:space-between;align-items:center;z-index:50;padding-top:clamp(32px,5vh,60px);padding-bottom:clamp(70px,12vh,100px);background:linear-gradient(to bottom,rgba(0,0,0,.2) 0%,transparent 30%,transparent 70%,rgba(0,0,0,.15) 100%);">
      <button onclick="openSignPanel()" class="side-btn" data-fn="sign" title="每日签到"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M2 17l10 5 10-5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M2 12l10 5 10-5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
      <button onclick="openTaskPanel()" class="side-btn" data-fn="task" title="每日任务"><svg viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="8" y1="8" x2="16" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="8" y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="8" y1="16" x2="13" y2="16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
      <button onclick="openActivityPanel()" class="side-btn" data-fn="activity" title="限时活动"><svg viewBox="0 0 24 24"><polygon points="13,2 3,14 12,14 11,22 21,10 12,10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/></svg></button>
      <button onclick="openHandbook()" class="side-btn" data-fn="handbook" title="灵兽图鉴"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" fill="none" stroke="currentColor" stroke-width="1.5"/></svg></button>
    </div>

<!-- 灵兽网格（显示，覆盖在中间，5×5格子） -->
    <div id="dragonGrid" style="grid-area:3;flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;padding:0;">
      <div style="display:flex;align-items:center;gap:8px;padding:clamp(8px,1.5vh,14px) 12px clamp(6px,1vh,10px);border-bottom:1px solid rgba(255,215,0,.07);flex-shrink:0;">
        <span style="font-size:13px;color:#8b6914;letter-spacing:2px;font-weight:600;">🐾 灵兽</span>
        <span id="gridCount" style="font-size:11px;color:rgba(255,255,255,.3);"></span>
      </div>
      <div id="dragonGridInner" style="width:100%;flex:1;min-height:0;display:grid;grid-template-columns:repeat(5,1fr);gap:clamp(4px,0.8vw,8px);padding:clamp(6px,1.2vh,14px) clamp(8px,1.8vw,18px);align-content:start;box-sizing:border-box;overflow:hidden;"></div>
    </div>

<!-- 灵兽展示卡（紧凑，右边） -->
    <div id="heroSection" style="grid-area:2;flex:0 0 200px;min-width:160px;max-width:200px;width:200px !important;max-height:100%;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 8px;gap:2px;background:rgba(255,255,255,.015);border-left:1px solid rgba(255,215,0,.06);">
      <!-- 命格标签 -->
      <div id="heroFateTag" style="font-size:9px;color:rgba(255,215,0,.4);letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;">木命 · 大吉</div>
      <!-- 灵兽emoji + 光环 -->
      <div style="position:relative;width:clamp(80px,12vw,120px);height:clamp(80px,12vw,120px);">
        <div style="position:absolute;inset:-12px;background:radial-gradient(circle,rgba(100,60,200,.15) 0%,transparent 70%);border-radius:50%;"></div>
        <div id="heroIcon" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:clamp(60px,9vw,90px);line-height:1;filter:drop-shadow(0 0 16px rgba(139,90,43,.35));transition:filter .6s cubic-bezier(.4,0,.2,1);z-index:2;cursor:pointer;" onclick="cycleHeroAnim()">🐣</div>
      </div>
      <!-- 等级+产金 -->
      <div style="display:flex;align-items:center;gap:6px;">
        <span id="heroLv" style="font-size:11px;font-weight:700;color:#8b6914;letter-spacing:1px;">Lv.1</span>
        <span style="color:rgba(255,215,0,.3);font-size:9px;">·</span>
        <span id="heroCps" style="font-size:10px;color:#aaa;">+1/s</span>
      </div>
      <!-- 进化链预览 -->
      <div id="heroThumbs" style="display:flex;gap:4px;flex-wrap:wrap;justify-content:center;align-items:center;max-width:clamp(150px,18vw,210px);font-size:clamp(14px,2.5vw,22px);opacity:.5;margin-top:2px;"></div>
    </div>

<!-- 右侧功能按钮（竖排） -->
    <div style="grid-area:4;width:52px;flex-shrink:0;display:flex;flex-direction:column;justify-content:space-between;align-items:center;z-index:50;padding-top:clamp(32px,5vh,60px);padding-bottom:clamp(70px,12vh,100px);background:linear-gradient(to bottom,rgba(0,0,0,.2) 0%,transparent 30%,transparent 70%,rgba(0,0,0,.15) 100%);">
      <button onclick="openRankPanel()" class="side-btn" data-fn="rank" title="排行榜"><svg viewBox="0 0 24 24"><path d="M8 21h8m-4-4v4m-5-8l2.5-6.5L12 12l3.5-5.5L20 13H4z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 4h10l-1.5 4-3 2-3-2L7 4z" fill="currentColor" opacity=".5"/><circle cx="12" cy="6" r="1.5" fill="currentColor"/></svg></button>
      <button onclick="openAchPanel()" class="side-btn" data-fn="ach" title="成就"><svg viewBox="0 0 24 24"><path d="M12 15a6 6 0 1 0 0-12 6 6 0 0 0 0 12z" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M8.21 13.89L7 23l5-3 5 3-1.21-9.12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <button onclick="openStatsPanel()" class="side-btn" data-fn="stat" title="游戏统计" style="color:rgba(90,65,40,.55);"><svg viewBox="0 0 24 24"><rect x="3" y="12" width="4" height="9" rx="1" fill="currentColor"/><rect x="10" y="7" width="4" height="14" rx="1" fill="currentColor"/><rect x="17" y="3" width="4" height="18" rx="1" fill="currentColor"/></svg></button>
      <button onclick="openSettings()" class="side-btn" data-fn="settings" title="设置"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" fill="none" stroke="currentColor" stroke-width="1.5"/></svg></button>
    </div>
  </div><!-- /中间行 -->

  <!-- ===== 第三行：底部召唤栏 ===== -->
  <div id="gameBottomBar" style="flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:clamp(10px,3vw,20px);padding:calc(6px + env(safe-area-inset-bottom,6px)) clamp(12px,4vw,32px);">
    <button onclick="summonCoin()" class="summon-btn summon-coin" id="btnCoin" style="min-width:clamp(70px,22vw,90px);padding:10px 16px;" title="金币召唤">
      <span style="font-size:18px;">💰</span>
      <span id="coinCost" style="font-size:10px;margin-left:2px;color:rgba(255,220,0,.9);">100</span>
    </button>
    <button onclick="summonQi()" class="summon-btn summon-qi" id="btnQi" style="min-width:90px;padding:10px 16px;" title="龙气召唤">
      <span id="qiCost" style="font-size:9px;display:block;margin-bottom:1px;color:rgba(255,255,255,.5);">✨ 500</span>
      <span style="font-size:18px;">✨</span>
      <span style="font-size:10px;margin-left:2px;color:rgba(160,216,239,.9);">500</span>
    </button>
    <button onclick="summonFree()" class="summon-btn summon-free" id="btnFree" style="display:none;" title="免费召唤">
      <span style="font-size:18px;">🌿</span>
      <span id="freeCount" style="font-size:10px;margin-left:2px;color:rgba(76,175,80,.9);"></span>
    </button>
  </div>

</div>
    </div>
<div id="rankPanel" class="rank-panel"></div>
  <div id="signPanel" class="sign-panel"></div>
  <div id="taskPanel" class="task-panel"></div>
  <div id="activityPanel" class="activity-panel"></div>
  <div id="handbookPanel" class="handbook-panel"></div>

  <!-- === feat[8]: 连击计时条 === -->
  <div id="comboBar">
    <div class="combo-track">
      <div class="combo-fill c0" id="comboFill" style="height:100%"></div>
    </div>
    <div class="combo-badge" id="comboBadge">×1</div>
  </div>
  <div id="cultPanel" class="cult-panel"></div>
  <div id="achPanel" class="ach-panel"></div>
  <div id="weeklyPanel" class="ach-panel"></div>

  <!-- === feat[9]: 游戏统计面板 === -->
  <div id="statsPanel" class="ach-panel" style="z-index:304;"></div>
  <div id="settingsPanel" class="panel-overlay">
    <div class="panel-box">
      <div class="panel-header">⚙️ 设置与重置<a onclick="closeSettings()" style="float:right;cursor:pointer;font-size:22px;line-height:1;">×</a></div>
      <div style="padding:20px 20px 24px;">
        <div style="margin-bottom:18px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px;">
            <span>🔊 总音量</span><span id="volVal">70%</span>
          </div>
          <input type="range" id="volSlider" min="0" max="100" value="70" style="width:100%;accent-color:#8b6914;" oninput="onVolChange(this.value)">
        </div>
        <div style="margin-bottom:18px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px;">
            <span>🎵 背景音乐</span>
            <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#aaa;">
              <input type="checkbox" id="bgmToggle" checked onchange="onBgmToggle(this.checked)">
              <span id="bgmLabel">开启</span>
            </label>
          </div>
          <input type="range" id="bgmSlider" min="0" max="100" value="35" style="width:100%;accent-color:#8b6914;" oninput="onBgmChange(this.value)">
        </div>
        <div style="margin-bottom:24px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px;">
            <span>🔔 游戏音效</span>
            <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#aaa;">
              <input type="checkbox" id="sfxToggle" checked onchange="onSfxToggle(this.checked)"><span id="sfxLabel">开启</span>
            </label>
          </div>
          <input type="range" id="sfxSlider" min="0" max="100" value="80" style="width:100%;accent-color:#8b6914;" oninput="onSfxChange(this.value)">
        </div>
        <div style="margin-bottom:24px;">
          <div style="margin-bottom:8px;font-size:14px;">☁️ 服务器地址（天机榜）</div>
          <input type="text" id="backendUrlInput" placeholder="例：http://你的服务器IP:3001" style="width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 12px;color:#fff;font-size:13px;box-sizing:border-box;">
          <div style="margin-top:6px;font-size:11px;color:#555;line-height:1.6;">填入服务器地址后，打开天机榜即可上榜<br>离线模式下游戏不受影响</div>
        </div>
        <button onclick="saveSettings();closeSettings();" style="width:100%;padding:13px;border-radius:20px;background:#8b6914;border:none;color:#f4ede0;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:2px;">保存 ✦</button>
      </div>
    </div>
  </div>
  <div id="fateOverlay" style="position:fixed;inset:0;pointer-events:none;z-index:1;opacity:0;transition:opacity 1s;"></div>
    <div id="mergeFlash" style="display:none;position:fixed;inset:0;align-items:center;justify-content:center;pointer-events:none;z-index:500;">
    <div id="mergeText" style="font-size:96px;filter:drop-shadow(0 0 32px rgba(139,90,43,.5));"></div>
  </div>
  <div id="notif" style="display:none;position:fixed;bottom:100px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:24px;font-size:13px;z-index:400;"></div>
  <div id="guideOverlay"></div>
  <div id="guideTooltip"></div>
  <script src="js/config.js"></script>
<script src="js/audio.js"></script>
<script src="js/game.min.js"></script>
<script src="js/ui.js"></script>
</body>

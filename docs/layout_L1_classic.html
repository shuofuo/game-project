<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>布局L1：经典三列</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100dvh;background:#0d0d14;display:flex;align-items:center;justify-content:center;font-family:system-ui}
.page{max-width:500px;width:100%;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* 顶栏 */
.hud{flex-shrink:0;height:46px;background:#0a0a10;border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:space-between;padding:0 14px}
.hud-icon{font-size:18px}
.hud-res{display:flex;gap:14px}
.hud-stat{display:flex;align-items:center;gap:4px;font-size:14px}
.hud-stat .v{color:#ffd700;font-weight:700}
.hud-stat .q{color:#a0d8ef}
.hud-star{color:rgba(255,215,0,.3);font-size:11px}

/* 技能条 */
.sk{flex-shrink:0;height:36px;background:#0a0a10;border-bottom:1px solid rgba(255,255,255,.04);
  display:flex;align-items:center;justify-content:center;gap:6px;padding:0 12px}
.sk-item{min-width:48px;padding:3px 9px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:8px;display:flex;flex-direction:column;align-items:center;gap:0;cursor:pointer}
.sk-item .n{font-size:10px;color:#c8c8d8;font-weight:600}
.sk-item .d{font-size:9px;color:rgba(255,255,255,.3)}

/* 主区域 */
.main{flex:1;display:flex;min-height:0;overflow:hidden}

/* 侧边栏 */
.side{width:42px;flex-shrink:0;background:#0a0a10;
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:24px 0 68px}
.sb{width:32px;height:32px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
  border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer}

/* 灵兽网格 */
.grid{flex:1;display:flex;flex-direction:column;min-width:0}
.grid-hd{flex-shrink:0;padding:8px 12px 6px;border-bottom:1px solid rgba(255,255,255,.04);
  display:flex;justify-content:space-between;align-items:center}
.grid-hd span{font-size:12px;color:#c8c8d8}
.grid-hd small{font-size:11px;color:rgba(255,255,255,.2)}
.dg-wrap{flex:1;padding:8px;display:grid;grid-template-columns:repeat(5,1fr);gap:5px;align-content:start;overflow:hidden}
.dg{aspect-ratio:1;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  position:relative;font-size:clamp(20px,4.5vw,30px);cursor:pointer}
.dg .lv{position:absolute;top:2px;left:4px;font-size:9px;color:rgba(255,255,255,.35)}
.dg.hi{border-color:rgba(255,215,0,.3);background:rgba(255,215,0,.05)}
.dg.emp{opacity:.15}

/* 主角卡 */
.hero{width:108px;flex-shrink:0;background:rgba(255,255,255,.02);
  border-left:1px solid rgba(255,255,255,.05);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 7px;gap:3px}
.hero-f{font-size:9px;color:rgba(255,255,255,.2);letter-spacing:2px}
.hero-g{width:68px;height:68px;position:relative;display:flex;align-items:center;justify-content:center}
.hero-g::before{content:'';position:absolute;inset:-12px;background:radial-gradient(circle,rgba(255,255,255,.04),transparent);border-radius:50%}
.hero-i{font-size:54px;z-index:1}
.hero-evo{font-size:13px;opacity:.25}
.hero-lv{font-size:11px;font-weight:700;color:#c8c8d8}
.hero-cps{font-size:10px;color:rgba(255,255,255,.25)}
.hero-btns{display:flex;gap:4px;margin-top:3px}
.hero-btn{font-size:11px;padding:4px 8px;border-radius:8px;border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);color:#888;cursor:pointer}
.hero-btn.pk{background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.25);color:#ffd700}

/* 底栏 */
.bot{flex-shrink:0;height:52px;background:#0a0a10;border-top:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;gap:10px;padding:0 16px}
.s-btn{padding:8px 16px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;
  transition:transform .15s}
.s-btn:hover{transform:scale(1.04)}
.s-btn.c{background:#1a1a22;color:#ffd700;border:1px solid rgba(255,215,0,.25)}
.s-btn.q{background:#121820;color:#7ab8f0;border:1px solid rgba(122,184,240,.25)}
.s-btn.f{background:#111a11;color:#70c070;border:1px solid rgba(112,192,112,.25)}

  .qi-icon{display:inline-block;border-radius:50%;background:radial-gradient(circle at 35% 35%,#e0f7fa,#a0d8ef 40%,#4fc3f7 70%,#0277bd);box-shadow:0 0 6px #4fc3f7,0 0 12px rgba(79,195,247,.35);vertical-align:middle;}.qi-icon-sm{width:12px;height:12px;}.qi-icon-md{width:16px;height:16px;}.qi-icon-lg{width:20px;height:20px;}
</style>
</head>
<body>
<div class="page">
  <div class="hud"><span class="hud-icon">🐉</span>
    <div class="hud-res">
      <div class="hud-stat"><span>💰</span><span class="v">12,847</span><span class="q" style="font-size:11px">+86/s</span></div>
      <div class="hud-stat"><span><span class="qi-icon qi-icon-sm"></span></span><span class="q">520</span></div>
    </div>
    <span class="hud-star">⭐⭐⭐</span>
  </div>
  <div class="sk">
    <div class="sk-item"><span class="n">签到</span><span class="d">未签到</span></div>
    <div class="sk-item"><span class="n">任务</span><span class="d">3/5</span></div>
    <div class="sk-item"><span class="n">活动</span><span class="d">进行中</span></div>
    <div class="sk-item"><span class="n">挑战</span><span class="d">4天</span></div>
  </div>
  <div class="main">
    <div class="side">
      <div style="display:flex;flex-direction:column;gap:2px">
        <div class="sb">📋</div><div class="sb">📝</div><div class="sb">⚡</div><div class="sb">📖</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:2px">
        <div class="sb">🏆</div><div class="sb">🎖️</div><div class="sb">📊</div><div class="sb">⚙️</div>
      </div>
    </div>
    <div class="grid">
      <div class="grid-hd"><span>🐾 灵兽</span><small>12只 · +86/s</small></div>
      <div class="dg-wrap">
        <div class="dg hi"><span class="lv">5</span>🐉</div><div class="dg"><span class="lv">3</span>🐍</div>
        <div class="dg"><span class="lv">2</span>🐴</div><div class="dg"><span class="lv">1</span>🐏</div>
        <div class="dg"><span class="lv">4</span>🐅</div><div class="dg"><span class="lv">3</span>🐂</div>
        <div class="dg"><span class="lv">2</span>🐇</div><div class="dg"><span class="lv">1</span>🐀</div>
        <div class="dg"><span class="lv">3</span>🐎</div><div class="dg"><span class="lv">2</span>🐒</div>
        <div class="dg"><span class="lv">6</span>🐓</div><div class="dg"><span class="lv">1</span>🐕</div>
        <div class="dg"><span class="lv">2</span>🐖</div>
        <div class="dg emp"></div><div class="dg emp"></div><div class="dg emp"></div>
        <div class="dg emp"></div><div class="dg emp"></div><div class="dg emp"></div>
        <div class="dg emp"></div><div class="dg emp"></div><div class="dg emp"></div>
        <div class="dg emp"></div><div class="dg emp"></div><div class="dg emp"></div>
      </div>
    </div>
    <div class="hero">
      <div class="hero-f">木命 · 大吉</div>
      <div class="hero-evo">🐣→🐥→🐦→🐓</div>
      <div class="hero-g"><div class="hero-i">🐉</div></div>
      <div><span class="hero-lv">Lv.5</span><span class="hero-cps"> +55/s</span></div>
      <div class="hero-btns"><button class="hero-btn pk">升星</button><button class="hero-btn">详情</button></div>
    </div>
  </div>
  <div class="bot">
    <button class="s-btn c">💰 100</button>
    <button class="s-btn q"><span class="qi-icon qi-icon-sm"></span> 500</button>
    <button class="s-btn f">🌿 免费×3</button>
  </div>
</div>
</body></html>

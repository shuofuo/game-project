<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resize-content">
<title>生肖天机 · 命格修炼</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;touch-action:manipulation;}
html,body{height:100%;height:100dvh;overflow:hidden;}
body{background:#f5f0e8;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#1A1A1A;display:flex;align-items:stretch;justify-content:center;padding:0;margin:0;min-height:100dvh;touch-action:manipulation;-webkit-text-size-adjust:100%;}

.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.bg::before{content:'';position:absolute;inset:0;background:
  radial-gradient(ellipse 100% 80% at 50% -5%,rgba(210,180,140,.18) 0%,transparent 65%),
  radial-gradient(ellipse 80% 50% at 20% 100%,rgba(160,200,200,.12) 0%,transparent 55%),
  radial-gradient(ellipse 60% 40% at 80% 100%,rgba(180,140,200,.10) 0%,transparent 55%);
  background-image:
    repeating-linear-gradient(120deg,transparent,transparent 40px,rgba(200,180,140,.03) 40px,rgba(200,180,140,.03) 41px),
    repeating-linear-gradient(240deg,transparent,transparent 60px,rgba(160,200,200,.025) 60px,rgba(160,200,200,.025) 61px);
}
.stars{position:absolute;inset:0;}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;opacity:.6;animation:twinkle 3s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:1}}

.wrap{position:fixed;z-index:100;width:100vw;max-width:100vw;padding:0 0 calc(16px + env(safe-area-inset-bottom)) 0;margin:0 auto;overflow-x:hidden;top:0;left:0;right:0;bottom:0;overflow-y:auto;background:rgba(245,240,232,.97);}
/* ===== 龙气图标（CSS光球） ===== */
.qi-icon{display:inline-block;border-radius:50%;background:radial-gradient(circle at 35% 35%,#e0f7fa,#a0d8ef 40%,#4fc3f7 70%,#0277bd);box-shadow:0 0 4px rgba(79,195,247,.4),0 0 8px rgba(79,195,247,.2);vertical-align:middle;}
.qi-icon-sm{width:12px;height:12px;}
.qi-icon-md{width:14px;height:14px;}
.qi-icon-lg{width:12px;height:12px;}
.qi-icon-xl{width:14px;height:14px;}

/* ===== 标题区：书法印章风格 ===== */
.logo{text-align:center;margin-bottom:8px;position:relative;}

.logo-badge{
  display:inline-block;
  font-size:12px;letter-spacing:6px;color:#8b6914;font-weight:700;
  padding:4px 18px;border-radius:20px;
  background:rgba(255,215,0,.07);
  border:1px solid rgba(255,215,0,.25);
  animation:shimmer 4s ease-in-out infinite;
  margin-bottom:10px;
}
@keyframes shimmer{0%,100%{border-color:rgba(255,215,0,.25);color:#c8a020}50%{border-color:rgba(255,215,0,.5);color:#1A1A1A;font-weight:600}}

.logo-title-wrap{position:relative;display:inline-block;}
.logo-title{
  font-size:clamp(32px,10vw,46px);
  font-weight:900;letter-spacing:12px;
  color:#1A1A1A;font-weight:600;
  text-shadow:0 0 20px rgba(255,215,0,.5),0 0 40px rgba(255,200,0,.2);
  display:block;text-align:center;margin-bottom:8px;
}
.logo-sub{
  font-size:11px;color:#555;letter-spacing:6px;text-transform:uppercase;
}
/* 属相/命格标签 */
.login-label{
  font-size:11px;letter-spacing:4px;color:#666;text-align:center;
  margin-bottom:10px;text-transform:uppercase;
}

/* 12属相淡化装饰 */

/* 分割线 */
.divider{display:none;}

/* 选区 */
.section{display:none;}

/* 属相网格 4x3 */
.zodiac-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:0 auto 14px;max-width:400px;padding:0 12px;box-sizing:border-box;}
.zodiac-card{background:rgba(255,255,255,.95);border:1.5px solid rgba(180,140,80,.25);border-radius:16px;padding:9px 4px 7px;cursor:pointer;transition:all .2s;text-align:center;user-select:none;}
.zodiac-card:hover{background:rgba(255,255,255,1);border-color:rgba(180,140,80,.4);transform:translateY(-2px);box-shadow:0 4px 14px rgba(180,140,80,.15);}
.zodiac-card:active{transform:scale(.95);transition:transform .05s;}
.zodiac-card.on{background:rgba(200,134,10,.12);border:1.5px solid #c8860a;box-shadow:0 2px 10px rgba(200,134,10,.2);}
.zodiac-card .z-emoji{font-size:clamp(26px,8vw,36px);line-height:1;margin-bottom:4px;}
.zodiac-card .z-name{font-size:11px;color:#555;overflow:hidden;white-space:nowrap;}
.zodiac-card.on .z-name{color:#1A1A1A;font-weight:600;font-weight:700;}

/* 命格：grid 与属相宽度一致，5列居中 */
.fate-row{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin:0 auto 12px;max-width:400px;padding:0 12px;box-sizing:border-box;}
.fate-card{background:rgba(255,255,255,.95);border:1.5px solid rgba(180,140,80,.2);border-radius:14px;padding:8px 4px 7px;cursor:pointer;transition:all .2s;text-align:center;}
.fate-card:hover{background:rgba(255,255,255,1);border-color:rgba(180,140,80,.35);transform:translateY(-2px);box-shadow:0 3px 12px rgba(180,140,80,.12);}
.fate-card:active{transform:scale(.95);transition:transform .05s;}
.fate-card.on{background:rgba(200,134,10,.1);border:1.5px solid rgba(200,134,10,.5);box-shadow:0 2px 10px rgba(200,134,10,.15);}
.fate-card .f-emoji{font-size:clamp(20px,6vw,28px);display:block;margin-bottom:4px;}
.fate-card .f-name{font-size:11px;font-weight:700;display:block;color:rgba(80,40,10,.65);}
.fate-card.fate-0 .f-name{color:#2e7d32}
.fate-card.fate-1 .f-name{color:#c62828}
.fate-card.fate-2 .f-name{color:#795548}
.fate-card.fate-3 .f-name{color:#f57f17}
.fate-card.fate-4 .f-name{color:#1565c0}
/* 加成描述 */
.bonus{min-height:18px;margin:0 0 12px 0;text-align:center;font-size:11px;color:#555;letter-spacing:.5px;}
.bonus .bonus-name{font-weight:700;margin-right:4px;}
.bonus .bonus-desc{color:#888;}

/* 加成展示 */

/* 开始按钮 */
.start-btn{margin-top:4px;width:100%;padding:12px;font-size:15px;background:linear-gradient(135deg,#2a2000,#1a1000);border:1.5px solid #5a4000;border-radius:30px;color:#777;cursor:not-allowed;letter-spacing:4px;font-weight:600;transition:all .3s;}
.start-btn.ready{background:linear-gradient(135deg,#c8a020,#8b6010);border-color:#1A1A1A;font-weight:600;color:#1A1A1A;font-weight:700;cursor:pointer;letter-spacing:4px;box-shadow:0 4px 18px rgba(180,120,20,.3);}
.start-btn.ready:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(200,160,32,.4);}
.start-btn:active{transform:scale(.97);}
/* 底部功能栏 */
#gameBottomBar{padding-bottom:max(20px,env(safe-area-inset-bottom));}

/* 弹窗 */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:200;touch-action:manipulation;-webkit-backdrop-filter:none;}
.modal.show{display:flex;}
.modal-box{background:rgba(255,255,255,.96);border:1.5px solid rgba(180,140,80,.35);border-radius:28px;padding:40px 36px;width:min(380px,90vw);text-align:center;animation:popIn .35s cubic-bezier(.34,1.56,.64,1);box-shadow:0 20px 60px rgba(0,0,0,.18);}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.modal-badge{display:inline-block;background:linear-gradient(135deg,#d4a017,#c8a020);color:#1A1A1A;font-size:11px;font-weight:800;padding:4px 14px;border-radius:20px;letter-spacing:3px;margin-bottom:20px;}
.modal-chars{display:flex;justify-content:center;align-items:center;gap:20px;margin:16px 0 24px;}
.modal-chars .mc-zodiac,.modal-chars .mc-fate{font-size:64px;line-height:1;}
.modal-chars .mc-vs{font-size:20px;color:#1A1A1A;font-weight:800;}
.modal-info{font-size:14px;font-weight:600;color:#333;line-height:1.8;}
.modal-info b{color:#1A1A1A;font-weight:600;font-weight:700;}
.modal-btn{margin-top:8px;width:100%;padding:13px;border-radius:30px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:2px;transition:all .2s;}
.modal-btn-start{background:linear-gradient(135deg,#8b6914,#d4a017);border:none;color:#1A1A1A;font-weight:700;}
.modal-btn-start:hover{transform:scale(1.02);box-shadow:0 8px 24px rgba(180,120,20,.35);}
.modal-btn-cancel{background:transparent;border:1px solid rgba(180,140,80,.3);color:#555;margin-top:10px;}
.modal-btn-cancel:hover{border-color:rgba(180,140,80,.5);color:#1A1A1A;}

/* ===== 游戏主界面 ===== */
#gamePage{width:100%;height:100dvh;overflow:hidden;touch-action:none;flex-direction:column;padding-bottom:0;display:flex;visibility:hidden;opacity:0;}
.rank-panel{position:fixed;top:0;right:0;width:min(380px,92vw);height:100%;height:100dvh;background:#faf7f2;z-index:303;display:none;overflow-y:auto;transform:translateX(100%);transition:transform .3s ease;}
.rank-panel.open{display:block;transform:translateX(0);}.rank-panel::-webkit-scrollbar{width:0;}.handbook-panel{position:fixed;top:0;left:0;width:100%;height:100%;height:100dvh;background:#faf7f2;z-index:301;display:none;overflow-y:auto;}
.handbook-panel.open{display:block;}.handbook-panel::-webkit-scrollbar{width:0;}.cult-panel,.ach-panel{position:fixed;top:0;right:0;width:min(400px,92vw);height:100%;height:100dvh;background:#faf7f2;z-index:302;display:none;overflow-y:auto;transform:translateX(100%);transition:transform .3s ease;}
.cult-panel.open,.ach-panel.open{display:block;transform:translateX(0);}
.cult-panel::-webkit-scrollbar,.ach-panel::-webkit-scrollbar{width:0;}
@keyframes achSlideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.sign-panel{position:fixed;top:0;left:0;width:100%;height:100%;height:100dvh;background:#faf7f2;z-index:302;display:none;overflow-y:auto;}
.sign-panel.open{display:block;}
.sign-panel::-webkit-scrollbar{width:0;}
.task-panel{position:fixed;top:0;left:0;width:100%;height:100%;height:100dvh;background:#faf7f2;z-index:303;display:none;overflow-y:auto;}
.task-panel.open{display:block;}
.task-panel::-webkit-scrollbar{width:0;}
.activity-panel{position:fixed;top:0;right:0;width:min(400px,92vw);height:100%;height:100dvh;background:#faf7f2;z-index:303;display:none;overflow-y:auto;transform:translateX(100%);transition:transform .3s ease;}
.active-center-panel{position:fixed;bottom:0;left:0;width:100%;max-height:88vh;background:rgba(255,255,255,.97);z-index:303;display:none;transform:translateY(110%);transition:transform .35s cubic-bezier(.4,0,.2,1);border-radius:20px 20px 0 0;border-top:1.5px solid rgba(180,140,80,.3);overflow:hidden;-webkit-overflow-scrolling:touch;}
.active-center-panel.open{display:block;transform:translateY(0);}
.ac-card{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,.97);border:1px solid rgba(180,140,80,.18);border-radius:12px;margin-bottom:7px;cursor:pointer;transition:all .2s;}
.ac-card:hover{background:rgba(255,255,255,1);border-color:rgba(180,140,80,.32);box-shadow:0 2px 8px rgba(180,140,80,.1);}
.ac-card.done{opacity:.5;border-color:rgba(76,175,80,.2);}
.ac-card.pending{border-color:rgba(180,140,80,.28);background:rgba(255,255,255,.94);}
.ac-icon{font-size:22px;flex-shrink:0;}
.ac-info{flex:1;min-width:0;}
.ac-title{font-size:13px;font-weight:700;color:#1A1A1A;margin-bottom:2px;}
.ac-desc{font-size:11px;color:#555;}
.ac-progress{height:3px;background:rgba(180,140,80,.15);border-radius:2px;overflow:hidden;margin-top:5px;}
.ac-bar{height:100%;border-radius:2px;transition:width .4s ease;}
.ac-tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap;}
.activity-panel.open{display:block;transform:translateX(0);}
.activity-panel::-webkit-scrollbar{width:0;}
@keyframes achFadeOut{from{opacity:1}to{opacity:0}}
@keyframes achToast{0%{transform:translateX(120%);opacity:0}15%{transform:translateX(0);opacity:1}85%{transform:translateX(0);opacity:1}100%{transform:translateX(120%);opacity:0}}
@keyframes achPopIn{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.08);opacity:1}100%{transform:scale(1);opacity:1}}

#topHud{position:static;rgba(255,255,255,.96);padding:10px 14px 8px;border-bottom:1px solid rgba(255,215,0,.15);}
.hud-top{display:flex;align-items:center;justify-content:space-between;}
.hud-left,.hud-right{display:flex;align-items:center;gap:4px;font-size:18px;}
.hud-center{text-align:center;}
.coin-row{display:flex;align-items:center;gap:4px;}
#hudCoins{font-size:clamp(16px,4.5vw,22px);font-weight:700;color:#1A1A1A;font-weight:600;text-shadow:0 0 8px rgba(255,215,0,.4);}
.cps-row{font-size:10px;color:#888;}
#hudCps{color:#888;}
#hudQi{font-size:16px;font-weight:600;color:#7eb8ff;}
.hud-bottom{display:flex;justify-content:space-between;font-size:11px;color:#555;margin-top:4px;}
#dragonGrid{width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;}
.d-cell{aspect-ratio:1;width:100%;height:100%;padding:3px;background:rgba(255,255,255,.97);border:1.5px solid rgba(180,140,80,.25);border-radius:12px;display:flex;align-items:center;justify-content:center;position:relative;transition:all .2s;overflow:hidden;}
.d-cell>div:not(.d-card){width:100%;height:100%;background:rgba(255,255,255,.9);border-radius:10px;display:flex;align-items:center;justify-content:center;}
.d-cell:hover:not(:has(.d-card))>div:not(.d-card){background:rgba(255,255,255,1);}
.d-cell.mergeable{border-color:#c8860a!important;box-shadow:0 0 16px rgba(200,134,10,.3)!important;}
.d-cell.drop-target{border-color:#c62828!important;box-shadow:0 0 20px rgba(198,40,40,.3)!important;}
.d-card{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:grab;user-select:none;border-radius:10px;transition:transform .15s;overflow:visible;}
.d-card:active{cursor:grabbing;}
.d-icon{font-size:clamp(20px,5vw,32px);line-height:1;}
.d-lv{position:absolute;bottom:2px;right:4px;font-size:9px;color:#333;font-weight:600;}
.d-gold{position:absolute;top:2px;left:4px;font-size:9px;color:#c8860a;font-weight:700;}
.dragging{position:fixed!important;z-index:999;pointer-events:none;transform:translate(-50%,-50%);box-shadow:0 16px 48px rgba(255,215,0,.5),0 0 0 3px rgba(255,215,0,.4);opacity:.95;background:rgba(245,240,232,.97);border-radius:50%;padding:0;width:64px!important;height:64px!important;display:flex!important;align-items:center;justify-content:center;border:2px solid rgba(255,215,0,.3);}
#summonBar{display:flex;gap:10px;padding:10px 16px 16px;}
.sbtn{flex:1;min-width:0;padding:10px 4px 8px;border-radius:14px;border:1.5px solid;cursor:pointer;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:1px;rgba(255,255,255,.92);backdrop-filter:blur(4px);transition:all .2s;color:#888;}
.sbtn small{font-size:10px;opacity:.7;}
.sbtn-coin{border-color:#1A1A1A;font-weight:600;color:#1A1A1A;font-weight:600;;background:rgba(255,248,235,.93);}
.sbtn-coin:hover{background:rgba(255,215,0,.15);}
.sbtn-qi{border-color:#7eb8ff;color:#7eb8ff;}
.sbtn-qi:hover{background:rgba(126,184,255,.15);}
.sbtn:disabled{opacity:.35;cursor:not-allowed;}
.sbtn-free{border-color:#2e7d32;color:#2e7d32;}
@keyframes mergeFlash{0%{transform:scale(.8);opacity:0}50%{transform:scale(1.3);opacity:1}100%{transform:scale(1);opacity:0}}
#mergeFlash.show{display:flex!important;animation:mergeFlash .5s ease-out forwards;}


/* ===== 召唤翻牌动画 ===== */
/* ═══ 召唤弹窗：全屏黑遮罩 + 白底结果卡 ═══ */
#summonOverlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.58);z-index:500;
  align-items:center;justify-content:center;flex-direction:column;
}
#summonOverlay.show{display:flex!important;}
/* 去掉旧翻牌/问号 CSS（不再使用） */
/* 结果揭晓区：居中白色卡片 */
.summon-result-anim{
  display:none;position:fixed;text-align:center;
  left:50%;top:50%;transform:translate(-50%,-50%);
  padding:24px 28px 20px;border-radius:24px;
  z-index:510;min-width:260px;
  flex-direction:column;align-items:center;
  background:rgba(255,255,255,.97);border:1.5px solid rgba(180,140,80,.3);
  box-shadow:0 16px 60px rgba(0,0,0,.25);
  animation:sraIn .45s cubic-bezier(.34,1.56,.64,1) forwards;
}
.summon-result-anim.show{display:flex;}
@keyframes sraIn{
  from{transform:translate(-50%,-50%) scale(.4);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}
}
/* 稀有度统一白底，深色文字 */
.sra-r0,.sra-r1,.sra-r2,.sra-r3,.sra-r4{
  background:rgba(255,255,255,.97)!important;
  border-color:rgba(180,140,80,.3)!important;
  box-shadow:0 8px 40px rgba(0,0,0,.18)!important;
}
@keyframes sraMyth{0%,100%{box-shadow:0 8px 60px rgba(255,80,20,.35)}50%{box-shadow:0 8px 100px rgba(255,140,40,.5)}}
/* 粒子 */
.sra-pw{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:24px;}
.sra-p{position:absolute;border-radius:50%;animation:sraP 1.2s ease-out forwards;}
@keyframes sraP{0%{transform:translate(0,0) scale(1);opacity:.9}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
/* 结果文字 */
.sra-emoji{font-size:72px;margin:6px 0 4px;transition:filter .4s;}
.sra-name{font-size:22px;color:#1A1A1A;font-weight:900;letter-spacing:3px;}
.sra-desc{font-size:13px;color:#333;margin-top:6px;line-height:1.7;}
.sra-tag{font-size:11px;color:#555;margin-top:4px;letter-spacing:2px;font-weight:700;opacity:.8;}
.sra-new{font-size:12px;color:#c62828;font-weight:700;margin-top:6px;letter-spacing:2px;}
@keyframes sraNew{0%,100%{opacity:1}50%{opacity:.45}}
.sra-bar{width:120px;height:3px;background:rgba(180,140,80,.12);border-radius:2px;margin:8px auto 0;overflow:hidden;}
.sra-fill{height:100%;border-radius:2px;width:0;transition:width 1s ease .2s;}
.sra-cps{font-size:12px;color:#333;letter-spacing:1px;margin-top:4px;}
.sra-divider{width:50px;height:1px;background:rgba(180,140,80,.15);margin:8px auto;}
/* 光芒效果 */
@keyframes shine{0%{background-position:-200% 0}100%{background-position:200% 0}}
.shine-text{
  background:linear-gradient(90deg,#ffd700,#fff,#ffd700);
  background-size:200% auto;
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 2s linear infinite;
}
/* 弹窗里的召唤结果 */
#summonModal .modal-box{max-width:340px;}
.smodal-rarity{font-size:12px;letter-spacing:4px;margin-bottom:10px;}
.smodal-rarity.r1{color:#888;}
.smodal-rarity.r2{color:#7eb8ff;}
.smodal-rarity.r3{color:#b57edc;}
.smodal-rarity.r4{color:#1A1A1A;font-weight:600;}
/* 拖拽时目标格高亮 */
.d-cell.drop-target{border-color:#c62828!important;box-shadow:0 0 16px rgba(198,40,40,.3)!important;}


/* 设置面板 */
.panel-overlay{position:fixed;inset:0;background:rgba(80,40,10,.25);display:none;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(4px);}
.panel-overlay.open,.panel-overlay.show{display:flex;align-items:center;justify-content:center;}
.panel-box{background:linear-gradient(160deg,#fdfcf5,#f0ebe0);border:1px solid rgba(180,140,80,.35);border-radius:24px;width:min(420px,92vw);max-height:88vh;overflow-y:auto;animation:popIn .3s ease;box-sizing:border-box;-ms-overflow-style:none;scrollbar-width:none;}.panel-box::-webkit-scrollbar{width:0;height:0;display:none;}.panel-overlay .panel-box{overflow-y:auto;scrollbar-width:none;-ms-overflow-style:none;}.panel-overlay .panel-box::-webkit-scrollbar{width:0;height:0;display:none;}.panel-overlay .panel-content{overflow-y:auto;scrollbar-width:none;-ms-overflow-style:none;}.panel-overlay .panel-content::-webkit-scrollbar{width:0;height:0;display:none;}

/* ── 面板内容区滚动容器 ── */
#activeCenterItems{max-height:calc(88vh - 80px);overflow-y:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:20px;}
#activeCenterItems::-webkit-scrollbar{width:0;height:0;display:none;}
#forgeContent,#towerContent,#skinContent,#atlasContent{max-height:88vh;overflow-y:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
#forgeContent::-webkit-scrollbar,#towerContent::-webkit-scrollbar,#skinContent::-webkit-scrollbar,#atlasContent::-webkit-scrollbar{width:0;height:0;display:none;}
#forgeContent,#towerContent,#skinContent,#atlasContent{padding:12px 16px 24px;}
.forge-body{max-height:calc(88vh - 180px);overflow-y:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding:0 2px 10px;}
.forge-body::-webkit-scrollbar{width:0;height:0;display:none;}
.panel-header{rgba(200,220,250,.92);border-bottom:1px solid rgba(180,140,80,.4);padding:16px 20px;font-size:17px;font-weight:700;color:#1A1A1A;font-weight:600;border-radius:24px 24px 0 0;}

/* 英雄展示台动画 */
@keyframes blink{0%,100%{opacity:.3}50%{opacity:.6}}
/* 灵兽缩略图 */
.ht{transition:transform .15s;cursor:pointer;}
.ht:hover{transform:scale(1.2);}

/* 底部图标按钮统一圆形 */
.icon-btn{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;position:relative;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);transition:all .2s;flex-shrink:0;}
.icon-btn:active{transform:scale(.9);}
.icon-task{color:#1A1A1A;border-color:rgba(200,160,32,.3);background:rgba(200,160,32,.08);}
.icon-book{color:#42a5f5;border-color:rgba(66,165,245,.3);background:rgba(66,165,245,.08);}
.icon-active{color:#c62828;font-weight:700;border-color:rgba(198,40,40,.3);background:rgba(198,40,40,.08);}
.icon-coin{color:#1A1A1A;font-weight:600;border-color:rgba(255,215,0,.4);background:rgba(255,215,0,.1);}
.icon-qi{color:#1565c0;font-weight:700;border-color:rgba(21,101,192,.3);background:rgba(21,101,192,.08);}
.icon-free{color:#388e3c;font-weight:700;border-color:rgba(56,142,60,.3);background:rgba(56,142,60,.08);}
.icon-rank{color:#7b3fcb;font-weight:700;border-color:rgba(123,63,203,.3);background:rgba(123,63,203,.08);}
.icon-ach{color:#ff9800;border-color:rgba(255,152,0,.3);background:rgba(255,152,0,.06);}
.icon-set{color:rgba(80,40,10,.4);border-color:rgba(255,255,255,.1);rgba(255,255,255,.92);}
/* 灵兽环绕属性 */
.attr-ring{position:absolute;display:flex;align-items:center;}
.attr-pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;letter-spacing:.5px;border:1px solid rgba(255,215,0,.3);background:rgba(255,215,0,.08);color:#1A1A1A;font-weight:600;}
.ring-1{left:0;top:50%;transform:translateY(-50%) translateX(-4px);animation:orbit-ring 8s ease-in-out infinite;}
.ring-2{left:0;bottom:6px;animation:orbit-ring 20s ease-in-out infinite reverse;}
.ring-3{right:0;top:50%;transform:translateY(-50%) translateX(4px);animation:orbit-ring-r 18s ease-in-out infinite;}
.ring-4{right:0;bottom:6px;animation:orbit-ring-r 22s ease-in-out infinite reverse;}
@keyframes orbit-ring{0%,100%{opacity:.4}50%{opacity:.75;transform:translateX(-3px) translateY(-5px)}}
@keyframes orbit-ring-r{0%,100%{opacity:.4}50%{opacity:.75;transform:translateX(3px) translateY(-5px)}}
/* 灵兽呼吸+光环 */
#heroIcon{transition:all .3s;}
/* ══════════════════════════════════════════
   主页灵兽 · 15级专属动作
   切换：updateHeroSection 根据 best.level 选 class="anim-L{n}"
   ══════════════════════════════════════════ */

/* ─── Lv1-3 雏生类：啾啾雀跃 ─── */
/* 微微蹦跳+左右歪头，有雏鸟啄食的呆萌感 */
.anim-L1,.anim-L2,.anim-L3{
  animation: baby-bounce 2.2s ease-in-out infinite;
}
@keyframes baby-bounce{
  0%   { transform: translate(-50%,-50%) rotate(-3deg) translateY(0);    filter: drop-shadow(0 0 18px rgba(255,220,80,.55)); }
  15%  { transform: translate(-50%,-50%) rotate(2deg)  translateY(-6px);  filter: drop-shadow(0 0 28px rgba(255,220,80,.75)); }
  30%  { transform: translate(-50%,-50%) rotate(-1deg) translateY(1px);   filter: drop-shadow(0 0 20px rgba(255,220,80,.6)); }
  50%  { transform: translate(-50%,-50%) rotate(4deg)  translateY(-9px);  filter: drop-shadow(0 0 30px rgba(255,200,60,.85)); }
  70%  { transform: translate(-50%,-50%) rotate(-2deg) translateY(0);    filter: drop-shadow(0 0 22px rgba(255,220,80,.65)); }
  85%  { transform: translate(-50%,-50%) rotate(1deg)  translateY(-4px);  filter: drop-shadow(0 0 26px rgba(255,220,80,.7)); }
  100% { transform: translate(-50%,-50%) rotate(-3deg) translateY(0);    filter: drop-shadow(0 0 18px rgba(255,220,80,.55)); }
}

/* ─── Lv4-6 飞禽类：振翅欲飞 ─── */
/* rotateX±12° 扇翅感+translateY起伏，3D俯仰感 */
.anim-L4,.anim-L5,.anim-L6{
  animation: bird-soar 2.8s ease-in-out infinite;
}
@keyframes bird-soar{
  0%   { transform: translate(-50%,-50%) translateY(0)     rotateX(0deg)  rotateZ(-4deg);  filter: drop-shadow(0 0 22px rgba(100,180,255,.6)); }
  20%  { transform: translate(-50%,-50%) translateY(-10px)  rotateX(12deg) rotateZ(2deg);  filter: drop-shadow(0 0 32px rgba(100,180,255,.8)); }
  40%  { transform: translate(-50%,-50%) translateY(-4px)   rotateX(-8deg) rotateZ(-2deg); filter: drop-shadow(0 0 26px rgba(100,180,255,.7)); }
  60%  { transform: translate(-50%,-50%) translateY(-14px)  rotateX(10deg) rotateZ(4deg);  filter: drop-shadow(0 0 36px rgba(120,200,255,.9)); }
  80%  { transform: translate(-50%,-50%) translateY(-6px)   rotateX(-5deg) rotateZ(0deg);  filter: drop-shadow(0 0 28px rgba(100,180,255,.75)); }
  100% { transform: translate(-50%,-50%) translateY(0)      rotateX(0deg)  rotateZ(-4deg);  filter: drop-shadow(0 0 22px rgba(100,180,255,.6)); }
}

/* ─── Lv7 灵蝶类：翩翩起舞 ─── */
/* 8字舞步（XY正弦叠加）+rotateZ摇摆，翅膀扇动 */
.anim-L7{
  animation: butterfly-dance 3.2s ease-in-out infinite;
}
@keyframes butterfly-dance{
  0%   { transform: translate(-50%,-50%) translateX(0)    translateY(0)     rotateZ(-8deg);  filter: drop-shadow(0 0 24px rgba(180,120,255,.65)); }
  25%  { transform: translate(-50%,-50%) translateX(12px) translateY(-16px) rotateZ(5deg);  filter: drop-shadow(0 0 34px rgba(180,120,255,.85)); }
  50%  { transform: translate(-50%,-50%) translateX(0)    translateY(-20px) rotateZ(-5deg); filter: drop-shadow(0 0 28px rgba(200,160,255,.9)); }
  75%  { transform: translate(-50%,-50%) translateX(-12px) translateY(-12px) rotateZ(8deg); filter: drop-shadow(0 0 32px rgba(180,120,255,.8)); }
  100% { transform: translate(-50%,-50%) translateX(0)    translateY(0)     rotateZ(-8deg);  filter: drop-shadow(0 0 24px rgba(180,120,255,.65)); }
}

/* ─── Lv8-10 幼龙类：盘龙腾云 ─── */
/* S形摆动+仰头缩放+龙气光晕，庄重有力 */
.anim-L8,.anim-L9,.anim-L10{
  animation: dragon-coil 3.5s ease-in-out infinite;
}
@keyframes dragon-coil{
  0%   { transform: translate(-50%,-50%) rotate(-6deg)  scale(1);    filter: drop-shadow(0 0 28px rgba(80,180,255,.7)); }
  20%  { transform: translate(-50%,-50%) rotate(4deg)   scale(1.04); filter: drop-shadow(0 0 38px rgba(80,200,255,.9)); }
  40%  { transform: translate(-50%,-50%) rotate(-3deg) scale(1.06); filter: drop-shadow(0 0 42px rgba(100,160,255,.85)); }
  60%  { transform: translate(-50%,-50%) rotate(6deg)   scale(1.03); filter: drop-shadow(0 0 36px rgba(80,180,255,.8)); }
  80%  { transform: translate(-50%,-50%) rotate(-4deg) scale(1.05); filter: drop-shadow(0 0 40px rgba(90,190,255,.9)); }
  100% { transform: translate(-50%,-50%) rotate(-6deg) scale(1);    filter: drop-shadow(0 0 28px rgba(80,180,255,.7)); }
}

/* ─── Lv11-12 灵蛇/灵马类 ─── */
/* 波状游走+马蹄轻颠，Y轴微震感 */
.anim-L11,.anim-L12{
  animation: spirit-pulse 2.4s ease-in-out infinite;
}
@keyframes spirit-pulse{
  0%   { transform: translate(-50%,-50%) translateY(0)     rotate(0deg)   scale(1);    filter: drop-shadow(0 0 30px rgba(80,220,140,.7)); }
  15%  { transform: translate(-50%,-50%) translateY(-8px)  rotate(-2deg)  scale(1.03); filter: drop-shadow(0 0 38px rgba(80,220,140,.85)); }
  30%  { transform: translate(-50%,-50%) translateY(2px)   rotate(1deg)   scale(1);    filter: drop-shadow(0 0 32px rgba(80,220,140,.75)); }
  50%  { transform: translate(-50%,-50%) translateY(-12px) rotate(3deg)   scale(1.05); filter: drop-shadow(0 0 40px rgba(100,240,160,.95)); }
  70%  { transform: translate(-50%,-50%) translateY(-4px)  rotate(-1deg)  scale(1.02); filter: drop-shadow(0 0 35px rgba(80,220,140,.8)); }
  100% { transform: translate(-50%,-50%) translateY(0)     rotate(0deg)   scale(1);    filter: drop-shadow(0 0 30px rgba(80,220,140,.7)); }
}

/* ─── Lv13-14 神龙/祖龙类 ─── */
/* 帝王气象：慢旋+亮度呼吸+金色龙气 */
.anim-L13,.anim-L14{
  animation: divine-dragon 4.5s ease-in-out infinite;
}
@keyframes divine-dragon{
  0%   { transform: translate(-50%,-50%) rotate(0deg)   scale(1);    filter: drop-shadow(0 0 32px rgba(255,200,50,.8)) brightness(1); }
  25%  { transform: translate(-50%,-50%) rotate(90deg)  scale(1.06); filter: drop-shadow(0 0 48px rgba(255,140,20,.95)) brightness(1.2); }
  50%  { transform: translate(-50%,-50%) rotate(180deg) scale(1.1);   filter: drop-shadow(0 0 56px rgba(255,215,0,1)) brightness(1.35); }
  75%  { transform: translate(-50%,-50%) rotate(270deg) scale(1.06); filter: drop-shadow(0 0 48px rgba(255,140,20,.95)) brightness(1.2); }
  100% { transform: translate(-50%,-50%) rotate(360deg) scale(1);    filter: drop-shadow(0 0 32px rgba(255,200,50,.8)) brightness(1); }
}

/* ─── Lv15 终焉祖龙：天命永恒 ─── */
/* 最强灵兽：三色粒子+超慢旋+帝王光柱 */
.anim-L15{
  animation: progenitor-eternal 5s ease-in-out infinite;
}
@keyframes progenitor-eternal{
  0%   { transform: translate(-50%,-50%) rotate(0deg)   scale(1)    translateY(0);    filter: drop-shadow(0 0 36px rgba(255,215,0,.9)) brightness(1); }
  20%  { transform: translate(-50%,-50%) rotate(72deg)  scale(1.08) translateY(-8px);  filter: drop-shadow(0 0 55px rgba(255,80,20,.95)) brightness(1.25); }
  40%  { transform: translate(-50%,-50%) rotate(144deg) scale(1.12) translateY(-14px); filter: drop-shadow(0 0 65px rgba(255,215,0,1)) brightness(1.4); }
  60%  { transform: translate(-50%,-50%) rotate(216deg) scale(1.1)  translateY(-10px); filter: drop-shadow(0 0 58px rgba(255,120,180,.9)) brightness(1.3); }
  80%  { transform: translate(-50%,-50%) rotate(288deg) scale(1.07) translateY(-5px);  filter: drop-shadow(0 0 50px rgba(100,255,200,.85)) brightness(1.2); }
  100% { transform: translate(-50%,-50%) rotate(360deg) scale(1)    translateY(0);    filter: drop-shadow(0 0 36px rgba(255,215,0,.9)) brightness(1); }
}
/* Lv15 专属伪元素光束层 */
.anim-L15::before{
  content:'';
  position:absolute;
  left:50%; top:50%;
  width:180px; height:180px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:conic-gradient(from 0deg,transparent,rgba(255,215,0,.3),transparent,rgba(255,100,50,.3),transparent,rgba(100,255,200,.3),transparent);
  animation: L15-conic-spin 3s linear infinite;
  pointer-events:none;
  filter:blur(4px);
  opacity:.6;
}
@keyframes L15-conic-spin{
  from { transform:translate(-50%,-50%) rotate(0deg); }
  to   { transform:translate(-50%,-50%) rotate(360deg); }
}

/* ─── 灵兽切换时的平滑过渡 ─── */
#heroIcon{
  transition: transform .5s cubic-bezier(.4,0,.2,1), filter .6s cubic-bezier(.4,0,.2,1);
}
.hero-glow{display:none;}

.summon-qi{background:rgba(255,255,255,.96);border:1.5px solid rgba(180,140,80,.4);color:#1A1A1A;font-weight:600;}
.summon-qi:hover{background:rgba(255,255,255,.9);border-color:rgba(180,140,80,.55);}
.summon-free{background:rgba(255,255,255,.96);border:1.5px solid rgba(180,140,80,.4);color:#4a7c3f;padding:8px 14px;min-width:0;}

#summonBatchSwitch button{background:transparent;color:rgba(255,255,255,.35);}
#summonBatchSwitch button.active{background:rgba(255,215,0,.2);color:#1A1A1A;font-weight:600;box-shadow:0 0 8px rgba(255,215,0,.25);}
/* 命格修炼节点脉冲动画 */
.cult-pulse{animation:cultPulse .7s ease-out forwards;}
@keyframes cultPulse{
  0%{transform:scale(1);box-shadow:0 0 0 0 rgba(255,215,0,.6);}
  40%{transform:scale(1.06);box-shadow:0 0 0 10px rgba(255,215,0,.2);}

  0%{opacity:1;transform:translateY(0) scale(1);}

  white-space:nowrap;
}

/* ===== 新手引导 ===== */
#guideOverlay{position:fixed;inset:0;background:rgba(80,40,10,.25);z-index:998;display:none;overflow:hidden;}
#guideOverlay.active{display:block;}
.guide-cutout{position:absolute;background:transparent;box-shadow:0 0 0 9999px rgba(0,0,0,.75);border-radius:12px;border:2.5px solid #ffd700;animation:guidePulse 1.5s ease-in-out infinite;}
@keyframes guidePulse{0%,100%{box-shadow:0 0 0 9999px rgba(0,0,0,.75),0 0 8px rgba(255,215,0,.4);}50%{box-shadow:0 0 0 9999px rgba(0,0,0,.75),0 0 20px rgba(255,215,0,.7);}}
#guideTooltip{position:fixed;z-index:9999;background:linear-gradient(160deg,#1a1a3a,#0a0a2a);border:1px solid rgba(255,215,0,.3);border-radius:16px;padding:20px;max-width:min(340px,88vw);box-shadow:0 8px 40px rgba(0,0,0,.8);animation:guideFadeIn .25s ease;display:none;}
#guideTooltip.show{display:block;}
@keyframes guideFadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.gt-step-num{font-size:11px;color:#1A1A1A;font-weight:600;opacity:.6;margin-bottom:6px;letter-spacing:1px;}
.gt-title{font-size:15px;font-weight:700;color:#555;margin-bottom:8px;}
.gt-body{font-size:14px;color:#555;line-height:1.8;margin-bottom:16px;}
.gt-btns{display:flex;gap:8px;justify-content:flex-end;align-items:center;}
.gt-next{background:linear-gradient(135deg,#ffd700,#ff9800);border:none;border-radius:20px;color:#1a0a00;font-size:13px;font-weight:600;font-weight:700;padding:8px 20px;cursor:pointer;}
.gt-skip{background:transparent;border:1px solid rgba(255,255,255,.15);border-radius:20px;color:#666;font-size:11px;padding:7px 14px;cursor:pointer;}
#guideDots{display:flex;gap:5px;margin-bottom:12px;}
#guideDots .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .2s;}
#guideDots .dot.done{background:#d4a017;}
#guideDots .dot.active{background:#fff;width:18px;border-radius:3px;}

/* === feat[5]: 召唤动画视觉增强 === */
.summon-particle{position:fixed;border-radius:50%;pointer-events:none;animation:spFly .8s ease-out forwards;z-index:9000;}
@keyframes spFly{to{transform:translate(var(--dx,100px),var(--dy,100px)) scale(0);opacity:0;}}
.hero-flash{animation:heroFlashAnim .3s ease forwards;}
@keyframes heroFlashAnim{0%,100%{filter:brightness(1)}50%{filter:brightness(2) drop-shadow(0 0 20px #ffd700);}}
.screen-shake{animation:shake .3s ease forwards;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* === feat[8]: 连击特效系统 === */
#comboBar{position:fixed;bottom:90px;left:14px;z-index:200;display:none;flex-direction:column;align-items:center;gap:6px;pointer-events:none;}
.combo-track{width:6px;height:72px;rgba(255,255,255,.96);border-radius:3px;overflow:hidden;position:relative;}
.combo-fill{position:absolute;bottom:0;left:0;width:100%;height:100%;border-radius:3px;transition:height .08s linear,background .2s;}
.combo-fill.c0{background:linear-gradient(to top,#4CAF50,#81C784);}
.combo-fill.c1{background:linear-gradient(to top,#8BC34A,#CDDC39);}
.combo-fill.c2{background:linear-gradient(to top,#FF9800,#FFC107);}
.combo-fill.c3{background:linear-gradient(to top,#FF5722,#FF7043);}
.combo-fill.c4{background:linear-gradient(to top,#e040fb,#CE93D8);box-shadow:0 0 6px rgba(224,64,251,.5);}
.combo-fill.c5{background:linear-gradient(to top,#ffd700,#FFA000);box-shadow:0 0 8px rgba(255,215,0,.6);}
.combo-badge{font-size:12px;font-weight:900;color:#1A1A1A;font-weight:600;letter-spacing:1px;background:rgba(255,215,0,.1);border:1.5px solid rgba(255,215,0,.35);border-radius:8px;padding:3px 7px;text-align:center;box-shadow:0 0 10px rgba(255,215,0,.12);}
.combo-particle{position:fixed;border-radius:50%;pointer-events:none;z-index:8888;animation:comboP .9s ease-out forwards;}
@keyframes comboP{0%{transform:translate(0,0) scale(1);opacity:.9}100%{transform:translate(var(--dx),var(--dy)) scale(.15);opacity:0}}
.combo-milestone{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:9999;pointer-events:none;font-size:clamp(38px,11vw,68px);font-weight:900;letter-spacing:4px;text-align:center;animation:cMileAnim 1.5s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes cMileAnim{0%{transform:translate(-50%,-50%) scale(.25);opacity:0}12%{transform:translate(-50%,-50%) scale(1.18);opacity:1}25%{transform:translate(-50%,-50%) scale(.94);opacity:1}62%{transform:translate(-50%,-50%) scale(1);opacity:1}78%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(1.2);opacity:0}}
@keyframes comboScoreF{0%{opacity:1;transform:translateY(0) scale(1);}60%{opacity:1;transform:translateY(-55px) scale(1.15);}100%{opacity:0;transform:translateY(-100px) scale(.7);}}
.combo-score{position:fixed;pointer-events:none;z-index:8900;font-size:15px;font-weight:800;color:#1A1A1A;font-weight:600;text-shadow:0 0 8px rgba(255,215,0,.8),0 1px 2px rgba(0,0,0,.8);animation:comboScoreF 1.4s ease-out forwards;white-space:nowrap;}
.combo-score.x3{color:#c62828;font-weight:800;}
.combo-score.x5{color:#ff5722;text-shadow:0 0 12px rgba(255,87,34,.9);}
.combo-score.x7{color:#1A1A1A;font-weight:600;text-shadow:0 0 14px rgba(224,64,251,.9);}
.combo-score.x10{color:#1A1A1A;font-weight:600;text-shadow:0 0 18px rgba(255,215,0,1);font-size:20px;}
@keyframes cShakeX{0%,100%{transform:translateX(0)}15%{transform:translateX(-6px)}35%{transform:translateX(5px)}55%{transform:translateX(-4px)}75%{transform:translateX(3px)}88%{transform:translateX(-2px)}}
.combo-shake{animation:cShakeX .5s ease forwards;}

/* === feat[9]: 游戏统计面板 === */
.stat-item{display:flex;justify-content:space-between;align-items:center;padding:10px 4px;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px;font-weight:600;}
.stat-item:last-child{border-bottom:none;}
.stat-label{color:#555;display:flex;align-items:center;gap:6px;}
.stat-label span{font-size:16px;}
.stat-value{font-weight:700;color:#1A1A1A;font-weight:600;font-size:14px;}

/* === feat[10]: 周挑战 === */
.weekly-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.weekly-reset{font-size:11px;color:#555;rgba(255,255,255,.92);border-radius:8px;padding:4px 10px;}
.wt-item{display:flex;align-items:center;gap:10px;padding:12px 8px;rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.06);border-radius:12px;margin-bottom:8px;transition:all .2s;}
.wt-item.done{background:rgba(76,175,80,.06);border-color:rgba(76,175,80,.2);}
.wt-item.rewarded{opacity:.4;}
.wt-icon{font-size:24px;flex-shrink:0;}
.wt-info{flex:1;min-width:0;}
.wt-title{font-size:13px;font-weight:600;font-weight:700;color:#555;margin-bottom:3px;}
.wt-desc{font-size:11px;color:#888;}
.wt-bar-wrap{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-top:4px;}
.wt-bar{height:100%;background:linear-gradient(90deg,#ffd700,#ff9800);border-radius:2px;transition:width .3s ease;}
.wt-reward-area{flex-shrink:0;min-width:52px;text-align:right;}
.wt-claim-btn{background:linear-gradient(135deg,#ffd700,#ff9800);border:none;border-radius:10px;padding:6px 10px;font-size:11px;font-weight:700;color:#1a0a00;cursor:pointer;}
.wt-claim-btn:disabled{rgba(255,255,255,.96);color:#555;cursor:not-allowed;}

/* === feat[11]: 图鉴属相解锁 === */
.handbook-tabs{display:flex;gap:6px;margin-bottom:14px;padding:0 4px;}
.htab{flex:1;padding:8px 4px;border-radius:10px;rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.08);font-size:11px;color:#555;cursor:pointer;text-align:center;transition:all .2s;}
.htab.on{background:rgba(255,215,0,.1);border-color:rgba(255,215,0,.35);color:#1A1A1A;font-weight:600;}
.atlas-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:0 8px 80px;}
.atlas-z-card{rgba(255,255,255,.92);border:1.5px solid rgba(255,255,255,.08);border-radius:14px;padding:12px 4px;text-align:center;transition:all .25s;cursor:pointer;}
.atlas-z-card:hover{rgba(255,255,255,.96);border-color:rgba(255,255,255,.15);}
.atlas-z-card.owned{border-color:rgba(255,215,0,.35);background:rgba(255,215,0,.08);}
.atlas-z-card.locked{border-color:rgba(255,255,255,.04);opacity:.42;}
.atlas-z-card.locked:hover{opacity:.55;}
.atlas-z-card.locked.affordable{border-color:rgba(255,215,0,.25);opacity:.65;}
.az-emoji{font-size:36px;line-height:1;margin-bottom:5px;}
.atlas-z-card.locked .az-emoji{filter:grayscale(1);opacity:.4;}
.atlas-z-card:not(.locked) .az-emoji{filter:drop-shadow(0 0 8px rgba(255,215,0,.3));}
.az-name{font-size:12px;font-weight:600;color:#555;margin-bottom:3px;}
.az-cost{font-size:10px;color:#888;}
.az-cost.affordable{color:#1A1A1A;font-weight:600;}
.az-cost.expensive{color:#888;}
.az-desc{font-size:9px;color:#555;margin-top:3px;line-height:1.5;}
@keyframes azUnlockAnim{0%{transform:scale(1)}20%{transform:scale(1.2)}40%{transform:scale(.96)}60%{transform:scale(1.06)}100%{transform:scale(1)}}
.az-unlocking{animation:azUnlockAnim .7s ease forwards;}
.az-unlock-pulse{animation:azUnlockAnim .7s ease forwards,azUnlockPulse 1.8s ease-in-out infinite 0.7s;}
@keyframes azUnlockPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,.15)}50%{box-shadow:0 0 14px 5px rgba(255,215,0,.12)}}

/* === feat[1]: 技能条样式 === */
#skillBar::-webkit-scrollbar{display:none;}
.skill-item{position:relative;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 10px;rgba(255,255,255,.96);border:1px solid rgba(180,140,80,.2);border-radius:14px;min-width:56px;cursor:pointer;user-select:none;touch-action:manipulation;flex-shrink:0;transition:all .2s;}
.skill-item:hover{background:rgba(255,215,0,.1);border-color:rgba(180,120,20,.35);}
.skill-item.on-cooldown{opacity:.55;cursor:not-allowed;}
.skill-item.can-afford{opacity:.9;}
.skill-item .sk-icon{font-size:16px;line-height:1;}
.skill-item .sk-name{font-size:9px;color:rgba(139,105,20,.9);font-weight:600;font-weight:600;white-space:nowrap;letter-spacing:.5px;}
.skill-item .sk-cd-bar{position:absolute;bottom:0;left:0;height:3px;background:#d4a017;border-radius:0 0 14px 14px;transition:width .1s linear;}
.skill-item .sk-active-ring{position:absolute;inset:-2px;border:2px solid #ffd700;border-radius:16px;animation:skillPulse .6s ease infinite;pointer-events:none;}
@keyframes skillPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.05);}}

/* === feat[2]: 星级显示 === */
.star-display{display:inline-flex;gap:1px;margin-left:3px;vertical-align:middle;}
.star-full{color:#1A1A1A;font-weight:600;font-size:8px;}
.star-empty{color:rgba(180,140,80,.3);font-size:8px;}

/* === feat[4]: 成就顶部弹出通知 === */
#achPopContainer{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:99999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;}
.ach-pop{background:linear-gradient(135deg,#fdfcf5,#f5f0e8);border:1.5px solid rgba(180,140,80,.4);border-radius:16px;padding:12px 20px;display:flex;align-items:center;gap:10px;animation:achTopPop .5s cubic-bezier(.34,1.56,.64,1) forwards;box-shadow:0 4px 30px rgba(180,140,80,.2);pointer-events:auto;cursor:pointer;}
@keyframes achTopPop{0%{opacity:0;transform:translateY(-20px) scale(.9);}100%{opacity:1;transform:translateY(0) scale(1);}}
.ach-pop-icon{font-size:28px;}
.ach-pop-text{text-align:left;}
.ach-pop-title{font-size:13px;font-weight:600;font-weight:700;color:#1A1A1A;}
.ach-pop-desc{font-size:11px;color:#1A1A1A;font-weight:600;}

/* === feat[7]: 签到日历 === */
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.cal-nav{background:transparent;border:none;color:#1A1A1A;font-weight:600;font-size:18px;cursor:pointer;padding:4px 8px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:10px;}
.cal-cell{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;padding:2px;}
.cal-cell.empty{background:transparent;opacity:.3;}
.cal-cell.signed{background:rgba(255,215,0,.12);border:1px solid rgba(255,215,0,.3);}
.cal-cell.today{background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.5);box-shadow:0 0 8px rgba(255,215,0,.15);}
.cal-cell.future{opacity:.35;}

/* === feat[6]: 云端排行榜 === */
.leaderboard-submit{margin-top:12px;padding:12px;rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.08);border-radius:14px;}
.leaderboard-submit input{width:100%;rgba(255,255,255,.96);border:1px solid rgba(180,140,80,.25);border-radius:10px;padding:8px 12px;color:#555;font-size:12px;margin-bottom:8px;box-sizing:border-box;}

.leaderboard-submit .lb-btn{display:flex;gap:8px;}

.leaderboard-submit .lb-reset-btn{rgba(255,255,255,.96);color:#888;}
.lb-last-submit{font-size:10px;color:#555;margin-top:6px;text-align:center;}
.lb-badge{background:linear-gradient(135deg,#7c4dff,#ff9800);color:#555;font-size:10px;padding:3px 8px;border-radius:20px;font-weight:700;display:inline-block;margin-bottom:8px;}

.forge-body{padding:0 2px}

/* 皮肤面板 */
.skin-preview{border:2px solid;border-radius:16px;padding:16px;text-align:center;margin-bottom:10px}
.skin-rarity-section{margin-bottom:12px;padding-left:8px}
.skin-rarity-label{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.skin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.skin-item{border:1px solid #555;border-radius:12px;padding:8px 4px;text-align:center;transition:transform .15s;rgba(255,255,255,.92)}
.skin-item:hover{transform:scale(1.06)}
.skin-item.skin-owned{border-color:#1A1A1A;font-weight:600;}
.skin-item.skin-equipped{border-color:#1A1A1A;font-weight:600!important;background:rgba(255,215,0,.1)!important}
.close-btn{margin-top:12px;width:100%;padding:10px;border:1px solid rgba(255,255,255,.15);border-radius:12px;background:rgba(255,255,255,.05);color:#555;font-size:13px;font-weight:600;cursor:pointer}
.close-btn:hover{background:rgba(255,255,255,.1);color:#555}

/* 图鉴面板 */
.atlas-header{text-align:center;padding:8px 0 14px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:14px}
.atlas-header .ah-unlock{font-size:13px;font-weight:600;color:#1A1A1A;font-weight:600}
.atlas-header .ah-tip{font-size:11px;color:#666;margin-top:4px}
.atlas-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 2px}
.atlas-item{border:1.5px solid rgba(255,255,255,.07);border-radius:12px;padding:10px 4px;text-align:center;rgba(255,255,255,.96);transition:all .2s}
.atlas-item.unlocked{border-color:rgba(255,215,0,.3);background:rgba(255,215,0,.08)}
.atlas-item .az-emoji{font-size:32px;line-height:1;margin-bottom:4px}
.atlas-item .az-name{font-size:11px;color:#666}
.atlas-item.unlocked .az-name{color:#1A1A1A;font-weight:600;font-weight:600}

/* 试炼塔面板 */
.tower-floor-bar{background:rgba(255,107,53,.06);border:1px solid rgba(255,107,53,.25);border-radius:12px;padding:12px;margin-bottom:10px}
.tower-enemy-card{background:linear-gradient(160deg,#fdfcf5,#f0ebe0);border:1px solid #6b21a8;border-radius:14px;padding:14px;text-align:center;margin-bottom:10px}
.tower-enemy-card.boss{border-color:#ff6b35}
.tower-ms-item{padding:6px 4px;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;display:flex;justify-content:space-between;align-items:center}
.tower-ms-locked{opacity:.4}
.tower-ms-claimed{opacity:.5}

/* 手机适配 */
@media(max-width:400px){
  #forgeContent,#towerContent,#skinContent,#atlasContent{padding:10px 12px 16px}
  .skin-grid{grid-template-columns:repeat(2,1fr)}
  .atlas-grid{grid-template-columns:repeat(3,1fr)}
  .panel-box{margin:8px;max-height:95vh}
}

<script>
const ZDATA=[
  {e:"🐀",n:"鼠"},{e:"🐂",n:"牛"},{e:"🐅",n:"虎"},{e:"🐇",n:"兔"},
  {e:"🐉",n:"龙"},{e:"🐍",n:"蛇"},{e:"🐎",n:"马"},{e:"🐏",n:"羊"},
  {e:"🐒",n:"猴"},{e:"🐓",n:"鸡"},{e:"🐕",n:"狗"},{e:"🐖",n:"猪"}
];
const FDATA=[
  {e:"🌿",n:"木",d:"经验+50% · 顿悟+20%",c:1,q:1,exp:1.5},
  {e:"🔥",n:"火",d:"金币产出+50%",c:1.5,q:1,exp:1},
  {e:"🟤",n:"土",d:"每日3次免费召唤",c:1,q:1,exp:1},
  {e:"⚪",n:"金",d:"高级召唤概率+30%",c:1,q:1,exp:1},
  {e:"💧",n:"水",d:"龙气+50% · 离线收益+50%",c:1,q:1.5,exp:1}
];
let sz=-1, sf=-1;

const stars=document.getElementById('stars');
for(let i=0;i<60;i++){
  const s=document.createElement('div');
  s.className='star';
  s.style.left=Math.random()*100+'%';
  s.style.top=Math.random()*100+'%';
  s.style.animationDelay=Math.random()*3+'s';
  s.style.width=s.style.height=(1+Math.random()*2)+'px';
  stars.appendChild(s);
}

const zg=document.getElementById('zGrid');
ZDATA.forEach((z,i)=>{
  const c=document.createElement('div');
  c.className='zodiac-card';
  c.innerHTML=`<div class="z-emoji">${z.e}</div><div class="z-name">${z.n}</div>`;
  c.onclick=()=>{
    document.querySelectorAll('.zodiac-card').forEach(x=>x.classList.remove('on'));
    c.classList.add('on');
    sz=i; upd();
  };
  zg.appendChild(c);
});

const fg=document.getElementById('fGrid');
FDATA.forEach((f,i)=>{
  const c=document.createElement('div');
  c.className='fate-card fate-'+i;
  c.innerHTML=`<div class="f-emoji">${f.e}</div><div class="f-name">${f.n}命</div>`;
  c.onclick=()=>{
    document.querySelectorAll('.fate-card').forEach(x=>x.classList.remove('on'));
    c.classList.add('on');
    sf=i;
    var bd=document.getElementById('bonus');bd.innerHTML='<span class="bonus-name" style="color:#1A1A1A;font-weight:600;font-weight:700">'+f.e+' '+f.n+'命</span><span class="bonus-desc"> · 产金×'+f.c+' · 龙气×'+f.q+' · 经验×'+f.exp+'</span>';
    upd();
  };
  fg.appendChild(c);
});


function upd(){
  const btn=document.getElementById('sBtn');
  if(sz>=0&&sf>=0){
    btn.className='start-btn ready';
    btn.textContent='天机降临 · 开始';
  } else {
    btn.className='start-btn';
    btn.textContent='请先选择属相与命格';
  }
}

function doStart(){
  if(sz<0||sf<0) return;
  const z=ZDATA[sz],f=FDATA[sf];
  document.getElementById('mZ').textContent=z.e;
  document.getElementById('mF').textContent=f.e;
  document.getElementById('mDesc').textContent=f.d;
  document.getElementById('modal').classList.add('show');
}

</script>

/* ── 制作台装备分类Tab ── */
.forge-eq-tabs{display:flex;flex-wrap:wrap;gap:4px;padding:0 4px 8px;justify-content:center;}
.forge-eq-tab{padding:4px 8px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#555;font-size:11px;cursor:pointer;transition:all .15s;}
.forge-eq-tab.active{background:rgba(255,215,0,.15);border-color:rgba(255,215,0,.4);color:#1A1A1A;font-weight:600;}
.forge-eq-quick{display:flex;gap:6px;padding:0 4px 10px;justify-content:center;flex-wrap:wrap;}
.eq-quick-btn{padding:5px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.15);rgba(255,255,255,.96);color:#555;font-size:14px;cursor:pointer;transition:all .2s;}
.eq-quick-btn:hover{background:rgba(255,215,0,.12);border-color:rgba(255,215,0,.3);color:#1A1A1A;font-weight:600;transform:scale(1.1);}

/* ── 召唤面板紧凑化 ── */
.summon-btn{padding:9px 14px;border-radius:14px;border:1.5px solid rgba(180,140,80,.35);font-size:13px;font-weight:600;font-weight:700;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:3px;}
.summon-btn:active{transform:scale(.95);}
.sbtn-coin{background:rgba(255,248,235,.93);color:#1A1A1A;font-weight:700;}
.sbtn-coin:hover{background:rgba(255,248,235,.96);}
.sbtn-qi{background:rgba(220,250,210,.92);color:#1A1A1A;font-weight:600;}
.sbtn-qi:hover{background:rgba(220,250,210,.95);}
.sbtn-free{background:rgba(200,220,250,.92);color:#1A1A1A;font-weight:600;border-color:rgba(126,216,239,.3);}
.sbtn-free:hover{background:rgba(200,220,250,.95);}

/* ── 套装进度条 ── */
.suit-banner{background:linear-gradient(135deg,rgba(255,215,0,.12),rgba(255,215,0,.05));border:1px solid rgba(255,215,0,.3);border-radius:10px;padding:8px 12px;text-align:center;font-size:12px;color:#1A1A1A;font-weight:600;margin:6px 0;letter-spacing:.5px;}
.suit-banner.suit-2{background:linear-gradient(135deg,rgba(126,184,255,.12),rgba(126,184,255,.05));border-color:rgba(126,184,255,.3);color:#1A1A1A;font-weight:600;}
.suit-progress{font-size:11px;color:#555;padding:4px 8px;margin:4px 0;}

/* ── 弹窗紧凑化 ── */
.modal-info{font-size:13px;font-weight:600;line-height:1.8;color:#555;padding:4px 0;}
.modal-info b{color:#1A1A1A;font-weight:600;font-weight:700;}

/* ── 登录页文字清除 ── */
.login-label{color:transparent;user-select:none;min-height:1px;margin-bottom:2px;}

/* ── 十连抽按钮样式（全局单按钮）── */
#batchBtn10:hover{background:linear-gradient(135deg,#d4a017,#9b7010) !important;transform:scale(1.05);box-shadow:0 0 12px rgba(255,215,0,.2);}
#batchBtn10:active{transform:scale(.97);}

/* ── 顶部Toast 动画 ── */
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}#notif{animation:slideDown .2s ease;}
</style>

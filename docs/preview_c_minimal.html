<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>生肖天机 · 风格C：现代极简</title>
</head>
<body style="margin:0;padding:0;background:#0d0d12;font-family:system-ui,sans-serif;color:#fff;min-height:100dvh;display:flex;align-items:center;justify-content:center;">
<p style="padding:20px;">Step 1 完成：风格C骨架</p>
</body></html>
<style>
.game{
  display:flex;flex-direction:column;
  height:100dvh;max-width:500px;margin:0 auto;
  background:#0d0d14;overflow:hidden;
}

/* 顶栏 */
.top-hud{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:46px;
  background:#0a0a10;border-bottom:1px solid rgba(255,255,255,.06);position:relative;z-index:2;
}
.hud-zodiac{font-size:18px;}
.hud-center{display:flex;align-items:center;gap:16px;}
.hud-stat{display:flex;align-items:center;gap:4px;}
.hud-stat .icon{font-size:14px;}
.hud-stat .val{font-size:15px;font-weight:700;color:#e8e8f0;}
.hud-stat .cps{font-size:11px;color:rgba(255,255,255,.3);}
.hud-stat .qi{color:#7ab8f0;}
.hud-yunshi{font-size:11px;color:rgba(255,255,255,.2);}

/* 技能条 */
.skill-row{
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  padding:5px 14px;gap:6px;
  background:#0a0a10;border-bottom:1px solid rgba(255,255,255,.04);position:relative;z-index:2;
}
.skill-item{
  display:flex;flex-direction:column;align-items:center;gap:1px;
  padding:4px 10px;min-width:48px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:8px;cursor:pointer;transition:all .2s;
}
.skill-item:hover{background:rgba(255,255,255,.08);}
.skill-item .sname{font-size:11px;font-weight:600;color:#c8c8d8;}
.skill-item .scd{font-size:10px;color:rgba(255,255,255,.25);}
.skill-dot{position:absolute;top:2px;right:2px;width:5px;height:5px;border-radius:50%;background:#f05555;}

/* 中间 */
.mid-row{
  flex:1;display:flex;min-height:0;overflow:hidden;position:relative;z-index:2;
}

/* 左栏 */
.sidebar{
  width:42px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  padding:28px 0 72px;
  background:#0a0a10;
}
.sd-btn{
  width:32px;height:32px;margin:2px 0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
  border-radius:8px;cursor:pointer;font-size:14px;
  transition:all .2s;
}
.sd-btn:hover{background:rgba(255,255,255,.08);}

/* 灵兽格子 */
.dragon-sec{
  flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;
}
.dragon-hd{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px 7px;
  border-bottom:1px solid rgba(255,255,255,.04);
}
.dragon-hd span{font-size:12px;color:#c8c8d8;font-weight:600;letter-spacing:.5px;}
.dragon-hd small{color:rgba(255,255,255,.2);font-size:11px;}
.dragon-grid{
  flex:1;display:grid;grid-template-columns:repeat(5,1fr);gap:5px;
  padding:10px;align-content:start;overflow:hidden;
}
.dg{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);
  border-radius:8px;position:relative;font-size:clamp(22px,5vw,32px);
  cursor:pointer;transition:all .2s;
}
.dg:hover{transform:scale(1.06);background:rgba(255,255,255,.07);}
.dg .lv{
  position:absolute;top:2px;left:4px;font-size:9px;font-weight:600;color:rgba(255,255,255,.4);
}
.dg.hi{border-color:rgba(255,215,0,.3);background:rgba(255,215,0,.05);}
.dg.sp{border-color:rgba(90,200,255,.3);background:rgba(90,200,255,.05);}
.dg.le{border-color:rgba(180,100,255,.35);background:rgba(180,100,255,.06);}

/* 主角卡 */
.hero-card{
  width:108px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 7px;gap:3px;
  background:rgba(255,255,255,.02);border-left:1px solid rgba(255,255,255,.05);
}
.hero-fate{font-size:9px;color:rgba(255,255,255,.2);letter-spacing:2px;}
.hero-glow{width:70px;height:70px;position:relative;display:flex;align-items:center;justify-content:center;}
.hero-glow::before{
  content:'';position:absolute;inset:-12px;
  background:radial-gradient(circle,rgba(255,255,255,.04) 0%,transparent 70%);border-radius:50%;
}
.hero-icon{font-size:56px;line-height:1;z-index:2;}
.hero-evo{display:flex;gap:2px;font-size:13px;opacity:.25;align-items:center;}
.hero-lv{font-size:11px;font-weight:700;color:#c8c8d8;}
.hero-cps{font-size:10px;color:rgba(255,255,255,.25);}
.hero-btns{display:flex;gap:4px;margin-top:3px;}
.hero-btn{
  font-size:11px;padding:4px 8px;border-radius:8px;
  border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);
  color:#888;cursor:pointer;transition:all .2s;
}
.hero-btn:hover{background:rgba(255,255,255,.08);color:#c8c8d8;}
.hero-btn.pk{background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.25);color:#ffd700;}

/* 底栏 */
.bot-bar{
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  gap:10px;padding:10px 16px calc(10px + env(safe-area-inset-bottom,6px));
  background:#0a0a10;border-top:1px solid rgba(255,255,255,.06);position:relative;z-index:2;
}
.sm-btn{
  display:flex;align-items:center;gap:5px;
  padding:9px 16px;border-radius:10px;border:none;cursor:pointer;
  font-size:14px;font-weight:600;transition:all .2s;
}
.sm-btn:hover{transform:scale(1.04);}
.sm-btn:active{transform:scale(.97);}
.sm-coin{background:#1a1a22;color:#ffd700;border:1px solid rgba(255,215,0,.25);}
.sm-qi{background:#121820;color:#7ab8f0;border:1px solid rgba(122,184,240,.25);}
.sm-free{background:#111a11;color:#70c070;border:1px solid rgba(112,192,112,.25);}

@media(max-width:400px){
  .hero-card{width:92px;padding:8px 5px;}
  .hero-glow{width:58px;height:58px;}
  .hero-icon{font-size:46px;}
  .sidebar{width:36px;}
}

  .qi-icon{display:inline-block;border-radius:50%;background:radial-gradient(circle at 35% 35%,#e0f7fa,#a0d8ef 40%,#4fc3f7 70%,#0277bd);box-shadow:0 0 6px #4fc3f7,0 0 12px rgba(79,195,247,.35);vertical-align:middle;}.qi-icon-sm{width:12px;height:12px;}.qi-icon-md{width:16px;height:16px;}.qi-icon-lg{width:20px;height:20px;}
</style>
<div class="game">

  <div class="top-hud">
    <span class="hud-zodiac">🐉</span>
    <div class="hud-center">
      <div class="hud-stat"><span class="icon">💰</span><span class="val">12,847</span><span class="cps">+86/s</span></div>
      <div class="hud-stat"><span class="icon"><span class="qi-icon qi-icon-sm"></span></span><span class="val qi">520</span></div>
    </div>
    <span class="hud-yunshi">⭐⭐⭐</span>
  </div>

  <div class="skill-row">
    <div class="skill-item"><span>📋</span><span class="sname">签到</span><span class="scd">未签到</span></div>
    <div class="skill-item" style="position:relative">📝<span class="sname">任务</span><span class="scd">3/5</span><span class="skill-dot"></span></div>
    <div class="skill-item"><span>⚡</span><span class="sname">活动</span><span class="scd">进行中</span></div>
    <div class="skill-item"><span>🎯</span><span class="sname">挑战</span><span class="scd">4天</span></div>
  </div>

  <div class="mid-row">

    <div class="sidebar">
      <div style="display:flex;flex-direction:column;gap:2px;">
        <div class="sd-btn" title="签到">📋</div>
        <div class="sd-btn" title="任务">📝</div>
        <div class="sd-btn" title="活动">⚡</div>
        <div class="sd-btn" title="图鉴">📖</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:2px;">
        <div class="sd-btn" title="排行">🏆</div>
        <div class="sd-btn" title="成就">🎖️</div>
        <div class="sd-btn" title="统计">📊</div>
        <div class="sd-btn" title="设置">⚙️</div>
      </div>
    </div>

    <div class="dragon-sec">
      <div class="dragon-hd"><span>🐾 灵兽</span><small>12只 · +86/s</small></div>
      <div class="dragon-grid">
        <div class="dg hi"><span class="lv">5</span>🐉</div>
        <div class="dg"><span class="lv">3</span>🐍</div>
        <div class="dg"><span class="lv">2</span>🐴</div>
        <div class="dg"><span class="lv">1</span>🐏</div>
        <div class="dg"><span class="lv">4</span>🐅</div>
        <div class="dg"><span class="lv">3</span>🐂</div>
        <div class="dg"><span class="lv">2</span>🐇</div>
        <div class="dg"><span class="lv">1</span>🐀</div>
        <div class="dg"><span class="lv">3</span>🐎</div>
        <div class="dg"><span class="lv">2</span>🐒</div>
        <div class="dg sp"><span class="lv">6</span>🐓</div>
        <div class="dg"><span class="lv">1</span>🐕</div>
        <div class="dg"><span class="lv">2</span>🐖</div>
        <div class="dg" style="opacity:.15"></div>
        <div class="dg" style="opacity:.15"></div>
        <div class="dg" style="opacity:.15"></div>
        <div class="dg" style="opacity:.15"></div>
        <div class="dg" style="opacity:.15"></div>
        <div class="dg" style="opacity:.15"></div>
        <div class="dg" style="opacity:.15"></div>
        <div class="dg" style="opacity:.15"></div>
        <div class="dg" style="opacity:.15"></div>
        <div class="dg" style="opacity:.15"></div>
        <div class="dg" style="opacity:.15"></div>
      </div>
    </div>

    <div class="hero-card">
      <div class="hero-fate">木命 · 大吉</div>
      <div class="hero-evo">🐣→🐥→🐦→🐓</div>
      <div class="hero-glow"><div class="hero-icon">🐉</div></div>
      <div><span class="hero-lv">Lv.5</span><span class="hero-cps"> +55/s</span></div>
      <div class="hero-btns">
        <button class="hero-btn pk">升星</button>
        <button class="hero-btn">详情</button>
      </div>
    </div>
  </div>

  <div class="bot-bar">
    <button class="sm-btn sm-coin">💰<span>100</span></button>
    <button class="sm-btn sm-qi"><span style="font-size:11px;color:rgba(122,184,240,.6)"><span class="qi-icon qi-icon-sm"></span>500</span><span class="qi-icon qi-icon-sm"></span><span>500</span></button>
    <button class="sm-btn sm-free">🌿<span>免费×3</span></button>
  </div>

</div>
</body></html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>生肖天机</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;touch-action:manipulation;}
body{background:#07071a;min-height:100vh;min-height:100dvh;display:flex;align-items:flex-start;justify-content:center;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#fff;padding:env(safe-area-inset-top) 0 calc(20px + env(safe-area-inset-bottom)) 0;overflow-x:hidden;}

.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#1a1060 0%,transparent 70%),radial-gradient(ellipse 60% 40% at 80% 100%,#0d2050 0%,transparent 60%);}
.stars{position:absolute;inset:0;}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;opacity:.6;animation:twinkle 3s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:1}}

.wrap{position:relative;z-index:1;width:min(500px,96vw);max-width:96vw;padding:20px 16px calc(32px + env(safe-area-inset-bottom)) 0;margin:0 auto;}

/* ===== 标题区：书法印章风格 ===== */
.logo{text-align:center;margin-bottom:8px;position:relative;}

.logo-badge{
  display:inline-block;
  font-size:12px;letter-spacing:6px;color:#c8a020;
  padding:4px 18px;border-radius:20px;
  background:rgba(255,215,0,.07);
  border:1px solid rgba(255,215,0,.25);
  animation:shimmer 4s ease-in-out infinite;
  margin-bottom:10px;
}
@keyframes shimmer{0%,100%{border-color:rgba(255,215,0,.25);color:#c8a020}50%{border-color:rgba(255,215,0,.5);color:#ffd700}}

.logo-title-wrap{position:relative;display:inline-block;}
.logo-title{
  font-size:clamp(36px,10vw,52px);
  font-weight:900;letter-spacing:18px;
  /* 纯金色实心，不是描边 */
  color:#ffd700;
  text-shadow:0 0 20px rgba(255,215,0,.5),0 0 40px rgba(255,200,0,.2);
  position:relative;z-index:1;
}
/* 印章双线装饰 */
.logo-title-wrap::before,.logo-title-wrap::after{
  content:'';position:absolute;left:50%;transform:translateX(-50%);
  height:1px;background:linear-gradient(to right,transparent,#ffd700,transparent);
  width:90%;
}
.logo-title-wrap::before{top:-8px;}
.logo-title-wrap::after{bottom:-8px;}

.logo-sub{
  font-size:12px;color:#555;letter-spacing:8px;text-transform:uppercase;margin-top:8px;
}

/* 12属相淡化装饰 */
.zodiac-strip{display:flex;justify-content:center;gap:3px;flex-wrap:wrap;margin:16px 0 20px;opacity:.25;}
.zodiac-strip span{font-size:16px;}

/* 分割线 */
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,#333,transparent);}
.divider span{color:#555;font-size:12px;letter-spacing:4px;white-space:nowrap}

/* 选区 */
.section{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:20px;margin-bottom:16px;}
.section-label{text-align:center;font-size:13px;color:#888;letter-spacing:3px;margin-bottom:16px;}

/* 属相网格 4x3 */
.zodiac-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.zodiac-card{background:#0f0f2a;border:1.5px solid rgba(255,255,255,.07);border-radius:14px;padding:12px 4px 10px;cursor:pointer;transition:all .25s;text-align:center;user-select:none;}
.zodiac-card:hover{background:#1a1a40;border-color:rgba(255,255,255,.2);transform:translateY(-2px);}
.zodiac-card:active{transform:scale(.94);transition:transform .05s;}
.fate-card:hover{background:#1a1a40;border-color:rgba(255,255,255,.2);transform:translateY(-2px);}
.fate-card:active{transform:scale(.94);transition:transform .05s;}
.start-btn:active{transform:scale(.97);}
.d-card:active{transform:scale(.92);cursor:grabbing;}
.zodiac-card.on{background:linear-gradient(135deg,#2a2000,#1a1000);border-color:#ffd700;box-shadow:0 0 18px rgba(255,215,0,.3);transform:translateY(-3px);}
.zodiac-card .z-emoji{font-size:34px;line-height:1;margin-bottom:4px;}
.zodiac-card .z-name{font-size:11px;color:#777;}
.zodiac-card.on .z-name{color:#ffd700;font-weight:600;}

/* 命格：2行网格（3+2）更好看 */
.fate-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:380px;margin:0 auto;}
.fate-card{background:#0f0f2a;border:1.5px solid rgba(255,255,255,.07);border-radius:14px;padding:14px 8px;cursor:pointer;transition:all .25s;text-align:center;user-select:none;}
.fate-card:hover{background:#1a1a40;border-color:rgba(255,255,255,.2);transform:translateY(-2px);}
.fate-card.on{border-color:#fff;box-shadow:0 0 18px rgba(255,255,255,.2);transform:translateY(-3px);}
/* 第5个命格居中 */
.fate-card:nth-child(4){grid-column:1;}
.fate-card:nth-child(5){grid-column:3;}
.fate-card .f-emoji{font-size:30px;}
.fate-card .f-name{font-size:14px;font-weight:700;margin-top:6px;}
.fate-card.fate-0 .f-name{color:#4CAF50}
.fate-card.fate-1 .f-name{color:#FF5722}
.fate-card.fate-2 .f-name{color:#a0785a}
.fate-card.fate-3 .f-name{color:#FFC107}
.fate-card.fate-4 .f-name{color:#42a5f5}
.fate-card .f-desc{font-size:9px;color:#555;margin-top:4px;line-height:1.4;}

/* 加成展示 */
.bonus{display:none;margin-top:12px;text-align:center;font-size:12px;color:#888;}
.bonus.show{display:block;}
.bonus b{color:#ffd700;margin:0 4px;}

/* 开始按钮 */
.start-btn{margin-top:20px;width:100%;padding:16px;font-size:20px;background:linear-gradient(135deg,#2a2000,#1a1000);border:1.5px solid #5a4000;border-radius:40px;color:#888;cursor:not-allowed;letter-spacing:6px;font-weight:600;transition:all .3s;}
.start-btn.ready{background:linear-gradient(135deg,#c8a020,#8b6010);border-color:#ffd700;color:#fff;cursor:pointer;letter-spacing:6px;box-shadow:0 8px 30px rgba(200,160,32,.3);}
.start-btn.ready:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(200,160,32,.4);}

/* 弹窗 */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);}
.modal.show{display:flex;}
.modal-box{background:linear-gradient(160deg,#0d0d2a,#1a1a3a);border:1px solid #ffd700;border-radius:28px;padding:40px 36px;width:min(380px,90vw);text-align:center;animation:popIn .35s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.modal-badge{display:inline-block;background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a0a00;font-size:11px;font-weight:800;padding:4px 14px;border-radius:20px;letter-spacing:3px;margin-bottom:20px;}
.modal-chars{display:flex;justify-content:center;align-items:center;gap:20px;margin:16px 0 24px;}
.modal-chars .mc-zodiac,.modal-chars .mc-fate{font-size:64px;line-height:1;}
.modal-chars .mc-vs{font-size:20px;color:#444;}
.modal-info{font-size:13px;color:#888;line-height:1.8;}
.modal-info b{color:#ffd700;}
.modal-btn{margin-top:8px;width:100%;padding:13px;border-radius:30px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:2px;transition:all .2s;}
.modal-btn-start{background:#ffd700;border:none;color:#1a0a00;}
.modal-btn-start:hover{transform:scale(1.02);box-shadow:0 8px 24px rgba(255,215,0,.3);}
.modal-btn-cancel{background:transparent;border:1px solid rgba(255,255,255,.2);color:#888;margin-top:10px;}
.modal-btn-cancel:hover{border-color:rgba(255,255,255,.5);color:#ccc;}

/* ===== 游戏主界面 ===== */
#gamePage{width:100%;padding-bottom:calc(100px + env(safe-area-inset-bottom));}
.rank-panel{position:fixed;top:0;right:0;width:min(380px,92vw);height:100%;height:100dvh;background:#0a0a1a;z-index:303;display:none;overflow-y:auto;transform:translateX(100%);transition:transform .3s ease;}
.rank-panel.open{display:block;transform:translateX(0);}.rank-panel::-webkit-scrollbar{width:0;}.handbook-panel{position:fixed;top:0;left:0;width:100%;height:100%;height:100dvh;background:#07071a;z-index:301;display:none;overflow-y:auto;}
.handbook-panel.open{display:block;}.handbook-panel::-webkit-scrollbar{width:0;}.cult-panel,.ach-panel{position:fixed;top:0;right:0;width:min(400px,92vw);height:100%;height:100dvh;background:#0a0a1a;z-index:302;display:none;overflow-y:auto;transform:translateX(100%);transition:transform .3s ease;}
.cult-panel.open,.ach-panel.open{display:block;transform:translateX(0);}
.cult-panel::-webkit-scrollbar,.ach-panel::-webkit-scrollbar{width:0;}
@keyframes achSlideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes achFadeOut{from{opacity:1}to{opacity:0}}
@keyframes achToast{0%{transform:translateX(120%);opacity:0}15%{transform:translateX(0);opacity:1}85%{transform:translateX(0);opacity:1}100%{transform:translateX(120%);opacity:0}}

#topHud{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,#0a0a2a,rgba(10,10,42,.92));backdrop-filter:blur(8px);padding:10px 14px 8px;border-bottom:1px solid rgba(255,215,0,.15);margin:-20px -16px 12px;border-radius:0 0 16px 16px;}
.hud-top{display:flex;align-items:center;justify-content:space-between;}
.hud-left,.hud-right{display:flex;align-items:center;gap:4px;font-size:18px;}
.hud-center{text-align:center;}
.coin-row{display:flex;align-items:center;gap:4px;justify-content:center;}
#hudCoins{font-size:clamp(16px,4.5vw,22px);font-weight:700;color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,.4);}
.cps-row{font-size:10px;color:#888;}
#hudCps{color:#aaa;}
#hudQi{font-size:16px;font-weight:600;color:#7eb8ff;}
.hud-bottom{display:flex;justify-content:space-between;font-size:11px;color:#555;margin-top:4px;}
#dragonGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:4px;}
.d-cell{aspect-ratio:1;background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.06);border-radius:10px;display:flex;align-items:center;justify-content:center;position:relative;transition:border-color .15s;}
.d-cell:hover{border-color:rgba(255,255,255,.15);}
.d-cell.mergeable{border-color:#ffd700;box-shadow:0 0 10px rgba(255,215,0,.3);}
.d-card{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:grab;user-select:none;border-radius:8px;transition:transform .15s;}
.d-card:active{cursor:grabbing;}
.d-icon{font-size:clamp(22px,6vw,34px);line-height:1;}
.d-lv{position:absolute;bottom:2px;right:4px;font-size:9px;color:rgba(255,255,255,.5);}
.d-gold{position:absolute;top:2px;left:4px;font-size:9px;color:#ffd700;}
.dragging{position:fixed!important;z-index:999;pointer-events:none;transform:scale(1.2);box-shadow:0 8px 32px rgba(0,0,0,.6);opacity:.85;}
#summonBar{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0deg,#0a0a2a 80%,transparent);padding:16px 14px 28px;display:flex;gap:8px;justify-content:center;z-index:50;}
.sbtn{flex:1;min-width:0;padding:clamp(12px,3vw,16px) 4px;border-radius:14px;border:1.5px solid;cursor:pointer;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:2px;background:rgba(10,10,30,.9);backdrop-filter:blur(4px);transition:all .2s;color:#fff;}
.sbtn small{font-size:10px;opacity:.7;}
.sbtn-coin{border-color:#ffd700;color:#ffd700;}
.sbtn-coin:hover{background:rgba(255,215,0,.15);}
.sbtn-qi{border-color:#7eb8ff;color:#7eb8ff;}
.sbtn-qi:hover{background:rgba(126,184,255,.15);}
.sbtn:disabled{opacity:.35;cursor:not-allowed;}
.sbtn-free{border-color:#4CAF50;color:#4CAF50;}
@keyframes mergeFlash{0%{transform:scale(.8);opacity:0}50%{transform:scale(1.3);opacity:1}100%{transform:scale(1);opacity:0}}
#mergeFlash.show{display:flex!important;animation:mergeFlash .5s ease-out forwards;}


/* ===== 召唤翻牌动画 ===== */
#summonOverlay{
  display:none;position:fixed;inset:0;
  background:rgba(5,5,20,.95);z-index:500;
  align-items:center;justify-content:center;flex-direction:column;
}
#summonOverlay.show{display:flex!important;}
/* 翻牌区域 */
.scard-wrap{
  perspective:800px;width:160px;height:200px;margin:30px 0;
}
.scard{
  width:100%;height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 1.2s cubic-bezier(.4,0,.2,1);
  cursor:pointer;
}
.scard.flipped{transform:rotateY(180deg);}
.scard-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:48px;
  border:2px solid rgba(255,215,0,.4);
}
.scard-back{
  background:linear-gradient(160deg,#1a1a3a,#2a1a4a);
  box-shadow:0 0 40px rgba(255,215,0,.2);
}
.scard-back::before{
  content:'？';font-size:64px;color:rgba(255,215,0,.3);
}
/* 金边框高级感 */
.scard-front{
  background:linear-gradient(160deg,#2a1a3a,#1a1a4a);
  transform:rotateY(180deg);
  border-color:#ffd700;
  box-shadow:0 0 30px rgba(255,215,0,.3);
  flex-direction:column;gap:8px;
}
.scard-front .sf-emoji{font-size:72px;line-height:1;}
.scard-front .sf-name{font-size:18px;color:#ffd700;font-weight:700;}
.scard-front .sf-cps{font-size:11px;color:#888;}
/* 抽卡提示文字 */
.summon-tip{color:rgba(255,255,255,.4);font-size:14px;letter-spacing:4px;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.7}}
/* 结果揭晓区 */
.summon-result-anim{
  display:none;text-align:center;
  animation:fadeInUp .6s ease-out;
}
.summon-result-anim.show{display:block;}
@keyframes fadeInUp{
  from{transform:translateY(30px);opacity:0}
  to{transform:translateY(0);opacity:1}
}
.sra-emoji{font-size:90px;margin:10px 0;}
.sra-name{font-size:26px;color:#ffd700;font-weight:900;}
.sra-desc{font-size:14px;color:#888;margin-top:8px;}
.sra-tag{font-size:12px;color:#aaa;margin-top:4px;letter-spacing:3px;}
/* 光芒效果 */
@keyframes shine{0%{background-position:-200% 0}100%{background-position:200% 0}}
.shine-text{
  background:linear-gradient(90deg,#ffd700,#fff,#ffd700);
  background-size:200% auto;
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 2s linear infinite;
}
/* 弹窗里的召唤结果 */
#summonModal .modal-box{max-width:340px;}
.smodal-rarity{font-size:12px;letter-spacing:4px;margin-bottom:10px;}
.smodal-rarity.r1{color:#aaa;}
.smodal-rarity.r2{color:#7eb8ff;}
.smodal-rarity.r3{color:#b57edc;}
.smodal-rarity.r4{color:#ffd700;}
/* 拖拽时目标格高亮 */
.d-cell.drop-target{border-color:#ffd700!important;box-shadow:0 0 16px rgba(255,215,0,.5)!important;background:rgba(255,215,0,.1)!important;}

</style>
</head>
<body>
<div class="bg"><div class="stars" id="stars"></div></div>

<div class="wrap" id="loginWrap">
  <div class="logo">
    <div class="logo-badge">✦ 天 机 降 临 ✦</div>
    <div class="logo-title-wrap">
      <div class="logo-title">生肖天机</div>
    </div>
    <div class="logo-sub">放置合成 · 命运由我</div>
  </div>
  <div class="zodiac-strip" id="zStrip"></div>

  <div class="divider"><span>壹 · 属相</span></div>
  <div class="section">
    <div class="section-label">选择你的属相</div>
    <div class="zodiac-grid" id="zGrid"></div>
  </div>

  <div class="divider"><span>贰 · 命格</span></div>
  <div class="section">
    <div class="section-label">选择你的命格</div>
    <div class="fate-row" id="fGrid"></div>
    <div class="bonus" id="bonus">命格加成：<b id="bc">产金×1</b> · <b id="bq">龙气×1</b> · <b id="be">经验×1</b></div>
  </div>

  <button class="start-btn" id="sBtn" onclick="doStart()">请先选择属相与命格</button>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-badge">命运已定</div>
    <div class="modal-chars">
      <div class="mc-zodiac" id="mZ"></div>
      <div class="mc-vs">×</div>
      <div class="mc-fate" id="mF"></div>
    </div>
    <div class="modal-info">
      你选择了 <b id="mZn">鼠</b> 属相<br>
      天生 <b id="mFn">木</b> 命<br><br>
      <span id="mDesc">产金×1 · 龙气×1 · 经验×1.5</span>
    </div>
    <button class="modal-btn modal-btn-start" onclick="startGame()">开启天机之旅 ✦</button>
    <button class="modal-btn modal-btn-cancel" onclick="reselect()">重新选择</button>
  </div>
</div>

<!-- 召唤翻牌动画遮罩 -->
<div id="summonOverlay">
  <div class="summon-tip">点击卡牌揭晓命运</div>
  <div class="scard-wrap" onclick="revealSummon()">
    <div class="scard" id="scard">
      <div class="scard-face scard-back"></div>
      <div class="scard-face scard-front">
        <div class="sf-emoji" id="sfEmoji"></div>
        <div class="sf-name"  id="sfName"></div>
        <div class="sf-cps"   id="sfCps"></div>
      </div>
    </div>
  </div>
  <div class="summon-result-anim" id="summonResultAnim">
    <div class="sra-emoji" id="sraEmoji"></div>
    <div class="sra-name shine-text" id="sraName"></div>
    <div class="sra-desc" id="sraDesc"></div>
    <div class="sra-tag" id="sraTag"></div>
  </div>
  <button class="modal-btn modal-btn-start" id="sraBtn" onclick="closeSummonAnim()" style="margin-top:20px;display:none;">收下 ✦</button>
</div>


<script>
const ZDATA=[
  {e:"🐀",n:"鼠"},{e:"🐂",n:"牛"},{e:"🐅",n:"虎"},{e:"🐇",n:"兔"},
  {e:"🐉",n:"龙"},{e:"🐍",n:"蛇"},{e:"🐎",n:"马"},{e:"🐏",n:"羊"},
  {e:"🐒",n:"猴"},{e:"🐓",n:"鸡"},{e:"🐕",n:"狗"},{e:"🐖",n:"猪"}
];
const FDATA=[
  {e:"🌿",n:"木",d:"升级经验+50% · 顿悟概率+20%",c:1,q:1,exp:1.5},
  {e:"🔥",n:"火",d:"金币产出+50%",c:1.5,q:1,exp:1},
  {e:"🟤",n:"土",d:"每日3次免费召唤",c:1,q:1,exp:1},
  {e:"⚪",n:"金",d:"高级召唤概率+30%",c:1,q:1,exp:1},
  {e:"💧",n:"水",d:"龙气+50% · 离线收益+50%",c:1,q:1.5,exp:1}
];
let sz=-1, sf=-1;

const stars=document.getElementById('stars');
for(let i=0;i<60;i++){
  const s=document.createElement('div');
  s.className='star';
  s.style.left=Math.random()*100+'%';
  s.style.top=Math.random()*100+'%';
  s.style.animationDelay=Math.random()*3+'s';
  s.style.width=s.style.height=(1+Math.random()*2)+'px';
  stars.appendChild(s);
}

const strip=document.getElementById('zStrip');
ZDATA.forEach(z=>{
  const s=document.createElement('span');
  s.textContent=z.e;
  strip.appendChild(s);
});

const zg=document.getElementById('zGrid');
ZDATA.forEach((z,i)=>{
  const c=document.createElement('div');
  c.className='zodiac-card';
  c.innerHTML=`<div class="z-emoji">${z.e}</div><div class="z-name">${z.n}</div>`;
  c.onclick=()=>{
    document.querySelectorAll('.zodiac-card').forEach(x=>x.classList.remove('on'));
    c.classList.add('on');
    sz=i; upd();
  };
  zg.appendChild(c);
});

const fg=document.getElementById('fGrid');
FDATA.forEach((f,i)=>{
  const c=document.createElement('div');
  c.className='fate-card fate-'+i;
  c.innerHTML=`<div class="f-emoji">${f.e}</div><div class="f-name">${f.n}命</div><div class="f-desc">${f.d}</div>`;

<script>

// ===== 游戏数据 =====

function initAudio() {

}

function playSound(type) {
  if (!_audioCtx || _audioState.muted) return;
  const now = _audioCtx.currentTime;
  const v = _audioState.sfxVolume;
  const mk = (freq, dur, vol=v, t=0, wave='sine') => {
    const o = _audioCtx.createOscillator();
    const g = _audioCtx.createGain();
    o.connect(g); g.connect(_audioCtx.destination);
    o.type = wave;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol * .25, now + t);
    g.gain.exponentialRampToValueAtTime(.001, now + t + dur);
    o.start(now + t); o.stop(now + t + dur);
  };
  switch(type) {
    case 'notif':   mk(880, .08, .6); mk(1100, .12, .4, .07); break;
    case 'error':   mk(120, .25, .5); break;
    case 'achieve': mk(523, .3, .7); mk(659, .3, .6, .15); mk(784, .4, .5, .3); break;

    case 'summon_z4': mk(900, .06, .7); mk(1100, .06, .5, .08); mk(1300, .08, .4, .16); break;
    case 'merge_z1': mk(150, .3, .8, 0, 'sawtooth'); mk(200, .25, .7, .15, 'sawtooth'); mk(120, .5, .6, .3, 'sawtooth'); break;
    case 'achieve_z1': mk(220, .4, .9); mk(330, .4, .8, .2); mk(440, .6, .7, .4); break;

    case 'achieve_z5': mk(400, .2, .7); mk(300, .25, .6, .15); mk(200, .35, .5, .3); break;
    case 'summon_z6': mk(300, .1, .8); mk(450, .1, .7, .06); mk(600, .15, .6, .12); break;
    case 'merge_z6': mk(200, .15, .7); mk(200, .15, .7, .1); mk(200, .15, .7, .2); break;
    case 'achieve_z6': mk(440, .3, .8); mk(550, .3, .7, .18); mk(660, .5, .6, .36); break;

    case 'achieve_z8': mk(880, .1, .8); mk(1100, .1, .7, .08); mk(1320, .15, .6, .16); break;
    case 'summon_z9': mk(1000, .15, .8); mk(1500, .2, .6, .08); break;

let G = {zodiac:-1,fate:-1,created:false,coins:0,qi:0,dragons:[],mergeCount:0,summonCount:0,currentFate:3,freeLeft:3,cultivation:{mu:0,huo:0,tu:0,kin:0,shui:0},lastQiTime:Date.now()};
let nextId = 1;
let cpsTimer = null, qiTimer = null, bgmTimer = null;

function saveGame(){
  localStorage.setItem(SAVE_KEY, JSON.stringify(G));
}
function loadGame(){
  const s = localStorage.getItem(SAVE_KEY);
  if(s){try{Object.assign(G,JSON.parse(s));}catch(e){}}
  if(G.dragons.length) nextId = Math.max(...G.dragons.map(d=>parseInt(d.id)))+1;
}
function fmtNum(n){
  if(n>=1e9)return(n/1e9).toFixed(1)+'B';
  if(n>=1e6)return(n/1e6).toFixed(1)+'M';
  if(n>=1e3)return(n/1e3).toFixed(1)+'K';
  return Math.floor(n)+'';
}
function calcCps(){
  if(!G.created)return 0;
  const fc=FATE_C[G.fate]||1;
  const yc=1+(YUN_COIN[G.currentFate]||0);
  let base=G.dragons.reduce((s,d)=>s+(COIN_S[d.level]||0),0);
  const coinBonus=(getCultBonus().coinBonus||0);
  return Math.floor(base*fc*yc*1.3*(1+coinBonus));
}
function updateHud(){
  if(!G.created)return;
  document.getElementById('hudCoins').textContent=fmtNum(G.coins);
  document.getElementById('hudCps').textContent=fmtNum(calcCps())+'/s';
  document.getElementById('hudQi').textContent=fmtNum(G.qi);
  const cost=G.summonCount<100?100:G.summonCount<500?150:G.summonCount<2000?200:250;
  document.getElementById('coinCost').textContent=cost;
  document.getElementById('btnCoin').disabled=G.coins<cost;
  document.getElementById('btnQi').disabled=G.qi<500;
  if(G.fate===2){
    document.getElementById('btnFree').style.display=G.freeLeft>0?'flex':'none';
    document.getElementById('freeCount').textContent=G.freeLeft;
  }
}
const COLS=5, TOTAL=25;
function renderGrid(){
  const grid=document.getElementById('dragonGrid');
  if(!grid)return;
  grid.innerHTML='';
  for(let i=0;i<TOTAL;i++){
    const cell=document.createElement('div');
    cell.className='d-cell';
    cell.dataset.idx=i;
    const d=G.dragons.find(d=>d.idx===i);
    if(d){
      const card=document.createElement('div');
      card.className='d-card';
      card.dataset.id=d.id;
      card.innerHTML=`<span class="d-icon">${LICON[d.level]||'?'}</span><span class="d-lv">Lv${d.level}</span><span class="d-gold">+${COIN_S[d.level]}/s</span>`;
      setupDrag(card,d);
      cell.appendChild(card);
    }
    grid.appendChild(cell);
  }
  markMergeable();
}
function setupDrag(card,d){
  card.addEventListener('mousedown',e=>startDrag(e,card,d));
  card.addEventListener('touchstart',e=>{e.preventDefault();startDrag(e,card,d);},{passive:false});
}
let dragCard=null,dragData=null,srcIdx=-1;
function startDrag(e,card,d){
  dragCard=card;dragData=d;srcIdx=d.idx;
  const rect=card.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  card.style.left=(cx-rect.width/2)+'px';
  card.style.top=(cy-rect.height/2)+'px';
  card.classList.add('dragging');
  document.addEventListener('mousemove',onDrag);
  document.addEventListener('mouseup',endDrag);
  document.addEventListener('touchmove',onDrag,{passive:false});
  document.addEventListener('touchend',endDrag);
}
function onDrag(e){
  if(!dragCard)return;
  e.preventDefault();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  dragCard.style.left=(cx-30)+'px';
  dragCard.style.top=(cy-30)+'px';
}
function endDrag(e){
  if(!dragCard)return;
  document.removeEventListener('mousemove',onDrag);
  document.removeEventListener('mouseup',endDrag);
  document.removeEventListener('touchmove',onDrag);
  document.removeEventListener('touchend',endDrag);
  dragCard.classList.remove('dragging');
  dragCard.style.left='';dragCard.style.top='';dragCard.style.position='';
  const cx=e.changedTouches?e.changedTouches[0].clientX:e.clientX;
  const cy=e.changedTouches?e.changedTouches[0].clientY:e.clientY;
  const cells=document.querySelectorAll('.d-cell');
  let target=null;
  cells.forEach(c=>{const r=c.getBoundingClientRect();if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom)target=c;});
  if(target){const dst=parseInt(target.dataset.idx);if(dst!==srcIdx)doDrop(srcIdx,dst);}
  dragCard=null;dragData=null;srcIdx=-1;
}
function doDrop(src,dst){
  const s=G.dragons.find(d=>d.idx===src);
  const t=G.dragons.find(d=>d.idx===dst);
  if(!s)return;
  if(t){
    if(s.level===t.level&&s.level<15){
      G.dragons=G.dragons.filter(d=>d.idx!==src&&d.idx!==dst);
      G.dragons.push({id:String(nextId++),level:s.level+1,idx:dst});
      G.mergeCount++;
      const qiGain=Math.floor(Math.random()*2);
      if(qiGain>0){G.qi=Math.min(99999,G.qi+qiGain);updateHud();}
      showMergeFlash(LICON[s.level+1]);
      showNotif('success',`合成！${LNAME[s.level]} → ${LNAME[s.level+1]}`);
      if(G.zodiac>=0) playSound('merge_z'+G.zodiac);
      saveGame();renderGrid();updateHud();
      checkAch();
    }else{s.idx=dst;t.idx=src;saveGame();renderGrid();}
  }else{s.idx=dst;saveGame();renderGrid();}
}
function markMergeable(){
  document.querySelectorAll('.d-cell').forEach(c=>c.classList.remove('mergeable'));
  for(let i=0;i<G.dragons.length;i++){
    for(let j=i+1;j<G.dragons.length;j++){
      if(G.dragons[i].level===G.dragons[j].level&&G.dragons[i].level<15){
        document.querySelectorAll('.d-card').forEach(c=>{
          const id=parseInt(c.dataset.id);
          if(id===parseInt(G.dragons[i].id)||id===parseInt(G.dragons[j].id))
            c.closest('.d-cell').classList.add('mergeable');
        });
      }
    }
  }
}
function getSummonLevel(pool){
  let total=pool.reduce((s,p)=>s+p.weight,0),r=Math.random()*total,acc=0;
  for(const p of pool){acc+=p.weight;if(r<=acc)return p.level;}
  return pool[pool.length-1].level;
}

function summonCoin(){
  const cost=G.summonCount<100?100:G.summonCount<500?150:G.summonCount<2000?200:250;
  if(G.coins<cost){showNotif('error','金币不足！');return;}
  G.coins-=cost;
  doSummon(getSummonLevel([{level:1,weight:100},{level:2,weight:80},{level:3,weight:50}]));
}
function summonQi(){
  if(G.qi<500){showNotif('error','龙气不足！');return;}
  G.qi-=500;
  doSummon(getSummonLevel([{level:4,weight:30},{level:5,weight:18},{level:6,weight:10}]));
}
function summonFree(){
  if(G.freeLeft<=0){showNotif('error','今日免费次数已用完！');return;}
  G.freeLeft--;
  doSummon(getSummonLevel([{level:1,weight:100},{level:2,weight:80},{level:3,weight:50}]));
}


function showMergeFlash(emoji){
  const el=document.getElementById('mergeFlash');
  document.getElementById('mergeText').textContent=emoji;
  el.classList.add('show');setTimeout(()=>el.classList.remove('show'),500);
}
function showNotif(type,msg){
  const el=document.getElementById('notif');
  const colors={success:'rgba(76,175,80,.9)',error:'rgba(244,67,54,.9)',info:'rgba(33,150,243,.9)',warning:'rgba(255,152,0,.9)'};
  el.style.background=colors[type]||colors.info;
  el.textContent=msg;el.style.display='block';
  setTimeout(()=>el.style.display='none',2500);
}
function startCps(){
  stopCps();
  cpsTimer=setInterval(()=>{
    const cps=calcCps();
    if(cps>0){G.coins+=cps;updateHud();if(Math.random()<.01)saveGame();}
  },1000);
  // 龙气回复（每分钟）
  qiTimer=setInterval(()=>{
    if(!G.created)return;
    const elapsed=(Date.now()-G.lastQiTime)/60000;
    const rate=getCultBonus().qiRate;
    if(rate>0&&elapsed>=1){
      G.qi=Math.min(99999,G.qi+Math.floor(elapsed*rate));
      G.lastQiTime=Date.now();
      updateHud();
    }
  },15000);
}
function stopCps(){if(cpsTimer){clearInterval(cpsTimer);cpsTimer=null;}if(qiTimer){clearInterval(qiTimer);qiTimer=null;}if(bgmTimer){clearInterval(bgmTimer);bgmTimer=null;}}

function playBgmNote(freq,dur,vol,t){
  if(!_audioCtx||_audioState.muted)return;
  const o=_audioCtx.createOscillator(),g=_audioCtx.createGain();
  o.connect(g);g.connect(_audioCtx.destination);
  o.type='triangle';
  o.frequency.value=freq;
  g.gain.setValueAtTime((vol||.15)*_audioState.bgmVolume,_audioCtx.currentTime+(t||0));
  g.gain.exponentialRampToValueAtTime(.001,_audioCtx.currentTime+(t||0)+dur);
  o.start(_audioCtx.currentTime+(t||0));
  o.stop(_audioCtx.currentTime+(t||0)+dur+.05);
}
let _bgmTimer=null,_bgmIdx=0,_bgmZ=-1;

function playNote(f,dur,vol,type){
  if(!_audioCtx||_audioState.muted)return;
  const o=_audioCtx.createOscillator(),g=_audioCtx.createGain();
  o.connect(g);g.connect(_audioCtx.destination);
  o.frequency.value=f;o.type=type||'triangle';
  const now=_audioCtx.currentTime;
  const fade=dur*.08;
  g.gain.setValueAtTime(.001,now);
  g.gain.linearRampToValueAtTime(vol,now+fade);
  g.gain.setValueAtTime(vol,now+dur-fade);
  g.gain.exponentialRampToValueAtTime(.001,now+dur);
  o.start(now);o.stop(now+dur+.02);
}

const ZODIAC_BGM=[
  // 0鼠-轻快活跃（五声音阶上行跳进）

function playFullBgm(z){
  if(!_audioCtx||z<0)return;
  stopBgm();_bgmZ=z;
  const track=ZODIAC_BGM[z]||ZODIAC_BGM[4];
  _bgmIdx=0;
  function tick(){
    if(!_audioCtx||_audioState.muted){stopBgm();return;}
    if(_bgmZ!==z){return;} // 切换生肖时停止
    const n=track.notes[_bgmIdx%track.notes.length];
    playNote(n.f,n.d,_audioState.bgmVolume*.5,n.type);
    _bgmIdx++;
    _bgmTimer=setTimeout(tick,Math.round(n.d*950)); // 音符间95%时长，无缝衔接
  }
  initAudio();
  tick();
}

function stopBgm(){
  if(_bgmTimer){clearTimeout(_bgmTimer);_bgmTimer=null;}
  _bgmIdx=0;_bgmZ=-1;
}

function startBgm(){initAudio();playFullBgm(G.zodiac);}

function stopBgm(){}

const RARITY=[

function getRarity(lvl){
  if(lvl<=3)return 0;
  if(lvl<=6)return 1;
  if(lvl<=9)return 2;
  if(lvl<=12)return 3;
  return 4;
}
let pendingSummonLevel=1;
let summonRevealed=false;

function revealSummon(){
  if(summonRevealed)return;
  summonRevealed=true;
  const lvl=pendingSummonLevel;
  const rar=getRarity(lvl);
  // 填充翻牌正面内容
  document.getElementById('sfEmoji').textContent=LICON[lvl]||'?';
  document.getElementById('sfName').textContent=LNAME[lvl]||'灵兽';
  document.getElementById('sfCps').textContent='+'+COIN_S[lvl]+'/s';
  document.querySelector('.scard-front').style.borderColor=rar.color;
  // 翻牌
  document.getElementById('scard').classList.add('flipped');
  // 1.4秒后显示结果
  setTimeout(()=>{
    document.getElementById('summonResultAnim').classList.add('show');
    document.getElementById('sraEmoji').textContent=LICON[lvl]||'?';
    document.getElementById('sraName').textContent=LNAME[lvl]||'灵兽';
    document.getElementById('sraDesc').textContent='Lv'+lvl+' · 每秒产金 '+COIN_S[lvl];
    document.getElementById('sraTag').textContent=rar.tag;
    document.getElementById('sraTag').style.color=rar.color;
    document.getElementById('sraBtn').style.display='block';
    // 关闭提示
    document.querySelector('.summon-tip').style.display='none';
    document.querySelector('.scard-wrap').style.display='none';
  },1400);
}
function closeSummonAnim(){
  document.getElementById('summonOverlay').classList.remove('show');
  document.getElementById('summonResultAnim').classList.remove('show');
  document.getElementById('sraBtn').style.display='none';
  document.querySelector('.summon-tip').style.display='block';
  document.querySelector('.scard-wrap').style.display='flex';
  document.getElementById('scard').classList.remove('flipped');
  document.getElementById('summonResultAnim').classList.remove('show');
  summonRevealed=false;
}

// 改造 doSummon：触发翻牌动画而不是直接弹窗
function doSummon(level){
  initAudio();
  if(G.zodiac>=0) playSound('summon_z'+G.zodiac);
  const used=new Set(G.dragons.map(d=>d.idx));
  const spots=[];
  for(let i=0;i<TOTAL;i++)if(!used.has(i))spots.push(i);
  if(spots.length===0){showNotif('error','灵兽已满，请先合并！');return;}
  const idx=spots[Math.floor(Math.random()*spots.length)];
  G.dragons.push({id:String(nextId++),level,idx});
  G.summonCount++;
  saveGame();renderGrid();updateHud();
  checkAch();
  // 改为触发翻牌动画
  pendingSummonLevel=level;
  summonRevealed=false;
  document.getElementById('summonOverlay').classList.add('show');
  document.getElementById('summonResultAnim').classList.remove('show');
  document.getElementById('sraBtn').style.display='none';
}

        '<div style="font-size:26px;margin-bottom:4px;">'+a.icon+'</div>'+
        '<div style="font-size:12px;font-weight:600;color:'+(d?'#ffd700':'#666')+';">'+a.title+'</div>'+
        '<div style="font-size:10px;color:#555;margin-top:3px;">'+a.desc+'</div>'+
      '</div>';
    }).join('')+
    '</div></div>';
}

function closeAchPanel(){document.getElementById('achPanel').classList.remove('open');}

function today(){
  const d=new Date();
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}
function rollFate(){
  G.currentFate=Math.floor(Math.random()*5)+1;
  G.lastFateDate=today();
  saveGame();
  updateHud();
  const names=['🌪️ 极凶','🌧️ 小凶','☀️ 平','🌤️ 小吉','✨ 大吉'];
  const icons=['⚠️','⚠️','☀️','🌟','⭐'];
  const colors=['#f44336','#ff9800','#888','#8bc34a','#ffd700'];
  showNotif('info','今日运势：'+names[G.currentFate-1]+'！产出'+(YUN_COIN[G.currentFate-1]>=0?'+'+(YUN_COIN[G.currentFate-1]*100).toFixed(0)+'%':(YUN_COIN[G.currentFate-1]*100).toFixed(0)+'%'));
  updateFateOverlay();
}
function checkFateDaily(){
  if(!G.created)return;
  if(G.lastFateDate!==today()){
    rollFate();
    showNotif('warning','⏰ 新的一天！天机已变，运势已刷新');
  }
}
function showFateDetail(){
  const idx=G.currentFate-1;
  const names=['🌪️ 极凶','🌧️ 小凶','☀️ 平','🌤️ 小吉','✨ 大吉'];
  const descs=['诸事不顺，产出-50%','略有不顺，产出-20%','运气平平，正常产出','运势旺盛，产出+30%','鸿运当头，产出+50%'];
  const colors=['#f44336','#ff9800','#888','#8bc34a','#ffd700'];
  const bonus=YUN_COIN[idx];
  const pct=(bonus>=0?'+'+(bonus*100).toFixed(0)+'%':(bonus*100).toFixed(0)+'%');
  const el=document.createElement('div');
  el.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#0a0a1a;border:1px solid '+colors[idx]+';border-radius:20px;padding:24px;z-index:500;width:min(320px,88vw);text-align:center;';
  el.innerHTML='<div style="font-size:40px;margin-bottom:8px;">'+names[idx]+'</div><div style="font-size:16px;font-weight:700;color:'+colors[idx]+';margin-bottom:6px;">'+pct+' 金币产出</div><div style="font-size:13px;color:#888;margin-bottom:16px;">'+descs[idx]+'</div><div style="font-size:11px;color:#555;">每日0点自动刷新</div><div style="margin-top:14px;padding:10px;background:rgba(255,255,255,.04);border-radius:12px;font-size:12px;color:#666;cursor:pointer;" onclick="this.parentElement.remove()">✕ 关闭</div>';
  document.body.appendChild(el);
}

function updateFateOverlay(){
  const overlay=document.getElementById('fateOverlay');
  if(!overlay)return;
  const opacities=[.35,.15,0,.1,.2];
  const op=opacities[G.currentFate-1]||0;
  const colors=['rgba(244,67,54,','rgba(255,152,0,','rgba(255,255,255,','rgba(139,195,74,','rgba(255,215,0,'];
  overlay.style.background=colors[G.currentFate-1]+op+')';
}


// ===== 命格修炼系统 =====
const CULTivation=[
  {key:'mu',  name:'木', icon:'🪵', color:'#4caf50', desc:'召唤灵兽',       node:[{cost:100,  title:'嫩芽萌发',desc:'召唤低级概率+10%'},{cost:500,  title:'枝繁叶茂',desc:'召唤低级概率+25%'},{cost:2000, title:'参天大树',desc:'召唤低级概率+50%'}]},
  {key:'huo', name:'火', icon:'🔥', color:'#f44336', desc:'融合炼化',       node:[{cost:100,  title:'火苗初燃',desc:'合成成功率+5%'},{cost:500,  title:'烈火焚烧',desc:'合成成功率+15%'},{cost:2000, title:'烈焰焚天',desc:'合成成功率+30%'}]},
  {key:'tu',  name:'土', icon:'🟤', color:'#795548', desc:'厚土载物',       node:[{cost:100,  title:'泥土夯实',desc:'金币产出+10%'},{cost:500,  title:'沃土千里',desc:'金币产出+25%'},{cost:2000, title:'厚德载物',desc:'金币产出+50%'}]},
  {key:'kin', name:'金', icon:'⚪', color:'#9e9e9e', desc:'点石成金',       node:[{cost:100,  title:'沙里淘金',desc:'高级灵兽概率+10%'},{cost:500,  title:'点铁成金',desc:'高级灵兽概率+25%'},{cost:2000, title:'点石成金',desc:'高级灵兽概率+50%'}]},
  {key:'shui',name:'水', icon:'💧', color:'#2196f3', desc:'水润万物',       node:[{cost:100,  title:'涓涓细流',desc:'龙气回复+20%/min'},{cost:500,  title:'江河奔涌',desc:'龙气回复+50%/min'},{cost:2000, title:'汪洋大海',desc:'龙气回复+100%/min'}]},
];
const QI_RATE=[0,0,0,0,0,20,50,100]; // 每级每分钟龙气回复量

function getCultBonus(){
  const c=G.cultivation||{mu:0,huo:0,tu:0,kin:0,shui:0};
  return{
    summonLowRate:(c.mu===1?.1:c.mu===2?.25:.35)*(c.mu===0?0:1),
    mergeBonus:(c.huo===1?.05:c.huo===2?.15:.3)*(c.huo===0?0:1),
    coinBonus:(c.tu===1?.1:c.tu===2?.25:.5)*(c.tu===0?0:1),
    highRate:(c.kin===1?.1:c.kin===2?.25:.5)*(c.kin===0?0:1),
    qiRate:QI_RATE[Object.values(c).reduce((a,b)=>a+b,0)]||0,
  };
}
function calcCultQi(){
  const now=Date.now();
  const elapsed=(now-G.lastQiTime)/60000; // 分钟
  const rate=getCultBonus().qiRate;
  if(rate>0) G.qi=Math.min(99999,G.qi+Math.floor(elapsed*rate));
  G.lastQiTime=now;
  saveGame();
}
function doCultNode(cultKey,nodeIdx){
  if(!G.created)return;
  const cult=G.cultivation||{mu:0,huo:0,tu:0,kin:0,shui:0};
  const cfg=CULTivation.find(c=>c.key===cultKey);
  const node=cfg.node[nodeIdx];
  if(cult[cultKey]>nodeIdx){showNotif('info','此节点已修炼');return;}
  if(G.qi<node.cost){showNotif('error','龙气不足');return;}
  G.qi-=node.cost;
  cult[cultKey]=nodeIdx+1;
  G.cultivation=cult;
  saveGame();
  renderCultPanel();
  updateHud();
  calcCps();
  showNotif('success','⚗️ '+cfg.icon+' '+cfg.name+'修炼：'+node.title);
}
function saveCultUI(){
  // 实时更新修炼面板的节点显示
  if(!document.getElementById('cultPanel').classList.contains('open'))return;
  const cult=G.cultivation||{mu:0,huo:0,tu:0,kin:0,shui:0};
  CULTivation.forEach(c=>{
    const lv=cult[c.key]||0;
    c.node.forEach((n,i)=>{
      const nodeEl=document.getElementById('cult_'+c.key+'_'+i);
      if(!nodeEl)return;
      if(i<lv){ nodeEl.style.opacity='1'; nodeEl.style.borderColor='rgba(255,215,0,.4)'; nodeEl.style.background='rgba(255,215,0,.08)'; }
      else if(i===lv){ nodeEl.style.opacity='1'; nodeEl.style.borderColor=c.color; nodeEl.style.background='rgba(255,255,255,.03)'; }
      else{ nodeEl.style.opacity='.35'; nodeEl.style.borderColor='rgba(255,255,255,.06)'; nodeEl.style.background='rgba(255,255,255,.02)'; }
    });
  });
}
function renderCultPanel(){
  const p=document.getElementById('cultPanel');
  const cult=G.cultivation||{mu:0,huo:0,tu:0,kin:0,shui:0};
  const bonus=getCultBonus();
  p.innerHTML=`<div style="padding:20px 16px 80px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div style="font-size:16px;font-weight:700;">⚗️ 命格修炼</div>
      <div style="font-size:12px;color:#888;">
        <span style="color:#ffd700;">${(bonus.coinBonus*100).toFixed(0)}%</span>金币
        <span style="color:#ffd700;">${(bonus.summonLowRate*100).toFixed(0)}%</span>召唤
        <span style="color:#ffd700;">${(bonus.mergeBonus*100).toFixed(0)}%</span>合成
      </div>

    </div>
    <div style="font-size:11px;color:#555;margin-bottom:14px;background:rgba(255,255,255,.03);padding:10px;border-radius:10px;">
      消耗 <span style="color:#ffd700;">龙气</span> 提升修炼境界，每条命格可修炼3层
    </div>
    ${CULTivation.map(c=>{const lv=cult[c.key]||0;return`<div style="margin-bottom:18px;">
      <div style="font-size:13px;font-weight:700;color:${c.color};margin-bottom:10px;display:flex;align-items:center;gap:6px;">
        <span style="font-size:18px;">${c.icon}</span>${c.name}·${c.desc}
      </div>
      <div style="display:flex;gap:8px;">
        ${c.node.map((n,i)=>{const done=i<lv,next=i===lv;return`<div id="cult_${c.key}_${i}" onclick="doCultNode('${c.key}',${i})" style="flex:1;background:${done?'rgba(255,215,0,.08)':'rgba(255,255,255,.02)'};border:1px solid ${done?'rgba(255,215,0,.3)':next?c.color:'rgba(255,255,255,.06)'};border-radius:12px;padding:10px 6px;text-align:center;cursor:pointer;opacity:${done||next?'1':'.35'};">
          <div style="font-size:11px;color:${done?'#ffd700':next?c.color:'#555'};font-weight:600;">${n.title}</div>
          <div style="font-size:10px;color:#888;margin:3px 0 4px;">${n.desc}</div>
          <div style="font-size:10px;color:${G.qi>=n.cost?'#ffd700':'#f44336'};">✨${n.cost}龙气</div>
          ${done?'<div style="font-size:16px;margin-top:4px;">✅</div>':''}
        </div>`;}).join('')}
      </div>
    </div>`;}).join('')}
    <div style="margin-top:8px;background:rgba(255,215,0,.04);border:1px solid rgba(255,215,0,.1);border-radius:12px;padding:12px;">
      <div style="font-size:12px;color:#ffd700;font-weight:600;margin-bottom:6px;">📈 当前加成总览</div>
      <div style="font-size:11px;color:#888;line-height:1.9;">
        💰金币产出 <span style="color:#ffd700;">+${(bonus.coinBonus*100).toFixed(0)}%</span><br>
        🐣召唤概率 <span style="color:#ffd700;">+${(bonus.summonLowRate*100).toFixed(0)}%</span><br>
        ⚡合成成功率 <span style="color:#ffd700;">+${(bonus.mergeBonus*100).toFixed(0)}%</span><br>
        🐉高级灵兽 <span style="color:#ffd700;">+${(bonus.highRate*100).toFixed(0)}%</span><br>
        ✨龙气回复 <span style="color:#ffd700;">+${bonus.qiRate}/min</span>
      </div>
    </div>
  </div>`;
}

          <div style="font-size:32px;margin-bottom:4px;">${LICON[lv]||'❓'}</div>

}


function getRankList(){
  try{
    const list=JSON.parse(localStorage.getItem(SAVE_KEY+'_rank')||'[]');
    const me={name:G.zodiac>=0?ZOD_E[G.zodiac]+'的'+FATE_E[G.fate]:'神秘玩家',coins:G.coins,date:new Date().toLocaleDateString('zh-CN',{month:'short',day:'numeric'})};
    const hasMe=list.some(e=>e.name===me.name);
    if(!hasMe && G.created) list.push(me);
    return list.sort((a,b)=>b.coins-a.coins).slice(0,20);
  }catch(e){return[];}
}
function saveRankScore(){
  try{
    const list=JSON.parse(localStorage.getItem(SAVE_KEY+'_rank')||'[]');
    const name=G.zodiac>=0?ZOD_E[G.zodiac]+'的'+FATE_E[G.fate]:'神秘玩家';
    const idx=list.findIndex(e=>e.name===name);
    const entry={name,coins:G.coins,date:new Date().toLocaleDateString('zh-CN',{month:'short',day:'numeric'})};
    if(idx>=0) list[idx]=entry; else list.push(entry);
    list.sort((a,b)=>b.coins-a.coins);
    localStorage.setItem(SAVE_KEY+'_rank',JSON.stringify(list.slice(0,20)));
  }catch(e){}
}

  const p=document.getElementById('rankPanel');
  const meName=G.zodiac>=0?ZOD_E[G.zodiac]+'的'+FATE_E[G.fate]:'神秘玩家';

    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">'+

      const rcolor=rank===1?'#ffd700':rank===2?'#c0c0c0':rank===3?'#cd7f32':'#888';
      return '<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:'+bg+';border-bottom:1px solid rgba(255,255,255,.04);'+(isMe?'font-weight:700;':'')+'">'+

        '</div>'+

    }).join('')+

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>布局L5：无主角卡</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100dvh;background:#0d0d14;display:flex;align-items:center;justify-content:center;font-family:system-ui}
.page{max-width:500px;width:100%;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* 顶栏——整合主角信息 */
.hud{
  flex-shrink:0;height:64px;background:#0a0a10;
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;padding:0 14px;gap:10px
}
.hud-left{display:flex;flex-direction:column;gap:0}
.hud-g{width:44px;height:44px;flex-shrink:0;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,215,0,.2);border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:26px;position:relative}
.hud-g::after{
  content:'Lv.5';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
  font-size:8px;background:rgba(255,215,0,.1);color:#ffd700;
  padding:1px 4px;border-radius:4px;white-space:nowrap;border:1px solid rgba(255,215,0,.15)}
.hud-info{display:flex;flex-direction:column;justify-content:center;gap:1px}
.hud-name{font-size:13px;color:#ffd700;font-weight:700}
.hud-desc{font-size:10px;color:rgba(255,255,255,.25)}
.hud-divider{width:1px;height:36px;background:rgba(255,255,255,.06);flex-shrink:0}
.hud-stats{display:flex;flex-direction:column;gap:3px;flex:1}
.hud-stat{font-size:11px;display:flex;align-items:center;gap:4px}
.hud-stat .l{color:rgba(255,255,255,.3)}
.hud-stat .v{color:#ffd700;font-weight:700}
.hud-stat .r{color:#a0d8ef;font-size:10px}
.hud-right{display:flex;flex-direction:column;gap:3px;align-items:flex-end}
.hud-rb{font-size:10px;color:#888;padding:3px 8px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);border-radius:7px;cursor:pointer}

/* 技能条 */
.sk{flex-shrink:0;height:32px;background:#0a0a10;border-bottom:1px solid rgba(255,255,255,.04);
  display:flex;align-items:center;justify-content:center;gap:4px;padding:0 10px;overflow-x:auto}
.sk-item{min-width:50px;padding:2px 8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:7px;display:flex;align-items:center;gap:4px;cursor:pointer;flex-shrink:0}
.sk-item .n{font-size:9px;color:#c8c8d8;font-weight:600}
.sk-item .d{font-size:9px;color:rgba(255,255,255,.25)}

/* 主区域 */
.main{flex:1;display:flex;min-height:0;overflow:hidden}

/* 左侧图标栏 */
.side{width:36px;flex-shrink:0;background:#0a0a10;
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:12px 0}
.sb{width:26px;height:26px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
  border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer}

/* 灵兽网格 */
.grid{flex:1;display:flex;flex-direction:column;min-width:0}
.grid-hd{flex-shrink:0;padding:6px 10px 4px;border-bottom:1px solid rgba(255,255,255,.04);
  display:flex;justify-content:space-between;align-items:center}
.grid-hd span{font-size:11px;color:#c8c8d8}
.grid-hd small{font-size:10px;color:rgba(255,255,255,.2)}
.dg-wrap{flex:1;padding:6px;display:grid;grid-template-columns:repeat(4,1fr);gap:5px;align-content:start;overflow:hidden}
.dg{aspect-ratio:1;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  position:relative;font-size:clamp(18px,4vw,26px);cursor:pointer}
.dg .lv{position:absolute;top:2px;left:3px;font-size:9px;color:rgba(255,255,255,.35)}
.dg.hi{border-color:rgba(255,215,0,.3);background:rgba(255,215,0,.05)}
.dg.emp{opacity:.15}

/* 底栏 */
.bot{flex-shrink:0;height:50px;background:#0a0a10;border-top:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;gap:8px;padding:0 14px}
.s-btn{padding:9px 14px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;
  transition:transform .15s}
.s-btn:hover{transform:scale(1.04)}
.s-btn.c{background:#1a1a22;color:#ffd700;border:1px solid rgba(255,215,0,.25)}
.s-btn.q{background:#121820;color:#7ab8f0;border:1px solid rgba(122,184,240,.25)}
.s-btn.f{background:#111a11;color:#70c070;border:1px solid rgba(112,192,112,.25)}

  .qi-icon{display:inline-block;border-radius:50%;background:radial-gradient(circle at 35% 35%,#e0f7fa,#a0d8ef 40%,#4fc3f7 70%,#0277bd);box-shadow:0 0 6px #4fc3f7,0 0 12px rgba(79,195,247,.35);vertical-align:middle;}.qi-icon-sm{width:12px;height:12px;}.qi-icon-md{width:16px;height:16px;}.qi-icon-lg{width:20px;height:20px;}
</style>
</head>
<body>
<div class="page">
  <div class="hud">
    <div class="hud-g">🐉</div>
    <div class="hud-info">
      <div class="hud-name">主角</div>
      <div class="hud-desc">木命 · 大吉 · 🐣→🐥→🐦</div>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-stats">
      <div class="hud-stat"><span class="l">💰</span><span class="v">12,847</span><span class="r">+86/s</span></div>
      <div class="hud-stat"><span class="l"><span class="qi-icon qi-icon-sm"></span></span><span class="v" style="color:#c8a0ef">520</span></div>
    </div>
    <div class="hud-right">
      <div class="hud-rb">📋 任务 3/5</div>
      <div class="hud-rb">🏆 挑战 4天</div>
    </div>
  </div>
  <div class="sk">
    <div class="sk-item"><span>📋</span><span class="n">任务</span><span class="d">3/5</span></div>
    <div class="sk-item"><span>🎁</span><span class="n">签到</span><span class="d">未签</span></div>
    <div class="sk-item"><span>⚡</span><span class="n">活动</span><span class="d">进行中</span></div>
    <div class="sk-item"><span>🏆</span><span class="n">挑战</span><span class="d">4天</span></div>
    <div class="sk-item"><span>📊</span><span class="n">排行</span><span class="d">前5%</span></div>
  </div>
  <div class="main">
    <div class="side">
      <div style="display:flex;flex-direction:column;gap:2px">
        <div class="sb">📋</div><div class="sb">📝</div><div class="sb">⚡</div><div class="sb">📖</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:2px">
        <div class="sb">🏆</div><div class="sb">📊</div><div class="sb">⚙️</div>
      </div>
    </div>
    <div class="grid">
      <div class="grid-hd"><span>🐾 灵兽</span><small>12只 · +86/s</small></div>
      <div class="dg-wrap">
        <div class="dg hi"><span class="lv">5</span>🐉</div>
        <div class="dg"><span class="lv">3</span>🐍</div><div class="dg"><span class="lv">2</span>🐴</div>
        <div class="dg"><span class="lv">1</span>🐏</div><div class="dg"><span class="lv">4</span>🐅</div>
        <div class="dg"><span class="lv">3</span>🐂</div><div class="dg"><span class="lv">2</span>🐇</div>
        <div class="dg"><span class="lv">1</span>🐀</div><div class="dg"><span class="lv">3</span>🐎</div>
        <div class="dg"><span class="lv">2</span>🐒</div><div class="dg"><span class="lv">6</span>🐓</div>
        <div class="dg"><span class="lv">1</span>🐕</div><div class="dg"><span class="lv">2</span>🐖</div>
        <div class="dg emp"></div><div class="dg emp"></div><div class="dg emp"></div>
        <div class="dg emp"></div><div class="dg emp"></div><div class="dg emp"></div>
        <div class="dg emp"></div><div class="dg emp"></div>
      </div>
    </div>
  </div>
  <div class="bot">
    <button class="s-btn c">💰 100</button>
    <button class="s-btn q"><span class="qi-icon qi-icon-sm"></span> 500</button>
    <button class="s-btn f">🌿 免费×3</button>
  </div>
</div>
</body></html>

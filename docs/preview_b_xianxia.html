<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>生肖天机 · 风格B：玄幻仙侠</title>
</head>
<body style="margin:0;padding:0;background:#020a12;font-family:system-ui,sans-serif;color:#fff;min-height:100dvh;display:flex;align-items:center;justify-content:center;">
<p style="padding:20px;">Step 1 完成：风格B骨架</p>
</body></html>
<style>
.game{
  display:flex;flex-direction:column;
  height:100dvh;max-width:500px;margin:0 auto;
  background:linear-gradient(160deg,#010810 0%,#041628 50%,#020a12 100%);
  overflow:hidden;position:relative;
}
/* 云雾底纹 */
.game::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 80% 100%,rgba(0,180,140,.08) 0%,transparent 60%),
    radial-gradient(ellipse 50% 30% at 20% 90%,rgba(80,160,255,.06) 0%,transparent 60%);
}
.game::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:120px;
  background:linear-gradient(to top,rgba(2,10,18,.9) 0%,transparent 100%);pointer-events:none;z-index:1;
}

/* 顶栏 */
.top-hud{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;height:48px;
  background:rgba(1,8,16,.9);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(0,210,140,.15);position:relative;z-index:2;
}
.hud-zodiac{font-size:20px;filter:drop-shadow(0 0 6px rgba(0,210,140,.4));}
.hud-center{display:flex;align-items:center;gap:14px;}
.hud-stat{display:flex;align-items:center;gap:4px;}
.hud-stat .icon{font-size:15px;}
.hud-stat .val{font-size:15px;font-weight:700;color:#00d28c;}
.hud-stat .cps{font-size:11px;color:rgba(0,210,140,.45);}
.hud-stat .qi{color:#5ab8e8;}
.hud-yunshi{font-size:12px;color:rgba(0,210,140,.3);}

/* 技能条 */
.skill-row{
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  padding:5px 14px;gap:6px;
  background:rgba(1,8,16,.7);border-bottom:1px solid rgba(0,210,140,.07);position:relative;z-index:2;
}
.skill-item{
  display:flex;flex-direction:column;align-items:center;gap:1px;
  padding:4px 9px;min-width:50px;
  background:rgba(0,210,140,.04);border:1px solid rgba(0,210,140,.12);
  border-radius:8px;cursor:pointer;transition:all .2s;
}
.skill-item:hover{background:rgba(0,210,140,.1);border-color:rgba(0,210,140,.4);}
.skill-item .sname{font-size:11px;font-weight:600;color:#00d28c;}
.skill-item .scd{font-size:10px;color:rgba(0,210,140,.4);}
.skill-dot{position:absolute;top:2px;right:2px;width:5px;height:5px;border-radius:50%;background:#ff4466;}

/* 中间 */
.mid-row{
  flex:1;display:flex;min-height:0;overflow:hidden;position:relative;z-index:2;
}

/* 左栏 */
.sidebar{
  width:44px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  padding:32px 0 76px;
  background:linear-gradient(to bottom,rgba(0,0,0,.35) 0%,transparent 25%,transparent 75%,rgba(0,0,0,.3) 100%);
}
.sd-btn{
  width:34px;height:34px;margin:2px 0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,210,140,.04);border:1px solid rgba(0,210,140,.1);
  border-radius:9px;cursor:pointer;font-size:15px;
  transition:all .2s;
}
.sd-btn:hover{background:rgba(0,210,140,.1);border-color:rgba(0,210,140,.4);}

/* 灵兽格子 */
.dragon-sec{
  flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;
}
.dragon-hd{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px 7px;
  border-bottom:1px solid rgba(0,210,140,.08);
}
.dragon-hd span{font-size:13px;color:#00d28c;font-weight:600;}
.dragon-hd small{color:rgba(0,210,140,.3);font-size:11px;}
.dragon-grid{
  flex:1;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;
  padding:10px;align-content:start;overflow:hidden;
}
.dg{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  background:rgba(0,210,140,.04);border:1px solid rgba(0,210,140,.1);
  border-radius:10px;position:relative;font-size:clamp(22px,5vw,34px);
  cursor:pointer;transition:all .2s;
}
.dg:hover{transform:scale(1.08);border-color:rgba(0,210,140,.5);box-shadow:0 0 8px rgba(0,210,140,.2);}
.dg .lv{
  position:absolute;top:2px;left:4px;font-size:9px;font-weight:700;color:#00d28c;
}
.dg.hi{border-color:rgba(0,210,140,.5);background:rgba(0,210,140,.08);}
.dg.sp{border-color:rgba(90,184,232,.5);background:rgba(90,184,232,.08);}
.dg.le{border-color:rgba(180,120,255,.6);background:rgba(180,120,255,.08);}

/* 主角卡 */
.hero-card{
  width:115px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 7px;gap:3px;
  background:rgba(0,210,140,.02);border-left:1px solid rgba(0,210,140,.07);
}
.hero-fate{font-size:9px;color:rgba(0,210,140,.35);letter-spacing:2px;}
.hero-glow{
  width:76px;height:76px;position:relative;display:flex;align-items:center;justify-content:center;
}
.hero-glow::before{
  content:'';position:absolute;inset:-14px;
  background:radial-gradient(circle,rgba(0,180,120,.2) 0%,transparent 70%);
  border-radius:50%;animation:xian-pulse 3s ease-in-out infinite;
}
@keyframes xian-pulse{0%,100%{opacity:.7}50%{opacity:1}}
.hero-icon{font-size:60px;line-height:1;filter:drop-shadow(0 0 10px rgba(0,210,140,.5));z-index:2;}
.hero-evo{display:flex;gap:2px;font-size:14px;opacity:.3;align-items:center;}
.hero-lv{font-size:11px;font-weight:700;color:#00d28c;}
.hero-cps{font-size:10px;color:rgba(0,210,140,.4);}
.hero-btns{display:flex;gap:4px;margin-top:3px;}
.hero-btn{
  font-size:11px;padding:4px 8px;border-radius:8px;
  border:1px solid rgba(0,210,140,.15);background:rgba(0,210,140,.05);
  color:#aaa;cursor:pointer;transition:all .2s;
}
.hero-btn:hover{background:rgba(0,210,140,.12);border-color:rgba(0,210,140,.4);color:#00d28c;}
.hero-btn.pk{background:rgba(0,210,140,.12);border-color:rgba(0,210,140,.4);color:#00d28c;}

/* 底栏 */
.bot-bar{
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  gap:10px;padding:10px 16px calc(10px + env(safe-area-inset-bottom,6px));
  background:rgba(1,8,16,.9);border-top:1px solid rgba(0,210,140,.1);position:relative;z-index:2;
}
.sm-btn{
  display:flex;align-items:center;gap:5px;
  padding:9px 14px;border-radius:12px;border:none;cursor:pointer;
  font-size:14px;font-weight:700;transition:all .2s;
}
.sm-btn:hover{transform:scale(1.04);}
.sm-btn:active{transform:scale(.97);}
.sm-coin{background:linear-gradient(135deg,#0a2a1a,#0a4a2a);color:#00d28c;border:1px solid rgba(0,210,140,.4);}
.sm-qi{background:linear-gradient(135deg,#051a28,#0a2a40);color:#5ab8e8;border:1px solid rgba(90,184,232,.4);}
.sm-free{background:linear-gradient(135deg,#081808,#0d2e0d);color:#60cc60;border:1px solid rgba(96,204,96,.4);}

@media(max-width:400px){
  .hero-card{width:98px;padding:8px 5px;}
  .hero-glow{width:60px;height:60px;}
  .hero-icon{font-size:48px;}
  .sidebar{width:38px;}
}
</style>
<div class="game">

  <!-- 顶栏 -->
  <div class="top-hud">
    <span class="hud-zodiac">🐉</span>
    <div class="hud-center">
      <div class="hud-stat"><span class="icon">💰</span><span class="val">12,847</span><span class="cps">+86/s</span></div>
      <div class="hud-stat"><span class="icon">✨</span><span class="val qi">520</span></div>
    </div>
    <span class="hud-yunshi">⭐⭐⭐</span>
  </div>

  <!-- 技能条 -->
  <div class="skill-row">
    <div class="skill-item"><span>📋</span><span class="sname">签到</span><span class="scd">未签到</span></div>
    <div class="skill-item" style="position:relative">📝<span class="sname">任务</span><span class="scd">3/5</span><span class="skill-dot"></span></div>
    <div class="skill-item"><span>⚡</span><span class="sname">活动</span><span class="scd">进行中</span></div>
    <div class="skill-item"><span>🎯</span><span class="sname">挑战</span><span class="scd">4天</span></div>
  </div>

  <!-- 中间区 -->
  <div class="mid-row">

    <div class="sidebar">
      <div style="display:flex;flex-direction:column;gap:2px;">
        <div class="sd-btn" title="签到">📋</div>
        <div class="sd-btn" title="任务">📝</div>
        <div class="sd-btn" title="活动">⚡</div>
        <div class="sd-btn" title="图鉴">📖</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:2px;">
        <div class="sd-btn" title="排行">🏆</div>
        <div class="sd-btn" title="成就">🎖️</div>
        <div class="sd-btn" title="统计">📊</div>
        <div class="sd-btn" title="设置">⚙️</div>
      </div>
    </div>

    <div class="dragon-sec">
      <div class="dragon-hd"><span>🐾 灵兽</span><small>12只 · +86/s</small></div>
      <div class="dragon-grid">
        <div class="dg hi"><span class="lv">5</span>🐉</div>
        <div class="dg"><span class="lv">3</span>🐍</div>
        <div class="dg"><span class="lv">2</span>🐴</div>
        <div class="dg"><span class="lv">1</span>🐏</div>
        <div class="dg"><span class="lv">4</span>🐅</div>
        <div class="dg"><span class="lv">3</span>🐂</div>
        <div class="dg"><span class="lv">2</span>🐇</div>
        <div class="dg"><span class="lv">1</span>🐀</div>
        <div class="dg"><span class="lv">3</span>🐎</div>
        <div class="dg"><span class="lv">2</span>🐒</div>
        <div class="dg sp"><span class="lv">6</span>🐓</div>
        <div class="dg"><span class="lv">1</span>🐕</div>
        <div class="dg"><span class="lv">2</span>🐖</div>
        <div class="dg" style="opacity:.15"></div>
        <div class="dg" style="opacity:.15"></div>
        <div class="dg" style="opacity:.15"></div>
        <div class="dg" style="opacity:.15"></div>
        <div class="dg" style="opacity:.15"></div>
        <div class="dg" style="opacity:.15"></div>
        <div class="dg" style="opacity:.15"></div>
        <div class="dg" style="opacity:.15"></div>
        <div class="dg" style="opacity:.15"></div>
        <div class="dg" style="opacity:.15"></div>
        <div class="dg" style="opacity:.15"></div>
      </div>
    </div>

    <div class="hero-card">
      <div class="hero-fate">木命 · 大吉</div>
      <div class="hero-evo">🐣→🐥→🐦→🐓</div>
      <div class="hero-glow"><div class="hero-icon">🐉</div></div>
      <div><span class="hero-lv">Lv.5</span><span class="hero-cps"> +55/s</span></div>
      <div class="hero-btns">
        <button class="hero-btn pk">升星</button>
        <button class="hero-btn">详情</button>
      </div>
    </div>
  </div>

  <div class="bot-bar">
    <button class="sm-btn sm-coin">💰<span>100</span></button>
    <button class="sm-btn sm-qi"><span style="font-size:11px;color:rgba(90,184,232,.6)">✨500</span>✨<span>500</span></button>
    <button class="sm-btn sm-free">🌿<span>免费×3</span></button>
  </div>

</div>
</body></html>

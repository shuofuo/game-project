<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>生肖天机 · 风格E：黄金贵族</title>
<style>
.game{
  display:flex;flex-direction:column;
  height:100dvh;max-width:500px;margin:0 auto;
  background:radial-gradient(ellipse 100% 80% at 50% 0%,#1a0e00 0%,#0f0700 40%,#080300 100%);
  overflow:hidden;position:relative;
}
/* 金粉光点 */
.game::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 15% 20%,rgba(255,200,50,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 75% 15%,rgba(255,220,100,.4) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 45% 5%,rgba(255,200,50,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 85% 45%,rgba(255,200,50,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 30% 50%,rgba(255,220,100,.35) 0%,transparent 100%);
  animation:gold-dust 6s ease-in-out infinite alternate;
}
@keyframes gold-dust{0%{opacity:.5}100%{opacity:1}}

/* 顶栏 */
.top-hud{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:52px;
  background:rgba(8,3,0,.88);backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,180,30,.2);
  box-shadow:0 2px 16px rgba(255,150,0,.1);
  position:relative;z-index:2;
}
.hud-zodiac{font-size:22px;filter:drop-shadow(0 0 8px rgba(255,180,30,.6));}
.hud-center{display:flex;align-items:center;gap:16px;}
.hud-stat{display:flex;align-items:center;gap:5px;}
.hud-stat .icon{font-size:16px;}
.hud-stat .val{font-size:16px;font-weight:700;color:#ffc83c;text-shadow:0 0 10px rgba(255,180,30,.5);}
.hud-stat .cps{font-size:11px;color:rgba(255,180,30,.4);}
.hud-stat .qi{color:#ffd97a;}
.hud-yunshi{font-size:12px;color:rgba(255,180,30,.3);}

/* 技能条 */
.skill-row{
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  padding:6px 16px;gap:8px;
  background:rgba(8,3,0,.7);border-bottom:1px solid rgba(255,180,30,.07);position:relative;z-index:2;
}
.skill-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:5px 11px;min-width:52px;
  background:rgba(255,180,30,.04);border:1px solid rgba(255,180,30,.14);
  border-radius:12px;cursor:pointer;transition:all .2s;
}
.skill-item:hover{background:rgba(255,180,30,.1);border-color:rgba(255,180,30,.5);}
.skill-item .sname{font-size:11px;font-weight:700;color:#ffc83c;}
.skill-item .scd{font-size:10px;color:rgba(255,180,30,.4);}
.skill-dot{position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%;background:#ff6020;box-shadow:0 0 6px rgba(255,96,32,.6);}

/* 中间 */
.mid-row{flex:1;display:flex;min-height:0;overflow:hidden;position:relative;z-index:2;}

/* 左栏 */
.sidebar{
  width:46px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  padding:34px 0 78px;
  background:linear-gradient(to bottom,rgba(0,0,0,.3) 0%,transparent 25%,transparent 75%,rgba(0,0,0,.25) 100%);
}
.sd-btn{
  width:36px;height:36px;margin:2px 0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,180,30,.04);border:1px solid rgba(255,180,30,.1);
  border-radius:10px;cursor:pointer;font-size:16px;
  transition:all .2s;
}
.sd-btn:hover{background:rgba(255,180,30,.12);border-color:rgba(255,180,30,.45);box-shadow:0 0 10px rgba(255,180,30,.2);}

/* 灵兽格子 */
.dragon-sec{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.dragon-hd{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 8px;
  border-bottom:1px solid rgba(255,180,30,.08);
}
.dragon-hd span{font-size:13px;font-weight:700;color:#ffc83c;letter-spacing:1px;}
.dragon-hd small{color:rgba(255,180,30,.25);font-size:11px;}
.dragon-grid{
  flex:1;display:grid;grid-template-columns:repeat(5,1fr);gap:7px;
  padding:12px;align-content:start;overflow:hidden;
}
.dg{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  background:rgba(255,180,30,.04);border:1px solid rgba(255,180,30,.1);
  border-radius:50%;position:relative;font-size:clamp(24px,5.5vw,36px);
  cursor:pointer;transition:all .25s;
}
.dg:hover{transform:scale(1.09);border-color:rgba(255,180,30,.5);background:rgba(255,180,30,.08);}
.dg .lv{
  position:absolute;top:2px;left:5px;font-size:9px;font-weight:700;color:#ffc83c;
}
.dg.hi{border-color:rgba(255,200,50,.55);background:rgba(255,200,50,.07);box-shadow:inset 0 0 12px rgba(255,200,50,.1);}
.dg.sp{border-color:rgba(220,170,60,.6);background:rgba(220,170,60,.07);}
.dg.le{border-color:rgba(255,150,30,.6);background:rgba(255,150,30,.08);}

/* 主角卡 */
.hero-card{
  width:120px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 8px;gap:4px;
  background:rgba(255,180,30,.02);border-left:1px solid rgba(255,180,30,.08);
}
.hero-fate{font-size:9px;color:rgba(255,180,30,.35);letter-spacing:2px;}
.hero-glow{
  width:80px;height:80px;position:relative;display:flex;align-items:center;justify-content:center;
}
.hero-glow::before{
  content:'';position:absolute;inset:-16px;
  background:radial-gradient(circle,rgba(255,180,30,.2) 0%,transparent 65%);
  border-radius:50%;animation:gold-pulse 3s ease-in-out infinite;
}
@keyframes gold-pulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
.hero-icon{font-size:62px;line-height:1;filter:drop-shadow(0 0 12px rgba(255,180,30,.5));z-index:2;}
.hero-evo{display:flex;gap:3px;font-size:16px;opacity:.3;align-items:center;}
.hero-lv{font-size:12px;font-weight:700;color:#ffc83c;letter-spacing:1px;}
.hero-cps{font-size:10px;color:rgba(255,180,30,.4);}
.hero-btns{display:flex;gap:5px;margin-top:4px;}
.hero-btn{
  font-size:12px;padding:5px 10px;border-radius:10px;
  border:1px solid rgba(255,180,30,.2);background:rgba(255,180,30,.05);
  color:#c8902a;cursor:pointer;transition:all .2s;
}
.hero-btn:hover{background:rgba(255,180,30,.12);border-color:rgba(255,180,30,.5);color:#ffc83c;}
.hero-btn.pk{background:rgba(255,180,30,.14);border-color:rgba(255,180,30,.5);color:#ffc83c;}

/* 底栏 */
.bot-bar{
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  gap:10px;padding:10px 16px calc(10px + env(safe-area-inset-bottom,6px));
  background:rgba(8,3,0,.9);border-top:1px solid rgba(255,180,30,.1);position:relative;z-index:2;
}
.sm-btn{
  display:flex;align-items:center;gap:6px;
  padding:10px 16px;border-radius:14px;border:none;cursor:pointer;
  font-size:14px;font-weight:700;transition:all .2s;
}
.sm-btn:hover{transform:scale(1.04);}
.sm-btn:active{transform:scale(.97);}
.sm-coin{background:linear-gradient(135deg,#3d2000,#6b3a00);color:#ffc83c;border:1px solid rgba(255,180,30,.45);}
.sm-qi{background:linear-gradient(135deg,#1a1000,#2e1c00);color:#ffd97a;border:1px solid rgba(255,180,30,.35);}
.sm-free{background:linear-gradient(135deg,#0d1f00,#1a3800);color:#c8d870;border:1px solid rgba(200,216,112,.4);}

@media(max-width:400px){
  .hero-card{width:100px;padding:8px 6px;}
  .hero-glow{width:64px;height:64px;}
  .hero-icon{font-size:50px;}
  .sidebar{width:40px;}
}

  .qi-icon{display:inline-block;border-radius:50%;background:radial-gradient(circle at 35% 35%,#e0f7fa,#a0d8ef 40%,#4fc3f7 70%,#0277bd);box-shadow:0 0 6px #4fc3f7,0 0 12px rgba(79,195,247,.35);vertical-align:middle;}.qi-icon-sm{width:12px;height:12px;}.qi-icon-md{width:16px;height:16px;}.qi-icon-lg{width:20px;height:20px;}
</style>
</head>
<body style="margin:0;padding:0;">
<div class="game">
  <div class="top-hud">
    <span class="hud-zodiac">🐉</span>
    <div class="hud-center">
      <div class="hud-stat"><span class="icon">💰</span><span class="val">12,847</span><span class="cps">+86/s</span></div>
      <div class="hud-stat"><span class="icon"><span class="qi-icon qi-icon-sm"></span></span><span class="val qi">520</span></div>
    </div>

  <div class="skill-row">
    <div class="skill-item"><span>📋</span><span class="sname">签到</span><span class="scd">未签到</span></div>

    <div class="dragon-sec">

        <div class="dg"><span class="lv">3</span>🐂</div>
        <div class="dg"><span class="lv">2</span>🐇</div>
        <div class="dg"><span class="lv">1</span>🐀</div>
        <div class="dg"><span class="lv">3</span>🐎</div>
        <div class="dg"><span class="lv">2</span>🐒</div>
        <div class="dg sp"><span class="lv">6</span>🐓</div>
        <div class="dg"><span class="lv">1</span>🐕</div>
        <div class="dg"><span class="lv">2</span>🐖</div>
        <div class="dg" style="opacity:.2"></div>
        <div class="dg" style="opacity:.2"></div>
        <div class="dg" style="opacity:.2"></div>
        <div class="dg" style="opacity:.2"></div>
        <div class="dg" style="opacity:.2"></div>
        <div class="dg" style="opacity:.2"></div>
        <div class="dg" style="opacity:.2"></div>
        <div class="dg" style="opacity:.2"></div>
        <div class="dg" style="opacity:.2"></div>
        <div class="dg" style="opacity:.2"></div>
        <div class="dg" style="opacity:.2"></div>
      </div>
    </div>
    <div class="hero-card">
      <div class="hero-fate">木命 · 大吉</div>
      <div class="hero-evo">🐣→🐥→🐦→🐓</div>
      <div class="hero-glow"><div class="hero-icon">🐉</div></div>
      <div><span class="hero-lv">Lv.5</span><span class="hero-cps"> +55/s</span></div>
      <div class="hero-btns">
        <button class="hero-btn pk">升星</button>
        <button class="hero-btn">详情</button>
      </div>
    </div>
  </div>
  <div class="bot-bar">
    <button class="sm-btn sm-coin">💰<span>100</span></button>
    <button class="sm-btn sm-qi"><span style="font-size:11px;color:rgba(255,217,122,.6)"><span class="qi-icon qi-icon-sm"></span>500</span><span class="qi-icon qi-icon-sm"></span><span>500</span></button>

  </div>
</div>
</body></html>
